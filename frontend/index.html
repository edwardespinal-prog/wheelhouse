                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                    <div className="form-group"><label>Grader</label><select value={formData.grader} onChange={e => setFormData({...formData, grader: e.target.value})}><option value="">Select</option><option value="PSA">PSA</option><option value="BGS">BGS</option><option value="SGC">SGC</option><option value="CGC">CGC</option><option value="WCG">WCG</option></select></div>
                                    <div className="form-group"><label>Grade</label><input type="text" placeholder="10, 9.5, 9..." value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} /></div>
                                </div>
                            )}
                        </>)}
                        {formData.item_type === 'sneaker' && (<>
                            <div className="form-group"><label>Brand</label><input type="text" placeholder="Nike, Jordan, Adidas..." value={formData.brand||''} onChange={e => setFormData({...formData, brand: e.target.value})} /></div>
                            <div className="form-group"><label>Model</label><input type="text" placeholder="Air Jordan 1 High" value={formData.model||''} onChange={e => setFormData({...formData, model: e.target.value})} /></div>
                            <div className="form-group"><label>Colorway</label><input type="text" placeholder="Bred, Royal, Chicago..." value={formData.colorway||''} onChange={e => setFormData({...formData, colorway: e.target.value})} /></div>
                            <div className="form-group"><label>Size</label><input type="text" placeholder="10.5" value={formData.size||''} onChange={e => setFormData({...formData, size: e.target.value})} /></div>
                        </>)}
                        {formData.item_type === 'clothing' && (<>
                            <div className="form-group"><label>Brand</label><input type="text" placeholder="Kith, Nike, Supreme..." value={formData.brand||''} onChange={e => setFormData({...formData, brand: e.target.value})} /></div>
                            <div className="form-group"><label>Model/Name</label><input type="text" placeholder="Palette Bears Crewneck" value={formData.model||''} onChange={e => setFormData({...formData, model: e.target.value})} /></div>
                            <div className="form-group"><label>Size</label><input type="text" placeholder="L, XL, M..." value={formData.size||''} onChange={e => setFormData({...formData, size: e.target.value})} /></div>
                        </>)}
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                            <div className="form-group"><label>Purchase Price</label><input type="number" step="0.01" placeholder="0.00" value={formData.purchase_price} onChange={e => setFormData({...formData, purchase_price: e.target.value})} /></div>
                            <div className="form-group"><label>Date Acquired</label><input type="date" value={formData.date_acquired} onChange={e => setFormData({...formData, date_acquired: e.target.value})} /></div>
                        </div>
                        <div className="form-group"><label>Estimated Value</label><input type="number" step="0.01" placeholder="5000.00" value={formData.est_value} onChange={e => setFormData({...formData, est_value: e.target.value})} /></div>
                        <button className="button button-primary" onClick={handleAddEdit} style={{ width: '100%' }}>{editingId ? 'Update' : 'Add'}</button>
                    </Modal>

                    {/* ─── Resale Tracker View ─── */}
                    {mainView === 'eddies' && (
                        <div>
                            {/* ── Active Inventory Section ── */}
                            <div style={{ marginBottom: '20px' }}>
                                <div onClick={() => setInventoryOpen(!inventoryOpen)} style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-muted)', marginBottom: inventoryOpen ? '12px' : '0', userSelect: 'none', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    {inventoryOpen ? '▾' : '▸'} <span style={{ fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '13px', color: 'var(--text-primary)' }}>Active Inventory</span>
                                    <span style={{ fontSize: '10px', opacity: 0.6 }}>— {inventoryItems.length} items ({formatCurrency(invValue)})</span>
                                    <button className="button button-primary" style={{ padding: '3px 10px', fontSize: '11px', marginLeft: 'auto' }} onClick={e => { e.stopPropagation(); handleOpenItemModal(); }}>+ Add Item</button>
                                </div>
                                {inventoryOpen && (<>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginBottom: '12px' }}>
                                        <div className="stat-card"><div className="stat-label">In Stock</div><div className="stat-value" style={{fontSize:'20px'}}>{inventoryItems.length}</div>
                                            <div style={{fontSize:'10px',color:'var(--text-muted)'}}>
                                                {inventoryItems.filter(c=>(c.item_type||'card')==='card').length}C / {inventoryItems.filter(c=>c.item_type==='sneaker').length}S / {inventoryItems.filter(c=>c.item_type==='clothing').length}Cl
                                            </div>
                                        </div>
                                        <div className="stat-card"><div className="stat-label">Inventory Value</div><div className="stat-value" style={{fontSize:'20px',color:'#f59e0b'}}>{formatCurrency(invValue)}</div></div>
                                        <div className="stat-card"><div className="stat-label">Available</div><div className="stat-value" style={{fontSize:'20px'}}>{invAvailable}</div></div>
                                        <div className="stat-card"><div className="stat-label">Listed</div><div className="stat-value" style={{fontSize:'20px',color:'#3b82f6'}}>{invListed}</div></div>
                                    </div>

                                    <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                                        <button className={`button ${invViewMode==='table'?'button-primary':''}`} onClick={() => setInvViewMode('table')} style={{fontSize:'11px',padding:'4px 10px'}}>Table</button>
                                        <button className={`button ${invViewMode==='grid'?'button-primary':''}`} onClick={() => setInvViewMode('grid')} style={{fontSize:'11px',padding:'4px 10px'}}>Grid</button>
                                    </div>

                                    {invViewMode === 'table' ? (
                                        <div className="card" style={{marginBottom:'16px'}}>
                                            <div className="table-container"><table><thead><tr>
                                                <th>Type</th><th>Item</th><th>Status</th><th>Est Value</th><th>Cost</th><th>Origin</th><th>Actions</th>
                                            </tr></thead><tbody>
                                                {sortedInventoryItems.length === 0 ? <tr><td colSpan="7" style={{textAlign:'center',color:'var(--text-muted)'}}>No inventory items</td></tr> :
                                                sortedInventoryItems.map(card => {
                                                    const itype = card.item_type || 'card';
                                                    return (
                                                    <tr key={card.id}>
                                                        <td><span style={{fontSize:'9px',padding:'1px 5px',borderRadius:'3px',fontWeight:600,
                                                            background: itype==='card'?'rgba(245,158,11,0.15)':itype==='sneaker'?'rgba(59,130,246,0.15)':'rgba(16,185,129,0.15)',
                                                            color: itype==='card'?'#f59e0b':itype==='sneaker'?'#3b82f6':'#10b981'}}>{itype}</span></td>
                                                        <td style={{fontWeight:'bold',color:'var(--accent)'}}>
                                                            {getItemName(card)}
                                                            {card.origin === 'collection' && <span title={`Moved from collection ${card.date_moved || ''}`} style={{fontSize:'8px',marginLeft:'6px',padding:'1px 4px',borderRadius:'3px',background:'rgba(139,92,246,0.15)',color:'#8b5cf6',fontWeight:600,cursor:'help'}}>From Collection</span>}
                                                        </td>
                                                        <td><span style={{fontSize:'10px',padding:'1px 6px',borderRadius:'3px',fontWeight:600,
                                                            background: card.status==='listed'?'rgba(59,130,246,0.15)':'rgba(107,114,128,0.15)',
                                                            color: card.status==='listed'?'#3b82f6':'#6b7280'}}>{card.status}</span></td>
                                                        <td>{formatCurrency(card.est_value||0)}</td>
                                                        <td>{card.purchase_price ? formatCurrency(card.purchase_price) : '—'}</td>
                                                        <td>{card.origin === 'collection' ? <span title={card.date_moved} style={{cursor:'help'}}>Collection</span> : '—'}</td>
                                                        <td>
                                                            <div className="action-buttons">
                                                                <button className="action-button" onClick={() => handleEdit(card)}>✏️</button>
                                                                <button className="action-button" title="Log Sale" onClick={() => {setSaleForm({item_name:getItemName(card),category:itype==='card'?'cards':itype==='sneaker'?'sneakers':itype,platform:'ebay',sale_price:'',shipping_cost:'',purchase_price:(card.purchase_price||'').toString(),requires_authentication:false,_source_card_id:card.id}); setSalesModal(true);}}>💰</button>
                                                                {card.origin === 'collection' && <button className="action-button" title="Return to Collection" onClick={() => handleReturnToCollection(card)}>↩️</button>}
                                                            </div>
                                                        </td>
                                                    </tr>);
                                                })}
                                            </tbody></table></div>
                                        </div>
                                    ) : (
                                        <div className="grid-cards" style={{marginBottom:'16px'}}>
                                            {sortedInventoryItems.map(card => {
                                                const itype = card.item_type || 'card';
                                                return (
                                                <div key={card.id} className="card-item">
                                                    <div className="card-item-content">
                                                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                                                            <span style={{fontSize:'9px',padding:'1px 5px',borderRadius:'3px',fontWeight:600,
                                                                background: itype==='card'?'rgba(245,158,11,0.15)':itype==='sneaker'?'rgba(59,130,246,0.15)':'rgba(16,185,129,0.15)',
                                                                color: itype==='card'?'#f59e0b':itype==='sneaker'?'#3b82f6':'#10b981'}}>{itype}</span>
                                                            <span style={{fontSize:'10px',padding:'1px 6px',borderRadius:'3px',fontWeight:600,
                                                                background: card.status==='listed'?'rgba(59,130,246,0.15)':'rgba(107,114,128,0.15)',
                                                                color: card.status==='listed'?'#3b82f6':'#6b7280'}}>{card.status}</span>
                                                        </div>
                                                        <div style={{fontWeight:'bold',color:'var(--accent)',fontSize:'14px',marginBottom:'4px'}}>{getItemName(card)}</div>
                                                        {card.origin === 'collection' && <span title={`Moved ${card.date_moved || ''}`} style={{fontSize:'8px',padding:'1px 4px',borderRadius:'3px',background:'rgba(139,92,246,0.15)',color:'#8b5cf6',fontWeight:600}}>From Collection</span>}
                                                        <div style={{display:'flex',justifyContent:'space-between',marginTop:'8px'}}>
                                                            <div><div className="card-item-label">Value</div><div className="card-item-value">{formatCurrency(card.est_value||0)}</div></div>
                                                            {card.purchase_price > 0 && <div style={{textAlign:'right'}}><div className="card-item-label">Cost</div><div style={{fontSize:'13px',color:'var(--text-muted)'}}>{formatCurrency(card.purchase_price)}</div></div>}
                                                        </div>
                                                    </div>
                                                    <div style={{display:'flex',gap:'6px',marginTop:'10px',flexWrap:'wrap'}}>
                                                        <button className="action-button" onClick={() => handleEdit(card)}>✏️</button>
                                                        <button className="action-button" title="Log Sale" onClick={() => {setSaleForm({item_name:getItemName(card),category:itype==='card'?'cards':itype==='sneaker'?'sneakers':itype,platform:'ebay',sale_price:'',shipping_cost:'',purchase_price:(card.purchase_price||'').toString(),requires_authentication:false,_source_card_id:card.id}); setSalesModal(true);}}>💰</button>
                                                        {card.origin === 'collection' && <button className="action-button" title="Return to Collection" onClick={() => handleReturnToCollection(card)}>↩️</button>}
                                                    </div>
                                                </div>);
                                            })}
                                        </div>
                                    )}
                                </>)}
                            </div>

                            {/* ── Sales Ledger Section ── */}
                            <div onClick={() => setSalesLedgerOpen(!salesLedgerOpen)} style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-muted)', marginBottom: salesLedgerOpen ? '12px' : '16px', userSelect: 'none' }}>
                                {salesLedgerOpen ? '▾' : '▸'} <span style={{ fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '13px', color: 'var(--text-primary)' }}>Sales Ledger</span>
                                <span style={{ fontSize: '10px', opacity: 0.6, marginLeft: '8px' }}>— {formatCurrency(ytdNet)} net across {completedSales.length} completed</span>
                            </div>

                            {salesLedgerOpen && (<>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                                <div className="stat-card"><div className="stat-label">Revenue YTD</div><div className="stat-value" style={{fontSize:'20px'}}>{formatCurrency(ytdRevenue)}</div></div>
                                <div className="stat-card"><div className="stat-label">Fees Paid</div><div className="stat-value" style={{fontSize:'20px',color:'#ef4444'}}>{formatCurrency(ytdFees)}</div></div>
                                <div className="stat-card"><div className="stat-label">Net Profit</div><div className="stat-value" style={{fontSize:'20px',color:ytdNet>=0?'#10b981':'#ef4444'}}>{ytdNet>=0?'+':''}{formatCurrency(ytdNet)}</div></div>
                                <div className="stat-card"><div className="stat-label">Items Sold</div><div className="stat-value" style={{fontSize:'20px'}}>{completedSales.length}</div></div>
                                <div className="stat-card"><div className="stat-label">Avg Margin</div><div className="stat-value" style={{fontSize:'20px'}}>{ytdRevenue > 0 ? (ytdNet/ytdRevenue*100).toFixed(0) : 0}%</div></div>
                            </div>

                            {/* Analytics (collapsible) */}
                            <div style={{ marginBottom: '16px' }}>
                                <div onClick={() => setAnalyticsOpen(!analyticsOpen)} style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-muted)', marginBottom: analyticsOpen ? '12px' : '0', userSelect: 'none' }}>
                                    {analyticsOpen ? '▾' : '▸'} <span style={{ fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '11px' }}>Analytics</span>
                                    <span style={{ marginLeft: '8px', fontSize: '10px', opacity: 0.6 }}>— {formatCurrency(ytdNet)} net across {completedSales.length} sales</span>
                                </div>
                                {analyticsOpen && (() => {
                                    // Monthly revenue data
                                    const monthlyData = {};
                                    completedSales.forEach(s => {
                                        const m = (s.date_sold || '').slice(0, 7);
                                        if (!m) return;
                                        if (!monthlyData[m]) monthlyData[m] = {gross: 0, net: 0, bycat: {}};
                                        monthlyData[m].gross += (s.sale_price || 0);
                                        monthlyData[m].net += (s.net_profit || 0);
                                        const cat = s.category || 'other';
                                        monthlyData[m].bycat[cat] = (monthlyData[m].bycat[cat] || 0) + (s.net_profit || 0);
                                    });
                                    const months = Object.keys(monthlyData).sort();
                                    const maxGross = Math.max(...months.map(m => monthlyData[m].gross), 1);

                                    // Category profit
                                    const catProfit = {};
                                    completedSales.forEach(s => { const c = s.category || 'other'; catProfit[c] = (catProfit[c] || 0) + (s.net_profit || 0); });
                                    const catTotal = Object.values(catProfit).reduce((s, v) => s + Math.max(v, 0), 0);

                                    // Fee waterfall (YTD)
                                    const totalGross = completedSales.reduce((s, x) => s + (x.sale_price || 0), 0);
                                    const totalFees = completedSales.reduce((s, x) => s + (x.platform_fees || 0), 0);
                                    const totalShip = completedSales.reduce((s, x) => s + (x.shipping_cost || 0), 0);
                                    const totalCogs = completedSales.reduce((s, x) => s + (x.purchase_price || 0), 0);
                                    const waterfallSteps = [
                                        {label: 'Gross Revenue', val: totalGross, color: '#10b981'},
                                        {label: 'Platform Fees', val: -totalFees, color: '#ef4444'},
                                        {label: 'Shipping', val: -totalShip, color: '#ef4444'},
                                        {label: 'Cost of Goods', val: -totalCogs, color: '#ef4444'},
                                        {label: 'Net Profit', val: ytdNet, color: ytdNet >= 0 ? '#10b981' : '#ef4444'},
                                    ];

                                    // Fulfillment timeline
                                    const fulfilled = completedSales.filter(s => s.date_sold && s.date_shipped && s.date_completed);
                                    const maxFulfill = Math.max(...fulfilled.map(s => {
                                        const d1 = new Date(s.date_sold), d2 = new Date(s.date_completed);
                                        return Math.max(1, Math.round((d2 - d1) / 86400000));
                                    }), 1);

                                    // Top items by margin
                                    const topItems = [...completedSales].sort((a, b) => (b.net_profit || 0) - (a.net_profit || 0)).slice(0, 10);
                                    const maxProfit = Math.max(...topItems.map(t => Math.abs(t.net_profit || 0)), 1);

                                    return (
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: '16px' }}>
                                            {/* Monthly Revenue */}
                                            <div className="card" style={{ padding: '16px' }}>
                                                <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '12px' }}>Monthly Revenue vs Profit</div>
                                                {months.length === 0 ? <div style={{color:'var(--text-muted)',fontSize:'12px'}}>No data yet</div> : (
                                                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: '8px', height: '120px' }}>
                                                        {months.map(m => (
                                                            <div key={m} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' }}>
                                                                <div style={{ width: '100%', display: 'flex', gap: '2px', alignItems: 'flex-end', height: '100px' }}>
                                                                    <div title={`Gross: ${formatCurrency(monthlyData[m].gross)}`} style={{ flex: 1, height: `${monthlyData[m].gross / maxGross * 100}%`, background: '#3b82f6', borderRadius: '2px 2px 0 0', minHeight: '4px' }} />
                                                                    <div title={`Net: ${formatCurrency(monthlyData[m].net)}`} style={{ flex: 1, height: `${Math.max(monthlyData[m].net, 0) / maxGross * 100}%`, background: '#10b981', borderRadius: '2px 2px 0 0', minHeight: '4px' }} />
                                                                </div>
                                                                <div style={{ fontSize: '9px', color: 'var(--text-muted)' }}>{m.slice(5)}/{m.slice(2,4)}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                <div style={{ display: 'flex', gap: '12px', marginTop: '8px', fontSize: '10px', color: 'var(--text-muted)' }}>
                                                    <span><span style={{display:'inline-block',width:'8px',height:'8px',background:'#3b82f6',borderRadius:'2px',marginRight:'4px'}} />Gross</span>
                                                    <span><span style={{display:'inline-block',width:'8px',height:'8px',background:'#10b981',borderRadius:'2px',marginRight:'4px'}} />Net</span>
                                                </div>
                                            </div>

                                            {/* Category Donut */}
                                            <div className="card" style={{ padding: '16px' }}>
                                                <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '12px' }}>Profit by Category</div>
                                                {catTotal <= 0 ? <div style={{color:'var(--text-muted)',fontSize:'12px'}}>No profit data</div> : (
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                                                        <svg viewBox="0 0 100 100" style={{ width: '100px', height: '100px' }}>
                                                            {(() => {
                                                                let offset = 0;

                                            <div>
                                                <div className="card-item-label">Value</div>
                                                <div className="card-item-value">{formatCurrency(card.est_value)}</div>

                                            {cost > 0 && <div style={{textAlign:'right'}}>
                                                <div className="card-item-label">P/L</div>
                                                <div className={pl >= 0 ? 'positive' : 'negative'} style={{fontWeight:600,fontSize:'14px'}}>

                                    <div style={{ display: 'flex', gap: '8px', marginTop: '12px', flexWrap: 'wrap' }}>
