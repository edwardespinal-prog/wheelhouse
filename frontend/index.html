                                        <button className="action-button" onClick={() => handleEdit(card)}>✏️</button>
                                        <button className="action-button" title="Move to Resale Tracker" onClick={() => handleMoveToInventory(card)}>📦</button>
                                        <button className="action-button delete" onClick={() => handleDelete(card.id, card.player)}>✕</button>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    )}
                </div>
                    )}

                    {/* ─── All Items View ─── */}
                    {mainView === 'all' && (
                        <div>
                    {/* Filters */}
                    <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                        {[{key:'all',label:'All Types'},{key:'card',label:'Cards'},{key:'sneaker',label:'Sneakers'},{key:'clothing',label:'Clothing'}].map(f => (
                            <button key={f.key} onClick={() => setItemFilter(f.key)} style={{
                                padding: '4px 12px', fontSize: '11px', borderRadius: '4px', cursor: 'pointer',
                                border: itemFilter === f.key ? '1px solid var(--accent)' : '1px solid var(--border)',
                                background: itemFilter === f.key ? 'rgba(241,90,34,0.1)' : 'transparent',
                                color: itemFilter === f.key ? 'var(--accent)' : 'var(--text-muted)',
                            }}>{f.label}</button>
                        ))}
                        <span style={{width:'1px',background:'var(--border)',margin:'0 4px'}} />
                        {[{key:'all',label:'All Status'},{key:'collection',label:'Collection'},{key:'available',label:'Available'},{key:'listed',label:'Listed'},{key:'sold',label:'Sold'},{key:'shipped',label:'Shipped'},{key:'completed',label:'Completed'}].map(f => (
                            <button key={f.key} onClick={() => setStatusFilter(f.key)} style={{
                                padding: '4px 10px', fontSize: '11px', borderRadius: '4px', cursor: 'pointer',
                                border: statusFilter === f.key ? '1px solid #3b82f6' : '1px solid var(--border)',
                                background: statusFilter === f.key ? 'rgba(59,130,246,0.1)' : 'transparent',
                                color: statusFilter === f.key ? '#3b82f6' : 'var(--text-muted)',
                            }}>{f.label}</button>
                        ))}
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                        <div className="stat-card"><div className="stat-label">Total Items</div><div className="stat-value">{allItems.length}</div></div>
                        <div className="stat-card"><div className="stat-label">Total Value</div><div className="stat-value" style={{color:'#f59e0b'}}>{formatCurrency(allItems.reduce((s,c) => s+(c.est_value||0), 0))}</div></div>
                        <div className="stat-card"><div className="stat-label">Total Cost</div><div className="stat-value">{formatCurrency(allItems.reduce((s,c) => s+(c.purchase_price||0), 0))}</div></div>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table><thead><tr>
                                <th>Type</th>
                                <th onClick={() => handleSort('player')} style={{cursor:'pointer'}}>Item {sortConfig.key === 'player' && (sortConfig.direction === 'asc' ? '↑' : '↓')}</th>
                                <th>Status</th>
                                <th onClick={() => handleSort('est_value')} style={{cursor:'pointer'}}>Value</th>
                                <th onClick={() => handleSort('purchase_price')} style={{cursor:'pointer'}}>Cost</th>
                                <th>P/L</th>
                                <th>Origin</th>
                            </tr></thead><tbody>
                                {sortedAllItems.length === 0 ? <tr><td colSpan="7" style={{textAlign:'center',color:'var(--text-muted)'}}>No items</td></tr> :
                                sortedAllItems.map(card => {
                                    const itype = card.item_type || 'card';
                                    const cost = card.purchase_price || 0;
                                    const pl = (card.est_value || 0) - cost;
                                    const st = card.status || 'collection';
                                    return (
                                    <tr key={card.id}>
                                        <td><span style={{fontSize:'9px',padding:'1px 5px',borderRadius:'3px',fontWeight:600,
                                            background: itype==='card'?'rgba(245,158,11,0.15)':itype==='sneaker'?'rgba(59,130,246,0.15)':'rgba(16,185,129,0.15)',
                                            color: itype==='card'?'#f59e0b':itype==='sneaker'?'#3b82f6':'#10b981'}}>{itype}</span></td>
                                        <td style={{fontWeight:'bold',color:'var(--accent)'}}>
                                            {getItemName(card)}
                                            {card.origin === 'collection' && <span title={`Moved from collection ${card.date_moved || ''}`} style={{fontSize:'8px',marginLeft:'6px',padding:'1px 4px',borderRadius:'3px',background:'rgba(139,92,246,0.15)',color:'#8b5cf6',fontWeight:600,cursor:'help'}}>From Collection</span>}
                                        </td>
                                        <td><span style={{fontSize:'10px',padding:'1px 6px',borderRadius:'3px',fontWeight:600,
                                            background: st==='collection'?'rgba(245,158,11,0.15)':st==='available'?'rgba(107,114,128,0.15)':st==='listed'?'rgba(59,130,246,0.15)':st==='completed'?'rgba(16,185,129,0.15)':st==='shipped'?'rgba(245,158,11,0.15)':'rgba(107,114,128,0.15)',
                                            color: st==='collection'?'#f59e0b':st==='available'?'#6b7280':st==='listed'?'#3b82f6':st==='completed'?'#10b981':st==='shipped'?'#f59e0b':'#6b7280'}}>{st}</span></td>
                                        <td>{formatCurrency(card.est_value||0)}</td>
                                        <td>{cost > 0 ? formatCurrency(cost) : '—'}</td>
                                        <td className={pl >= 0 ? 'positive' : 'negative'}>{cost > 0 ? `${pl >= 0 ? '+' : '-'}${formatCurrency(Math.abs(pl))}` : '—'}</td>
                                        <td>{card.origin === 'collection' ? <span title={card.date_moved} style={{cursor:'help'}}>Collection</span> : '—'}</td>
                                    </tr>);
                                })}
                            </tbody></table>
                        </div>
                    </div>
                </div>
                    )}
                </div>
            );
        };

        // Cash Flow Tab
        const CashFlowChart = ({ dailyData }) => {
            if (!dailyData || dailyData.length < 2) return null;
            const sorted = [...dailyData].reverse();
            const W = 800, H = 280, PAD = { top: 20, right: 20, bottom: 40, left: 70 };
            const plotW = W - PAD.left - PAD.right;
            const plotH = H - PAD.top - PAD.bottom;

            const allVals = sorted.flatMap(d => [d.cum_deployed, d.cum_received]);
            const maxVal = Math.max(...allVals, 1);
            const minVal = Math.min(...allVals, 0);
            const range = maxVal - minVal || 1;

            const x = (i) => PAD.left + (i / (sorted.length - 1)) * plotW;
            const y = (v) => PAD.top + plotH - ((v - minVal) / range) * plotH;

            const depLine = sorted.map((d, i) => `${x(i)},${y(d.cum_deployed)}`).join(' ');
            const recLine = sorted.map((d, i) => `${x((i))},${y(d.cum_received)}`).join(' ');

            const gridLines = 5;
            const gridVals = Array.from({ length: gridLines + 1 }, (_, i) => minVal + (range / gridLines) * i);

            const labelInterval = Math.max(1, Math.floor(sorted.length / 6));

            return (
                <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', maxHeight: '300px' }}>
                    {gridVals.map((v, i) => (
                        <g key={i}>
                            <line x1={PAD.left} y1={y(v)} x2={W - PAD.right} y2={y(v)} stroke="var(--border)" strokeWidth="1" />
                            <text x={PAD.left - 8} y={y(v) + 4} fill="var(--text-muted)" fontSize="10" textAnchor="end" fontFamily="Inter">
                                ${Math.round(v / 1000)}k
                            </text>
                        </g>
                    ))}
                    {sorted.map((d, i) => i % labelInterval === 0 ? (
                        <text key={i} x={x(i)} y={H - 8} fill="var(--text-muted)" fontSize="9" textAnchor="middle" fontFamily="Inter">
                            {d.date.slice(5)}
                        </text>
                    ) : null)}
                    <polyline points={depLine} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" />
                    <polyline points={recLine} fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinejoin="round" />
                    <g>
                        <rect x={W - PAD.right - 160} y={PAD.top} width="70" height="16" rx="3" fill="var(--bg-primary)" stroke="var(--border)" strokeWidth="0.5" />
                        <line x1={W - PAD.right - 155} y1={PAD.top + 8} x2={W - PAD.right - 140} y2={PAD.top + 8} stroke="var(--accent)" strokeWidth="2" />
                        <text x={W - PAD.right - 136} y={PAD.top + 12} fill="var(--text-primary)" fontSize="9" fontFamily="Inter">Deployed</text>
                        <rect x={W - PAD.right - 85} y={PAD.top} width="70" height="16" rx="3" fill="var(--bg-primary)" stroke="var(--border)" strokeWidth="0.5" />
                        <line x1={W - PAD.right - 80} y1={PAD.top + 8} x2={W - PAD.right - 65} y2={PAD.top + 8} stroke="#10b981" strokeWidth="2" />
                        <text x={W - PAD.right - 61} y={PAD.top + 12} fill="var(--text-primary)" fontSize="9" fontFamily="Inter">Received</text>
                    </g>
                </svg>
            );
        };

        const CashFlowTab = ({ onSetError }) => {
            const [cfData, setCfData] = useState(null);
            const [viewMode, setViewMode] = useState('daily');
            const [loading, setLoading] = useState(true);
            const [expandedDay, setExpandedDay] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ date: new Date().toISOString().slice(0, 10), type: 'deposit', amount: '', description: '' });
            const [chartRange, setChartRange] = useState('max');
            const [cashCollapsed, setCashCollapsed] = useState(true);
            const [cashSort, setCashSort] = useState({ key: 'date', dir: 'desc' });
            const [cashFilter, setCashFilter] = useState('all');

            const loadData = () => {
                fetch(`${API_BASE}/cash-flow`)
                    .then(r => r.json())
                    .then(d => { setCfData(d); setLoading(false); })
                    .catch(e => { onSetError('Failed to load cash flow data'); setLoading(false); });
            };

            useEffect(() => { loadData(); }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!form.amount || parseFloat(form.amount) <= 0) { onSetError('Amount must be positive'); return; }
                const payload = { ...form, amount: parseFloat(form.amount) };
                const url = editingId ? `${API_BASE}/cash-flows/${editingId}` : `${API_BASE}/cash-flows`;
                const method = editingId ? 'PUT' : 'POST';
                fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                    .then(r => r.json())
                    .then(() => {
                        setForm({ date: new Date().toISOString().slice(0, 10), type: 'deposit', amount: '', description: '' });
                        setShowForm(false);
                        setEditingId(null);
                        loadData();
                    })
                    .catch(() => onSetError('Failed to save cash flow entry'));
            };

            const handleEdit = (entry) => {
                setForm({ date: entry.date || '', type: entry.type || 'deposit', amount: String(entry.amount || ''), description: entry.description || '' });
                setEditingId(entry.id);
                setShowForm(true);
            };

            const handleDelete = (id) => {
                if (!confirm('Delete this cash flow entry?')) return;
                fetch(`${API_BASE}/cash-flows/${id}`, { method: 'DELETE' })
                    .then(() => loadData())
                    .catch(() => onSetError('Failed to delete'));
            };

            const filteredTotals = useMemo(() => {
                if (!cfData) return { total_deployed: 0, total_received: 0, net_flow: 0, transaction_count: 0 };
                const { events, totals } = cfData;
                if (chartRange === 'max') return totals;
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - chartRange);
                const cutoffStr = cutoff.toISOString().slice(0, 10);
                const filtered = (events || []).filter(e => e.date >= cutoffStr);
                const deployed = filtered.filter(e => e.direction === 'out').reduce((s, e) => s + e.amount, 0);
                const received = filtered.filter(e => e.direction === 'in').reduce((s, e) => s + e.amount, 0);
                return {
                    total_deployed: Math.round(deployed * 100) / 100,
                    total_received: Math.round(received * 100) / 100,
                    net_flow: Math.round((received - deployed) * 100) / 100,
                    transaction_count: filtered.length,
                };
            }, [cfData, chartRange]);

            if (loading) return <div className="card" style={{textAlign:'center',padding:'40px'}}>Loading cash flow data...</div>;
            if (!cfData) return null;

            const { events, daily, weekly, monthly, totals } = cfData;
            const rollupData = viewMode === 'daily' ? daily : viewMode === 'weekly' ? weekly : monthly;

            const fmt = (v) => '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const inputStyle = { padding: '8px 12px', background: 'var(--input-bg)', border: '1px solid var(--input-border)', borderRadius: '4px', color: 'var(--text-primary)', fontSize: '13px', width: '100%' };

            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px', marginBottom: '24px' }}>
                        <div className="stat-card">
                            <div className="stat-label">Capital Deployed ({chartRange === 'max' ? 'All Time' : chartRange <= 7 ? '1W' : chartRange <= 30 ? '1M' : chartRange <= 90 ? '3M' : '6M'})</div>
                            <div className="stat-value" style={{color: 'var(--accent)'}}>{fmt(filteredTotals.total_deployed)}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Capital Received ({chartRange === 'max' ? 'All Time' : chartRange <= 7 ? '1W' : chartRange <= 30 ? '1M' : chartRange <= 90 ? '3M' : '6M'})</div>
                            <div className="stat-value" style={{color: '#10b981'}}>{fmt(filteredTotals.total_received)}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Net Cash Flow ({chartRange === 'max' ? 'All Time' : chartRange <= 7 ? '1W' : chartRange <= 30 ? '1M' : chartRange <= 90 ? '3M' : '6M'})</div>
                            <div className={`stat-value ${filteredTotals.net_flow >= 0 ? 'positive' : 'negative'}`}>{filteredTotals.net_flow >= 0 ? '+' : '-'}{fmt(filteredTotals.net_flow)}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Transactions ({chartRange === 'max' ? 'All Time' : chartRange <= 7 ? '1W' : chartRange <= 30 ? '1M' : chartRange <= 90 ? '3M' : '6M'})</div>
                            <div className="stat-value">{filteredTotals.transaction_count}</div>
                        </div>
                    </div>

                    <div className="card" style={{ marginBottom: '24px', padding: '20px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)' }}>Cumulative Cash Flow</h3>
                            <div style={{ display: 'flex', gap: '4px' }}>
                                {[['1W', 7], ['1M', 30], ['3M', 90], ['6M', 180], ['Max', 'max']].map(([label, val]) => (
                                    <button key={label} onClick={() => setChartRange(val)}
                                        style={{
                                            padding: '4px 10px', fontSize: '11px', border: '1px solid var(--border)',
                                            borderRadius: '4px', cursor: 'pointer',
                                            background: chartRange === val ? 'var(--accent)' : 'transparent',
                                            color: chartRange === val ? '#fff' : '#a0aec0'
                                        }}>
                                        {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <CashFlowChart dailyData={(() => {
                            if (chartRange === 'max') return daily;
                            const cutoff = new Date();
                            cutoff.setDate(cutoff.getDate() - chartRange);
                            const cutoffStr = cutoff.toISOString().slice(0, 10);
                            return daily.filter(d => d.date >= cutoffStr);
                        })()} />
                    </div>

                    <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '16px' }}>
                        <button onClick={() => { setShowForm(!showForm); setEditingId(null); setForm({ date: new Date().toISOString().slice(0, 10), type: 'deposit', amount: '', description: '' }); }}
                            style={{ padding: '8px 16px', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontFamily: 'Oswald', fontSize: '14px' }}>
                            {showForm ? 'Cancel' : '+ Add Cash Flow'}
                        </button>
                    </div>

                    {showForm && (
                        <div className="card" style={{ marginBottom: '24px' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', marginBottom: '12px', color: 'var(--accent)' }}>{editingId ? 'Edit' : 'Add'} Cash Flow</h3>
                            <form onSubmit={handleSubmit} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px', alignItems: 'end' }}>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Date</label>
                                    <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} style={inputStyle} required />
                                </div>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Type</label>
                                    <select value={form.type} onChange={e => setForm({...form, type: e.target.value})} style={inputStyle}>
                                        <option value="deposit">Deposit</option>
                                        <option value="withdrawal">Withdrawal</option>
                                        <option value="dividend">Dividend</option>
                                    </select>
                                </div>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Amount</label>
                                    <input type="number" step="0.01" min="0.01" placeholder="0.00" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} style={inputStyle} required />
                                </div>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Description</label>
                                    <input type="text" placeholder="e.g. Fidelity deposit" value={form.description} onChange={e => setForm({...form, description: e.target.value})} style={inputStyle} />
                                </div>
                                <div>
                                    <button type="submit" style={{ padding: '8px 20px', background: '#10b981', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '13px', width: '100%' }}>
                                        {editingId ? 'Update' : 'Save'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {(cfData.cash_entries || []).length > 0 && (() => {
                        const filtered = cfData.cash_entries.filter(e => cashFilter === 'all' || e.type === cashFilter);
                        const sorted = [...filtered].sort((a, b) => {
                            let cmp = 0;
                            if (cashSort.key === 'date') cmp = (a.date || '').localeCompare(b.date || '');
                            else if (cashSort.key === 'amount') cmp = (a.amount || 0) - (b.amount || 0);
                            return cashSort.dir === 'desc' ? -cmp : cmp;
                        });
                        const toggleSort = (key) => setCashSort(prev => ({ key, dir: prev.key === key && prev.dir === 'asc' ? 'desc' : 'asc' }));
                        const arrow = (key) => cashSort.key === key ? (cashSort.dir === 'asc' ? ' ↑' : ' ↓') : '';
                        const depTotal = filtered.filter(e => e.type === 'deposit').reduce((s, e) => s + e.amount, 0);
                        const wdTotal = filtered.filter(e => e.type === 'withdrawal').reduce((s, e) => s + e.amount, 0);
                        return (
                        <div className="card" style={{ marginBottom: '24px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', marginBottom: cashCollapsed ? 0 : '12px' }}
                                onClick={() => setCashCollapsed(!cashCollapsed)}>
                                <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)' }}>
                                    {cashCollapsed ? '▸' : '▾'} Cash Deposits & Withdrawals ({cfData.cash_entries.length})
                                </h3>
                                <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                    In: <span className="positive">{fmt(depTotal)}</span> | Out: <span className="negative">{fmt(wdTotal)}</span> | Net: <span className={depTotal - wdTotal >= 0 ? 'positive' : 'negative'}>{depTotal - wdTotal >= 0 ? '+' : '-'}{fmt(Math.abs(depTotal - wdTotal))}</span>
                                </div>
                            </div>
                            {!cashCollapsed && (
                                <div>
                                    <div style={{ display: 'flex', gap: '4px', marginBottom: '10px' }}>
                                        {[['all','All'],['deposit','Deposits'],['withdrawal','Withdrawals'],['dividend','Dividends']].map(([k,label]) => (
                                            <button key={k} onClick={() => setCashFilter(k)}
                                                style={{ padding: '4px 10px', fontSize: '11px', border: '1px solid var(--border)', borderRadius: '4px', cursor: 'pointer',
                                                    background: cashFilter === k ? 'var(--accent)' : 'transparent', color: cashFilter === k ? '#fff' : 'var(--text-muted)' }}>
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="table-container">
                                        <table>
                                            <thead><tr>
                                                <th style={{cursor:'pointer'}} onClick={() => toggleSort('date')}>Date{arrow('date')}</th>
                                                <th>Type</th>
                                                <th style={{cursor:'pointer'}} onClick={() => toggleSort('amount')}>Amount{arrow('amount')}</th>
                                                <th>Description</th>
                                                <th>Actions</th>
                                            </tr></thead>
                                            <tbody>
                                                {sorted.map(entry => (
                                                    <tr key={entry.id}>
                                                        <td>{entry.date}</td>
                                                        <td style={{ textTransform: 'capitalize' }}>
                                                            {entry.type}
                                                            {entry.type === 'dividend' && <span style={{ fontSize: '9px', marginLeft: '6px', padding: '1px 5px', borderRadius: '3px', fontWeight: 600, color: 'var(--accent)', background: 'rgba(241,90,34,0.1)' }}>Dividend</span>}
                                                        </td>
                                                        <td className={entry.type === 'withdrawal' ? 'negative' : 'positive'}>{entry.type === 'withdrawal' ? '-' : '+'}{fmt(entry.amount)}</td>
                                                        <td>{entry.description}</td>
                                                        <td>
                                                            <button onClick={() => handleEdit(entry)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px', marginRight: '8px' }} title="Edit">✏️</button>
                                                            <button onClick={() => handleDelete(entry.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px' }} title="Delete">🗑️</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                        );
                    })()}

                    <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)' }}>Cash Flow Breakdown</h3>
                            <div style={{ display: 'flex', gap: '4px' }}>
                                {['daily', 'weekly', 'monthly'].map(mode => (
                                    <button key={mode} onClick={() => setViewMode(mode)}
                                        style={{
                                            padding: '6px 14px', fontSize: '12px', border: '1px solid var(--border)',
                                            borderRadius: '4px', cursor: 'pointer', textTransform: 'capitalize',
                                            background: viewMode === mode ? 'var(--accent)' : 'transparent',
                                            color: viewMode === mode ? '#fff' : '#a0aec0'
                                        }}>
                                        {mode}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>{viewMode === 'daily' ? 'Date' : 'Period'}</th>
                                        <th>Deployed</th>
                                        <th>Received</th>
                                        <th>Net Flow</th>
                                        <th>Cum. Deployed</th>
                                        <th>Cum. Received</th>
                                        <th>Cum. Net</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {rollupData.map((row, i) => {
                                        const key = row.date || row.period;
                                        const dayEvents = viewMode === 'daily' ? events.filter(e => e.date === row.date) : [];
                                        return (
                                            <React.Fragment key={i}>
                                                <tr onClick={() => viewMode === 'daily' && setExpandedDay(expandedDay === key ? null : key)}
                                                    style={{ cursor: viewMode === 'daily' ? 'pointer' : 'default' }}>
                                                    <td>{key} {viewMode === 'daily' && dayEvents.length > 0 && (expandedDay === key ? '▾' : '▸')}</td>
                                                    <td style={{color: row.deployed > 0 ? 'var(--accent)' : '#a0aec0'}}>{fmt(row.deployed)}</td>
                                                    <td style={{color: row.received > 0 ? '#10b981' : '#a0aec0'}}>{fmt(row.received)}</td>
                                                    <td className={row.net >= 0 ? 'positive' : 'negative'}>{row.net >= 0 ? '+' : '-'}{fmt(row.net)}</td>
                                                    <td>{fmt(row.cum_deployed)}</td>
                                                    <td>{fmt(row.cum_received)}</td>
                                                    <td className={row.cum_net >= 0 ? 'positive' : 'negative'}>{row.cum_net >= 0 ? '+' : '-'}{fmt(row.cum_net)}</td>
                                                </tr>
                                                {viewMode === 'daily' && expandedDay === key && dayEvents.map((ev, j) => (
                                                    <tr key={`${i}-${j}`} style={{ background: 'rgba(241,90,34,0.05)', fontSize: '12px' }}>
                                                        <td style={{ paddingLeft: '24px', color: 'var(--text-muted)' }}>
                                                            {ev.direction === 'out' ? '↗' : '↙'} {ev.description}
                                                            {ev.type === 'dividend' && <span style={{ fontSize: '9px', marginLeft: '6px', padding: '1px 5px', borderRadius: '3px', fontWeight: 600, color: 'var(--accent)', background: 'rgba(241,90,34,0.1)' }}>Dividend</span>}
                                                        </td>
                                                        <td>{ev.direction === 'out' ? fmt(ev.amount) : ''}</td>
                                                        <td>{ev.direction === 'in' ? fmt(ev.amount) : ''}</td>
                                                        <td colSpan="4" style={{ color: 'var(--text-muted)' }}>{ev.asset_type}</td>
                                                    </tr>
                                                ))}
                                            </React.Fragment>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Crypto Tab
        const CryptoTab = ({ data, tickerFilter, onClearFilter, onSetTickerFilter }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'asset', direction: 'asc' });
            const displayCrypto = tickerFilter ? data.crypto.filter(c => c.asset === tickerFilter) : data.crypto;
            const { interval, setInterval: setIv, getPL, getTotal, loading } = useIntervalPL(displayCrypto, 'asset', 'quantity');
            const crTotal = getTotal();

            const sortedCrypto = useMemo(() => {
                const sorted = [...displayCrypto];
                sorted.sort((a, b) => {
                    const aVal = a[sortConfig.key];
                    const bVal = b[sortConfig.key];
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
                return sorted;
            }, [data.crypto, sortConfig, tickerFilter]);

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            return (
                <div>
                <IntervalBar interval={interval} setInterval={setIv} total={crTotal} loading={loading} />
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                    <div className="stat-card">
                        <div className="stat-label">Crypto Portfolio Value</div>
                        <div className="stat-value" style={{ color: 'var(--accent)' }}>{formatCurrency(data.summary?.crypto_value || 0)}</div>
                    </div>
                </div>
                {tickerFilter && (
                    <div style={{ marginBottom: '12px', padding: '8px 16px', background: 'rgba(var(--accent), 0.1)', border: '1px solid var(--accent)', borderRadius: '6px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <span style={{ fontSize: '13px', fontFamily: 'Oswald, sans-serif' }}>Filtered: <strong style={{ color: 'var(--accent)' }}>{tickerFilter}</strong></span>
                        <button onClick={onClearFilter} style={{ background: 'none', border: '1px solid var(--text-muted)', borderRadius: '4px', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px 10px', fontSize: '11px' }}>Show All</button>
                    </div>
                )}
                <div style={{ marginBottom: '16px', display: 'flex', gap: '12px', alignItems: 'center' }}>
                    <select value={tickerFilter || ''} onChange={e => e.target.value ? onSetTickerFilter(e.target.value) : onClearFilter()}
                        className="search-box" style={{ maxWidth: '180px', padding: '6px 10px', fontSize: '12px' }}>
                        <option value="">Filter by asset...</option>
                        {[...new Set(data.crypto.map(c => c.asset))].sort().map(t => (
                            <option key={t} value={t}>{t}</option>
                        ))}
                    </select>
                </div>
                <div className="card">
                    <div className="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th onClick={() => handleSort('asset')}>
                                        Asset {sortConfig.key === 'asset' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('quantity')}>
                                        Quantity {sortConfig.key === 'quantity' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('avg_price')}>
                                        Avg Price {sortConfig.key === 'avg_price' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('current_price')}>
                                        Current Price {sortConfig.key === 'current_price' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('market_value')}>
                                        Market Value {sortConfig.key === 'market_value' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('pl_dollar')}>
                                        P/L ($) {sortConfig.key === 'pl_dollar' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => handleSort('pl_percent')}>
                                        P/L (%) {sortConfig.key === 'pl_percent' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {sortedCrypto.length === 0 ? (
                                    <tr>
                                        <td colSpan="7" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No crypto holdings</td>
                                    </tr>
                                ) : (
                                    sortedCrypto.map(crypto => {
                                        const { pl, pct, assetPct } = getPL(crypto);
                                        return (
                                        <tr key={crypto.id}>
                                            <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>{crypto.asset}</td>
                                            <td>{formatNumber(crypto.quantity, 8)}</td>
                                            <td>{formatCurrency(crypto.avg_price)}</td>
                                            <td>{formatCurrency(crypto.current_price)}</td>
                                            <td>{formatCurrency(crypto.market_value)}</td>
                                            <td className={pl >= 0 ? 'positive' : 'negative'}>
                                                {formatCurrency(pl)}
                                            </td>
                                            <td className={pct >= 0 ? 'positive' : 'negative'}>
                                                {formatPercent(pct)}
                                                {assetPct !== null && Math.abs(assetPct - pct) > 0.001 && (
                                                    <div style={{ fontSize: '10px', color: assetPct >= 0 ? '#10b981' : '#ef4444', opacity: 0.7 }}>
                                                        Asset: {assetPct >= 0 ? '+' : ''}{(assetPct * 100).toFixed(1)}%
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                        );})
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>

                {/* ─── ETH Institutional Intelligence ─── */}
                <ETHIntelligenceSection />
                </div>
            );
        };

        const ETHIntelligenceSection = () => {
            const [open, setOpen] = useState(true);
            const [etfFlows, setEtfFlows] = useState(null);
            const [cumPeriod, setCumPeriod] = useState('1m');
            const [cumData, setCumData] = useState(null);
            const [btcComp, setBtcComp] = useState(null);
            const [showBtc, setShowBtc] = useState(false);
            const [bmnrNav, setBmnrNav] = useState(null);
            const [staking, setStaking] = useState(null);
            const [editTreasury, setEditTreasury] = useState(false);
            const [treasuryForm, setTreasuryForm] = useState({ eth_holdings: '', eth_staked: '', staking_yield: '' });

            useEffect(() => {
                fetch(`${API_BASE}/etf-flows`).then(r=>r.json()).then(setEtfFlows).catch(()=>{});
                fetch(`${API_BASE}/bmnr-nav`).then(r=>r.json()).then(setBmnrNav).catch(()=>{});
                fetch(`${API_BASE}/staking`).then(r=>r.json()).then(setStaking).catch(()=>{});
            }, []);

            useEffect(() => {
                fetch(`${API_BASE}/etf-flows/cumulative?period=${cumPeriod}`).then(r=>r.json()).then(setCumData).catch(()=>{});
                if (showBtc) fetch(`${API_BASE}/etf-flows/btc-comparison?period=${cumPeriod}`).then(r=>r.json()).then(setBtcComp).catch(()=>{});
            }, [cumPeriod, showBtc]);

            const handleTreasuryUpdate = async () => {
                const body = {};
                if (treasuryForm.eth_holdings) body.eth_holdings = parseFloat(treasuryForm.eth_holdings);
                if (treasuryForm.eth_staked) body.eth_staked = parseFloat(treasuryForm.eth_staked);
                if (treasuryForm.staking_yield) body.staking_yield = parseFloat(treasuryForm.staking_yield);
                await fetch(`${API_BASE}/bmnr-nav/treasury`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                fetch(`${API_BASE}/bmnr-nav`).then(r=>r.json()).then(setBmnrNav).catch(()=>{});
                fetch(`${API_BASE}/staking`).then(r=>r.json()).then(setStaking).catch(()=>{});
                setEditTreasury(false);
            };

            const fmtM = (n) => n != null ? `${n >= 0 ? '+' : ''}$${Math.abs(n).toFixed(1)}M` : '—';
            const flowColor = (n) => (n || 0) >= 0 ? '#10b981' : '#ef4444';

            // Compute summary stats from flows
            const flows = etfFlows?.flows || [];
            const yesterday = flows.length > 0 ? flows[flows.length - 1] : null;
            const sum7d = flows.slice(-7).reduce((s, d) => s + (d.Total || 0), 0);
            const sum30d = flows.slice(-30).reduce((s, d) => s + (d.Total || 0), 0);
            const sumAll = flows.reduce((s, d) => s + (d.Total || 0), 0);

            // Streak
            let streak = 0, streakTotal = 0, lastSign = null;
            for (let i = flows.length - 1; i >= 0; i--) {
                const v = flows[i].Total || 0;
                const sign = v > 0 ? 1 : v < 0 ? -1 : 0;
                if (sign === 0) continue;
                if (lastSign === null) lastSign = sign;
                if (sign === lastSign) { streak++; streakTotal += v; } else break;
            }

            return (
                <div style={{ marginTop: '20px' }}>
                    <div onClick={() => setOpen(!open)} style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-muted)', marginBottom: open ? '16px' : '0', userSelect: 'none', display: 'flex', alignItems: 'center', gap: '8px' }}>
                        {open ? '▾' : '▸'} <span style={{ fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '14px', color: 'var(--text-primary)' }}>ETH Institutional Intelligence</span>
                    </div>
                    {open && (<>

                    {/* ── Section 2A: ETF Flows ── */}
                    <div style={{ marginBottom: '20px' }}>
                        <div style={{ fontFamily: 'Oswald', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--text-muted)', marginBottom: '12px' }}>ETH ETF Flows</div>

                        {/* 5 stat cards */}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '10px', marginBottom: '14px' }}>
                            <div className="stat-card"><div className="stat-label">Yesterday</div><div className="stat-value" style={{fontSize:'18px',color:flowColor(yesterday?.Total)}}>{fmtM(yesterday?.Total)}</div></div>
                            <div className="stat-card"><div className="stat-label">7-Day</div><div className="stat-value" style={{fontSize:'18px',color:flowColor(sum7d)}}>{fmtM(sum7d)}</div></div>
                            <div className="stat-card"><div className="stat-label">30-Day</div><div className="stat-value" style={{fontSize:'18px',color:flowColor(sum30d)}}>{fmtM(sum30d)}</div></div>
                            <div className="stat-card"><div className="stat-label">YTD</div><div className="stat-value" style={{fontSize:'18px',color:flowColor(sumAll)}}>{fmtM(sumAll)}</div></div>
                            <div className="stat-card"><div className="stat-label">Streak</div><div className="stat-value" style={{fontSize:'18px',color:flowColor(streakTotal)}}>{streak > 0 ? `${streak}d ${lastSign > 0 ? '↑' : '↓'}` : '—'}</div></div>
                        </div>

                        {/* Daily Flow Table (last 10) */}
                        {flows.length > 0 && (
                            <div className="card" style={{ marginBottom: '14px' }}>
                                <div className="table-container">
                                    <table><thead><tr>
                                        <th>Date</th><th>Total</th>
                                        {Object.keys(flows[0]).filter(k => k !== 'date' && k !== 'Total').slice(0, 6).map(k => <th key={k}>{k}</th>)}
                                    </tr></thead><tbody>
                                        {flows.slice(-10).reverse().map((d, i) => (
                                            <tr key={i}>
                                                <td>{d.date}</td>
                                                <td style={{fontWeight:'bold',color:flowColor(d.Total)}}>{fmtM(d.Total)}</td>
                                                {Object.keys(flows[0]).filter(k => k !== 'date' && k !== 'Total').slice(0, 6).map(k => (
                                                    <td key={k} style={{color: flowColor(d[k])}}>{d[k] ? `${d[k] > 0 ? '+' : ''}${d[k].toFixed(1)}` : '—'}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody></table>
                                </div>
                            </div>
                        )}

                        {/* Cumulative Flow Chart */}
                        <div className="card" style={{ padding: '16px', marginBottom: '14px' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-primary)' }}>Cumulative Net Flows</div>
                                <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                                    {['1w','1m','3m','ytd'].map(p => (
                                        <button key={p} onClick={() => setCumPeriod(p)} style={{
                                            padding: '2px 8px', fontSize: '10px', borderRadius: '3px', cursor: 'pointer',
                                            border: cumPeriod === p ? '1px solid var(--accent)' : '1px solid var(--border)',
                                            background: cumPeriod === p ? 'rgba(241,90,34,0.1)' : 'transparent',
                                            color: cumPeriod === p ? 'var(--accent)' : 'var(--text-muted)',
                                        }}>{p.toUpperCase()}</button>
                                    ))}
                                    <button onClick={() => setShowBtc(!showBtc)} style={{
                                        padding: '2px 8px', fontSize: '10px', borderRadius: '3px', cursor: 'pointer', marginLeft: '8px',
                                        border: showBtc ? '1px solid #f59e0b' : '1px solid var(--border)',
                                        background: showBtc ? 'rgba(245,158,11,0.1)' : 'transparent',
                                        color: showBtc ? '#f59e0b' : 'var(--text-muted)',
                                    }}>{showBtc ? 'Hide BTC' : 'vs BTC'}</button>
                                </div>
                            </div>
                            {cumData && cumData.data && cumData.data.length > 1 && (() => {
                                const pts = cumData.data;
                                const W = 700, H = 180, PAD = { l: 60, r: 20, t: 10, b: 30 };
                                const pW = W - PAD.l - PAD.r, pH = H - PAD.t - PAD.b;
                                const allVals = pts.map(p => p.cumulative);
                                if (showBtc && btcComp?.btc) btcComp.btc.forEach(b => allVals.push(b.cumulative));
                                const maxV = Math.max(...allVals, 0), minV = Math.min(...allVals, 0);
                                const range = maxV - minV || 1;
                                const x = (i, len) => PAD.l + (i / Math.max(len - 1, 1)) * pW;
                                const y = (v) => PAD.t + pH - ((v - minV) / range) * pH;
                                const zeroY = y(0);
                                const ethLine = pts.map((p, i) => `${x(i, pts.length)},${y(p.cumulative)}`).join(' ');
                                const ethArea = `${PAD.l},${zeroY} ${ethLine} ${x(pts.length-1, pts.length)},${zeroY}`;
                                const lastVal = pts[pts.length-1].cumulative;
                                return (
                                    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
                                        <line x1={PAD.l} y1={zeroY} x2={W-PAD.r} y2={zeroY} stroke="var(--text-muted)" strokeWidth="0.5" strokeDasharray="4" />
                                        <polygon points={ethArea} fill={lastVal >= 0 ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'} />
                                        <polyline points={ethLine} fill="none" stroke={lastVal >= 0 ? '#10b981' : '#ef4444'} strokeWidth="2" />
                                        {showBtc && btcComp?.btc && btcComp.btc.length > 1 && (
                                            <polyline points={btcComp.btc.map((b, i) => `${x(i, btcComp.btc.length)},${y(b.cumulative)}`).join(' ')}
                                                fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4" />
                                        )}
                                        {pts.filter((_, i) => i % Math.max(1, Math.floor(pts.length / 6)) === 0).map((p, i) => (
                                            <text key={i} x={x(pts.indexOf(p), pts.length)} y={H - 6} fill="var(--text-muted)" fontSize="9" textAnchor="middle">{(p.date || '').slice(5)}</text>
                                        ))}
                                        <text x={PAD.l - 4} y={y(maxV) + 4} fill="var(--text-muted)" fontSize="9" textAnchor="end">${Math.round(maxV)}M</text>
                                        <text x={PAD.l - 4} y={y(minV) + 4} fill="var(--text-muted)" fontSize="9" textAnchor="end">${Math.round(minV)}M</text>
                                    </svg>
                                );
                            })()}
                            {showBtc && btcComp && (
                                <div style={{ display: 'flex', gap: '16px', marginTop: '8px', fontSize: '11px' }}>
                                    <span><span style={{display:'inline-block',width:'10px',height:'2px',background:'#10b981',marginRight:'4px',verticalAlign:'middle'}} />ETH: {fmtM(btcComp.eth_total)}</span>
                                    <span><span style={{display:'inline-block',width:'10px',height:'2px',background:'#f59e0b',marginRight:'4px',verticalAlign:'middle',borderBottom:'1px dashed #f59e0b'}} />BTC: {fmtM(btcComp.btc_total)}</span>
                                </div>
                            )}
                            {cumData?.total != null && <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Period total: <strong style={{color:flowColor(cumData.total)}}>{fmtM(cumData.total)}</strong></div>}
                        </div>
                        {etfFlows?.last_updated && <div style={{ fontSize: '9px', color: 'var(--text-muted)', marginBottom: '16px' }}>Data as of: {new Date(etfFlows.last_updated).toLocaleString()}{etfFlows.stale && <span style={{color:'#eab308',marginLeft:'6px'}}>Data may be stale</span>}</div>}
                    </div>

                    {/* ── Section 2B: BMNR NAV Premium/Discount ── */}
                    {bmnrNav && !bmnrNav.error && (
                        <div style={{ marginBottom: '20px' }}>
                            <div style={{ fontFamily: 'Oswald', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--text-muted)', marginBottom: '12px' }}>BMNR NAV Premium / Discount</div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', marginBottom: '14px' }}>
                                <div className="stat-card" style={{ borderLeft: `3px solid ${bmnrNav.premium_discount_pct <= 0 ? '#10b981' : bmnrNav.premium_discount_pct > 25 ? '#ef4444' : '#f59e0b'}` }}>
                                    <div className="stat-label">NAV {bmnrNav.premium_discount_pct >= 0 ? 'Premium' : 'Discount'}</div>
                                    <div className="stat-value" style={{ fontSize: '28px', color: bmnrNav.premium_discount_pct <= 0 ? '#10b981' : bmnrNav.premium_discount_pct > 25 ? '#ef4444' : '#f59e0b' }}>
                                        {bmnrNav.premium_discount_pct >= 0 ? '+' : ''}{bmnrNav.premium_discount_pct.toFixed(1)}%
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>
                                        Mkt Cap: {formatCurrency(bmnrNav.market_cap)} | NAV: {formatCurrency(bmnrNav.nav)}
                                    </div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                        {(bmnrNav.eth_holdings / 1e6).toFixed(3)}M ETH @ {formatCurrency(bmnrNav.eth_price)} | {bmnrNav.shares_outstanding ? `${(bmnrNav.shares_outstanding / 1e6).toFixed(1)}M shares` : ''}
                                    </div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">BMNR Price</div>
                                    <div className="stat-value" style={{ fontSize: '20px' }}>{formatCurrency(bmnrNav.bmnr_price)}</div>
                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>NAV/share: {formatCurrency(bmnrNav.nav_per_share)}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">BMNU (2x) Implied</div>
                                    <div className="stat-value" style={{ fontSize: '20px', color: bmnrNav.bmnu_implied_pct <= 0 ? '#10b981' : '#f59e0b' }}>
                                        {bmnrNav.bmnu_implied_pct >= 0 ? '+' : ''}{bmnrNav.bmnu_implied_pct.toFixed(1)}%
                                    </div>
                                    <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>2x leveraged exposure</div>
                                </div>
                            </div>

                            {/* NAV History Chart */}
                            {bmnrNav.history && bmnrNav.history.length > 1 && (() => {
                                const hist = bmnrNav.history;
                                const W = 700, H = 140, PAD = { l: 50, r: 20, t: 10, b: 25 };
                                const pW = W - PAD.l - PAD.r, pH = H - PAD.t - PAD.b;
                                const vals = hist.map(h => h.premium_discount_pct);
                                const maxV = Math.max(...vals, 5), minV = Math.min(...vals, -5);
                                const range = maxV - minV || 1;
                                const x = (i) => PAD.l + (i / Math.max(hist.length - 1, 1)) * pW;
                                const y = (v) => PAD.t + pH - ((v - minV) / range) * pH;
                                const zeroY = y(0);
                                const line = hist.map((h, i) => `${x(i)},${y(h.premium_discount_pct)}`).join(' ');
                                return (
                                    <div className="card" style={{ padding: '12px', marginBottom: '12px' }}>
                                        <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '8px' }}>NAV Premium/Discount History</div>
                                        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto' }}>
                                            <line x1={PAD.l} y1={zeroY} x2={W-PAD.r} y2={zeroY} stroke="var(--text-muted)" strokeWidth="0.5" strokeDasharray="4" />
                                            <polyline points={line} fill="none" stroke="var(--accent)" strokeWidth="2" />
                                            <text x={PAD.l - 4} y={zeroY + 3} fill="var(--text-muted)" fontSize="9" textAnchor="end">0%</text>
                                        </svg>
                                    </div>
                                );
                            })()}

                            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                <button onClick={() => { setTreasuryForm({ eth_holdings: bmnrNav.eth_holdings || '', eth_staked: bmnrNav.treasury?.eth_staked || '', staking_yield: bmnrNav.treasury?.staking_yield || '' }); setEditTreasury(!editTreasury); }}
                                    className="button" style={{ fontSize: '10px', padding: '3px 8px' }}>✏️ Update Treasury</button>
                                {bmnrNav.last_updated && <span style={{ fontSize: '9px', color: 'var(--text-muted)' }}>Data as of: {new Date(bmnrNav.last_updated).toLocaleString()}</span>}
                            </div>
                            {editTreasury && (
                                <div className="card" style={{ padding: '12px', marginTop: '8px', display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'flex-end' }}>
                                    <div className="form-group" style={{margin:0,flex:'1 1 140px'}}><label style={{fontSize:'10px'}}>ETH Holdings</label><input type="number" value={treasuryForm.eth_holdings} onChange={e => setTreasuryForm({...treasuryForm, eth_holdings: e.target.value})} style={{padding:'4px 8px',fontSize:'12px'}} /></div>
                                    <div className="form-group" style={{margin:0,flex:'1 1 140px'}}><label style={{fontSize:'10px'}}>ETH Staked</label><input type="number" value={treasuryForm.eth_staked} onChange={e => setTreasuryForm({...treasuryForm, eth_staked: e.target.value})} style={{padding:'4px 8px',fontSize:'12px'}} /></div>
                                    <div className="form-group" style={{margin:0,flex:'1 1 100px'}}><label style={{fontSize:'10px'}}>Yield (decimal)</label><input type="number" step="0.001" value={treasuryForm.staking_yield} onChange={e => setTreasuryForm({...treasuryForm, staking_yield: e.target.value})} style={{padding:'4px 8px',fontSize:'12px'}} /></div>
                                    <button className="button button-primary" onClick={handleTreasuryUpdate} style={{fontSize:'11px',padding:'6px 14px'}}>Save</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ── Section 2C: Staking Analytics ── */}
                    {staking && (
                        <div style={{ marginBottom: '20px' }}>
                            <div style={{ fontFamily: 'Oswald', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--text-muted)', marginBottom: '12px' }}>Staking Analytics</div>

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '10px', marginBottom: '14px' }}>
                                <div className="stat-card">
                                    <div className="stat-label">BMNR Treasury</div>
                                    <div className="stat-value" style={{ fontSize: '18px' }}>{(staking.eth_holdings / 1e6).toFixed(3)}M ETH</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Staked ({staking.staking_provider})</div>
                                    <div className="stat-value" style={{ fontSize: '18px', color: '#10b981' }}>{(staking.eth_staked / 1e6).toFixed(2)}M ({staking.staked_pct}%)</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Mavan APR</div>
                                    <div className="stat-value" style={{ fontSize: '18px' }}>{(staking.staking_yield * 100).toFixed(2)}%</div>
                                    {staking.lido_apr != null && <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>Lido: {(staking.lido_apr * 100).toFixed(2)}%</div>}
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Annual Yield</div>
                                    <div className="stat-value" style={{ fontSize: '18px', color: '#10b981' }}>
                                        {staking.eth_price ? formatCurrency(staking.annual_yield_usd) : `${staking.annual_yield_eth.toLocaleString()} ETH`}
                                    </div>
                                    <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{staking.annual_yield_eth.toLocaleString()} ETH/yr</div>
                                </div>
                            </div>

                            {/* Staked vs Unstaked donut */}
                            {staking.eth_holdings > 0 && (() => {
                                const stakedPct = staking.staked_pct / 100;
                                const dashStaked = stakedPct * 251.2;
                                return (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '16px', padding: '12px', background: 'rgba(255,255,255,0.02)', borderRadius: '8px', marginBottom: '12px' }}>
                                        <svg viewBox="0 0 80 80" style={{ width: '60px', height: '60px', flexShrink: 0 }}>
                                            <circle cx="40" cy="40" r="32" fill="none" stroke="#10b981" strokeWidth="10"
                                                strokeDasharray={`${dashStaked} ${251.2 - dashStaked}`} strokeDashoffset="0" transform="rotate(-90 40 40)" />
                                            <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" strokeWidth="10"
                                                strokeDasharray={`${251.2 - dashStaked} ${dashStaked}`} strokeDashoffset={`${-dashStaked}`} transform="rotate(-90 40 40)" />
                                            <text x="40" y="42" textAnchor="middle" fill="var(--text-primary)" fontSize="10" fontWeight="700">{staking.staked_pct}%</text>
                                        </svg>
                                        <div style={{ fontSize: '11px', color: 'var(--text-muted)', display: 'flex', flexDirection: 'column', gap: '3px' }}>
                                            <span><span style={{display:'inline-block',width:'8px',height:'8px',borderRadius:'2px',background:'#10b981',marginRight:'4px'}} />Staked: {(staking.eth_staked / 1e6).toFixed(2)}M ETH via {staking.staking_provider}</span>
                                            <span><span style={{display:'inline-block',width:'8px',height:'8px',borderRadius:'2px',background:'var(--border)',marginRight:'4px'}} />Unstaked: {((staking.eth_holdings - staking.eth_staked) / 1e6).toFixed(2)}M ETH</span>
                                        </div>
                                    </div>
                                );
                            })()}
                            {staking.last_updated && <div style={{ fontSize: '9px', color: 'var(--text-muted)' }}>Data as of: {new Date(staking.last_updated).toLocaleString()} | Treasury updated: {staking.treasury_updated || '—'}</div>}
                        </div>
                    )}

                    </>)}
                    <div style={{textAlign:'center',padding:'24px 0 12px',fontSize:'11px',color:'var(--text-muted)',borderTop:'1px solid var(--border)',marginTop:'40px'}}>
                        Built by <a href="https://github.com/edwardespinal-prog" target="_blank" rel="noopener" style={{color:'var(--accent)',textDecoration:'none'}}>Ed Espinal</a> · WheelHouse v1.0
                    </div>
                </div>
            );
        };

        // Render app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
