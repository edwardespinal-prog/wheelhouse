                                                    <span style={{ fontWeight: 700, fontSize: span > 15 ? '14px' : '11px', color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.5)' }}>{tile.ticker}</span>
                                                    <span style={{ fontSize: span > 15 ? '12px' : '10px', color: '#fff', textShadow: '0 1px 2px rgba(0,0,0,0.5)', fontWeight: 600 }}>
                                                        {(tile.daily_change_pct || 0) >= 0 ? '+' : ''}{(tile.daily_change_pct || 0).toFixed(2)}%
                                                    </span>
                                                    {span > 12 && <span style={{ fontSize: '10px', color: 'rgba(255,255,255,0.8)', textShadow: '0 1px 2px rgba(0,0,0,0.4)' }}>${tile.price?.toFixed(2)}</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })()}
                        </div>
                    )}

                    {loading ? <div style={{textAlign:'center',padding:'40px'}}><Spinner /></div> : (
                        <div>
                            {/* Feature 2: What's Moving & Why */}
                            {filter === 'all' && moversWithNews.length > 0 && (
                                <div style={{ marginBottom: '24px' }}>
                                    <h3 style={{ color: 'var(--accent)', fontSize: '14px', fontWeight: 600, marginBottom: '10px', fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', letterSpacing: '1px' }}>
                                        What's Moving & Why
                                    </h3>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: '8px' }}>
                                        {moversWithNews.map(m => (
                                            <a key={m.ticker} href={m.article?.url || '#'} target={m.article ? '_blank' : '_self'} rel="noopener noreferrer"
                                                style={{ textDecoration: 'none', color: 'inherit' }}>
                                                <div className="card" style={{ padding: '14px 16px', cursor: m.article ? 'pointer' : 'default', display: 'flex', gap: '14px', alignItems: 'flex-start',
                                                    borderLeft: `3px solid ${m.direction === 'up' ? 'var(--positive)' : 'var(--negative)'}` }}>
                                                    <div style={{ minWidth: '70px' }}>
                                                        <div style={{ fontWeight: 700, fontSize: '14px', color: 'var(--accent)' }}>{m.ticker}</div>
                                                        <div style={{ fontSize: '13px', color: 'var(--text-primary)' }}>${m.price}</div>
                                                        <div style={{ fontSize: '13px', fontWeight: 600, color: m.direction === 'up' ? 'var(--positive)' : 'var(--negative)' }}>
                                                            {m.change_pct >= 0 ? '+' : ''}{m.change_pct}%
                                                        </div>
                                                    </div>
                                                    <div style={{ flex: 1, minWidth: 0 }}>
                                                        {m.article ? (
                                                            <>
                                                                <div style={{ fontSize: '13px', fontWeight: 500, lineHeight: 1.4, marginBottom: '4px',
                                                                    display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                                                                    {m.article.title}
                                                                </div>
                                                                <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                                                                    <span style={{ fontSize: '10px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600,
                                                                        color: sentimentColor(m.article.sentiment),
                                                                        background: m.article.sentiment === 'bullish' ? 'rgba(16,185,129,0.1)' : m.article.sentiment === 'bearish' ? 'rgba(239,68,68,0.1)' : 'rgba(160,174,192,0.1)' }}>
                                                                        {sentimentLabel(m.article.sentiment)}
                                                                    </span>
                                                                    <span style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{m.article.source}</span>
                                                                    <span style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{formatTimeAgo(m.article.published_ts)}</span>
                                                                </div>
                                                            </>
                                                        ) : (
                                                            <div style={{ fontSize: '12px', color: 'var(--text-muted)', fontStyle: 'italic', marginTop: '8px' }}>
                                                                No recent coverage
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Latest Headlines (demoted from old Today's Headlines) */}
                            {filter === 'all' && (() => {
                                const now = Date.now() / 1000;
                                const recent = articles.filter(a => (a.published_ts || 0) > now - 86400 && !a.is_macro).slice(0, 6);
                                return recent.length > 0 ? (
                                    <div style={{ marginBottom: '24px' }}>
                                        <h3 style={{ color: 'var(--accent)', fontSize: '14px', fontWeight: 600, marginBottom: '10px', fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', letterSpacing: '1px' }}>
                                            Latest Headlines
                                        </h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(340px, 1fr))', gap: '8px' }}>
                                            {recent.map((a, i) => <ArticleCard key={`latest-${i}`} a={a} compact={false} />)}
                                        </div>
                                    </div>
                                ) : null;
                            })()}

                            {/* Alerts notice */}
                            {filter === 'alerts' && filtered.length === 0 && (
                                <div className="card" style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '40px', marginBottom: '16px' }}>
                                    No alerts today — all quiet
                                </div>
                            )}

                            {/* Full Feed */}
                            <div>
                                <h3 style={{ color: 'var(--accent)', fontSize: '14px', fontWeight: 600, marginBottom: '10px', fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', letterSpacing: '1px' }}>
                                    {filter === 'all' ? 'All Articles' : filter === 'portfolio' ? 'My Portfolio' : filter === 'macro' ? 'Market News' : filter === 'alerts' ? 'Actionable Alerts' : `${filter} News`}
                                    <span style={{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 400, marginLeft: '8px', textTransform: 'none', letterSpacing: 0 }}>
                                        ({filtered.length} articles{sortMode === 'relevance' ? ', by relevance' : ', latest first'})
                                    </span>
                                </h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                    {filtered.length === 0 && filter !== 'alerts' && <div className="card" style={{textAlign:'center',color:'var(--text-muted)',padding:'40px'}}>No news articles found</div>}
                                    {filtered.map((a, i) => <ArticleCard key={`feed-${i}`} a={a} compact={true} />)}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Interval P/L selector (shared by Equities, Options, Crypto tabs)
        const INTERVALS = [
            { key: 'all', label: 'ALL' },
            { key: '1d', label: '1D' },
            { key: '1w', label: '1W' },
            { key: '1m', label: '1M' },
            { key: '3m', label: '3M' },
            { key: 'ytd', label: 'YTD' },
            { key: '1y', label: '1Y' },
        ];

        const useIntervalPL = (positions, tickerKey, qtyKey) => {
            const [interval, setInterval] = useState('all');
            const [histPrices, setHistPrices] = useState({});
            const [loading, setLoading] = useState(false);

            const getLookupKey = (ticker) => {
                if (tickerKey === 'asset') {
                    const map = { ETH: 'ETH-USD', BTC: 'BTC-USD' };
                    return map[ticker] || (ticker + '-USD');
                }
                return ticker;
            };

            // Compute interval start date for acquisition capping
            const getIntervalStartDate = () => {
                const now = new Date();
                const daysMap = { '1d': 1, '1w': 7, '1m': 30, '3m': 90, '1y': 365 };
                if (interval === 'ytd') return `${now.getFullYear()}-01-01`;
                const days = daysMap[interval];
                if (!days) return '';
                const start = new Date(now);
                start.setDate(start.getDate() - days);
                return start.toISOString().split('T')[0];
            };

            useEffect(() => {
                if (interval === 'all') { setHistPrices({}); return; }
                const tickers = positions.map(p => getLookupKey(p[tickerKey] || ''))
                    .filter(t => t && !['OPENZ','OPENL','OPENW'].includes(t));
                if (tickers.length === 0) return;
                setLoading(true);
                fetch(`${API_BASE}/prices/historical?tickers=${tickers.join(',')}&period=${interval}`)
                    .then(r => r.json())
                    .then(data => { setHistPrices(data); setLoading(false); })
                    .catch(() => setLoading(false));
            }, [interval, positions.length]);

            const getPL = (pos) => {
                if (interval === 'all') return { pl: pos.pl_dollar || 0, pct: pos.pl_percent || 0, assetPct: null };
                const lookupKey = getLookupKey(pos[tickerKey] || '');
                const startPrice = histPrices[lookupKey];
                const curPrice = tickerKey === 'asset' ? pos.current_price : pos.live_price;
                if (!startPrice || !curPrice) return { pl: pos.pl_dollar || 0, pct: pos.pl_percent || 0, assetPct: null };

                const qty = pos[qtyKey] || 0;
                // Asset performance over full interval (uncapped)
                const assetPct = startPrice > 0 ? (curPrice - startPrice) / startPrice : 0;

                // Your P/L: cap at acquisition date
                const acqDate = pos.date_acquired || '';
                const intervalStart = getIntervalStartDate();
                const costPrice = tickerKey === 'asset' ? pos.avg_price : pos.avg_cost;
                const acquiredAfterInterval = acqDate && intervalStart && acqDate > intervalStart;

                if (acquiredAfterInterval && costPrice) {
                    // You bought after interval start — use your cost basis
                    const pl = (curPrice - costPrice) * qty;
                    const pct = costPrice > 0 ? (curPrice - costPrice) / costPrice : 0;
                    return { pl, pct, assetPct };
                }
                // You held before interval start — use interval price
                const pl = (curPrice - startPrice) * qty;
                return { pl, pct: assetPct, assetPct };
            };

            const getTotal = () => {
                let totalPL = 0, totalStart = 0, totalCur = 0;
                let assetStart = 0, assetCur = 0;
                positions.forEach(pos => {
                    if (interval === 'all') {
                        totalPL += (pos.pl_dollar || 0);
                        totalStart += (tickerKey === 'asset' ? pos.avg_price * pos[qtyKey] : (pos.total_invested || 0));
                        totalCur += (pos.market_value || 0);
                    } else {
                        const { pl } = getPL(pos);
                        totalPL += pl;
                        const lookupKey = getLookupKey(pos[tickerKey] || '');
                        const startPrice = histPrices[lookupKey];
                        const curPrice = tickerKey === 'asset' ? pos.current_price : pos.live_price;
                        const qty = pos[qtyKey] || 0;
                        const costPrice = tickerKey === 'asset' ? pos.avg_price : pos.avg_cost;
                        const acqDate = pos.date_acquired || '';
                        const intervalStart = getIntervalStartDate();
                        const acquiredAfterInterval = acqDate && intervalStart && acqDate > intervalStart;

                        if (startPrice) {
                            // Your total: use capped reference
                            const ref = acquiredAfterInterval && costPrice ? costPrice : startPrice;
                            totalStart += ref * qty;
                            totalCur += curPrice * qty;
                            // Asset total: always use interval price
                            assetStart += startPrice * qty;
                            assetCur += curPrice * qty;
                        }
                    }
                });
                const totalPct = totalStart > 0 ? (totalCur - totalStart) / totalStart : 0;
                const assetPct = assetStart > 0 ? (assetCur - assetStart) / assetStart : 0;
                return { totalPL, totalPct, assetPct };
            };

            return { interval, setInterval, getPL, getTotal, loading };
        };

        const IntervalBar = ({ interval, setInterval, total, loading }) => (
            <div className="card" style={{ marginBottom: '16px', padding: '12px 16px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '8px' }}>
                    <div style={{ display: 'flex', gap: '4px', flexWrap: 'wrap' }}>
                        {INTERVALS.map(iv => (
                            <button key={iv.key}
                                onClick={() => setInterval(iv.key)}
                                style={{
                                    padding: '4px 12px', borderRadius: '4px', border: '1px solid',
                                    borderColor: interval === iv.key ? '#003DA5' : 'rgba(255,255,255,0.15)',
                                    background: interval === iv.key ? 'rgba(0,61,165,0.2)' : 'transparent',
                                    color: interval === iv.key ? '#00d4ff' : 'var(--text-muted)',
                                    cursor: 'pointer',
                                    fontSize: '13px', fontFamily: 'Oswald, sans-serif',
                                }}
                            >{iv.label}</button>
                        ))}
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                        {loading && <span style={{ color: 'var(--text-muted)', fontSize: '12px' }}>Loading...</span>}
                        <div style={{ textAlign: 'right' }}>
                            <div>
                                <span style={{ color: 'var(--text-muted)', fontSize: '11px', marginRight: '8px' }}>{interval === 'all' ? 'Cost Basis' : interval.toUpperCase()} P/L</span>
                                <span style={{ color: total.totalPL >= 0 ? 'var(--positive)' : 'var(--negative)', fontSize: '18px', fontWeight: '700', fontFamily: 'Oswald, sans-serif' }}>
                                    {total.totalPL >= 0 ? '+' : ''}{formatCurrency(total.totalPL)}
                                </span>
                                <span style={{ color: total.totalPct >= 0 ? 'var(--positive)' : 'var(--negative)', fontSize: '14px', marginLeft: '8px', fontFamily: 'Oswald, sans-serif' }}>
                                    ({total.totalPct >= 0 ? '+' : ''}{(total.totalPct * 100).toFixed(2)}%)
                                </span>
                            </div>
                            {interval !== 'all' && total.assetPct !== undefined && Math.abs(total.assetPct - total.totalPct) > 0.001 && (
                                <div style={{ marginTop: '2px' }}>
                                    <span style={{ color: 'var(--text-muted)', fontSize: '11px', marginRight: '8px' }}>Asset {interval.toUpperCase()}</span>
                                    <span style={{ color: total.assetPct >= 0 ? 'var(--positive)' : 'var(--negative)', fontSize: '13px', fontWeight: '600', fontFamily: 'Oswald, sans-serif' }}>
                                        {total.assetPct >= 0 ? '+' : ''}{(total.assetPct * 100).toFixed(2)}%
                                    </span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );

        // Equities Tab
        const EquitiesTab = ({ data, onSetData, onSetError, onSetSuccess, tickerFilter, onClearFilter, onSetTickerFilter }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'ticker', direction: 'asc' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                ticker: '',
                quantity: '',
                avg_cost: ''
            });
            const displayEquities = tickerFilter ? data.equities.filter(e => e.ticker === tickerFilter) : data.equities;
            const { interval, setInterval: setIv, getPL, getTotal, loading } = useIntervalPL(displayEquities, 'ticker', 'quantity');
            const eqTotal = getTotal();

            const sortedEquities = useMemo(() => {
                const sorted = [...displayEquities];
                sorted.sort((a, b) => {
                    const aVal = a[sortConfig.key];
                    const bVal = b[sortConfig.key];
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
                return sorted;
            }, [data.equities, sortConfig, tickerFilter]);

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            const handleAddEdit = async () => {
                try {
                    const payload = {
                        ticker: formData.ticker.toUpperCase(),
                        quantity: parseFloat(formData.quantity),
                        avg_cost: parseFloat(formData.avg_cost)
                    };

                    if (editingId) {
                        await fetch(`${API_BASE}/portfolio/equities/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        onSetSuccess('Equity updated successfully');
                    } else {
                        const response = await fetch(`${API_BASE}/portfolio/equities`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (response.status === 409) {
                            onSetSuccess('Position aggregated with existing holdings');
                        } else {
                            onSetSuccess('Equity added successfully');
                        }
                    }

                    const [updated, _tl] = await Promise.all([
                        fetch(`${API_BASE}/portfolio/equities`).then(r => r.json()),
                        fetch(`${API_BASE}/tax-ledger`).then(r => r.json())
                    ]);
                    onSetData(prev => ({ ...prev, equities: Array.isArray(updated) ? updated : [], taxLedger: Array.isArray(_tl) ? _tl : [] }));
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({ ticker: '', quantity: '', avg_cost: '', date_acquired: new Date().toISOString().split('T')[0] });
                } catch (err) {
                    onSetError('Failed to save equity: ' + err.message);
                }
            };

            const handleEdit = (equity) => {
                setFormData({
                    ticker: equity.ticker,
                    quantity: equity.quantity.toString(),
                    avg_cost: equity.avg_cost.toString()
                });
                setEditingId(equity.id);
                setIsModalOpen(true);
            };

            const handleDelete = async (id, ticker) => {
                if (!window.confirm(`Delete ${ticker}?`)) return;
                try {
                    await fetch(`${API_BASE}/portfolio/equities/${id}`, { method: 'DELETE' });
                    const updated = await fetch(`${API_BASE}/portfolio/equities`).then(r => r.json());
                    onSetData(prev => ({ ...prev, equities: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('Equity deleted successfully');
                } catch (err) {
                    onSetError('Failed to delete equity');
                }
            };

            const [closeModal, setCloseModal] = React.useState({ open: false, eq: null });
            const [closeForm, setCloseForm] = React.useState({ date_closed: '', sell_price: '', qty_sold: '' });
            const handleClosePosition = (equity) => { setCloseForm({ date_closed: new Date().toISOString().split('T')[0], sell_price: '', qty_sold: String(equity.quantity) }); setCloseModal({ open: true, eq: equity }); };
            const handleConfirmClose = async () => { const eq = closeModal.eq; if (!eq) return; try { const sp = parseFloat(closeForm.sell_price), qs = parseFloat(closeForm.qty_sold); const cb = (eq.avg_cost||0)*qs, rpl = (sp*qs)-cb; const dh = eq.date_acquired ? Math.round((new Date(closeForm.date_closed)-new Date(eq.date_acquired))/86400000) : 0; await fetch(`${API_BASE}/tax-ledger/close`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ticker: eq.ticker, date_closed: closeForm.date_closed, sell_price: sp, realized_pl: rpl, days_held: dh, tax_status: dh>365?'Long-term':'Short-term' }) }); const ul = await fetch(`${API_BASE}/tax-ledger`).then(r=>r.json()); onSetData(prev=>({...prev, taxLedger: Array.isArray(ul)?ul:[]})); setCloseModal({open:false,eq:null}); onSetSuccess('Sale of '+eq.ticker+' recorded in tax ledger'); } catch(e) { onSetError('Failed: '+e.message); } };

            const handleOpenModal = () => {
                setEditingId(null);
                setFormData({ ticker: '', quantity: '', avg_cost: '', date_acquired: new Date().toISOString().split('T')[0] });
                setIsModalOpen(true);
            };

            return (
                <div>
                    <IntervalBar interval={interval} setInterval={setIv} total={eqTotal} loading={loading} />
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                        <div className="stat-card">
                            <div className="stat-label">Equities Portfolio Value</div>
                            <div className="stat-value" style={{ color: 'var(--accent)' }}>{formatCurrency(data.summary?.equities_value || 0)}</div>
                        </div>
                    </div>
                    {tickerFilter && (
                        <div style={{ marginBottom: '12px', padding: '8px 16px', background: 'rgba(var(--accent), 0.1)', border: '1px solid var(--accent)', borderRadius: '6px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <span style={{ fontSize: '13px', fontFamily: 'Oswald, sans-serif' }}>Filtered: <strong style={{ color: 'var(--accent)' }}>{tickerFilter}</strong></span>
                            <button onClick={onClearFilter} style={{ background: 'none', border: '1px solid var(--text-muted)', borderRadius: '4px', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px 10px', fontSize: '11px' }}>Show All</button>
                        </div>
                    )}
                    <div style={{ marginBottom: '16px', display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="button button-primary" onClick={handleOpenModal}>
                            + Add Position
                        </button>
                        <select value={tickerFilter || ''} onChange={e => e.target.value ? onSetTickerFilter(e.target.value) : onClearFilter()}
                            className="search-box" style={{ maxWidth: '180px', padding: '6px 10px', fontSize: '12px' }}>
                            <option value="">Filter by position...</option>
                            {[...new Set(data.equities.map(e => e.ticker))].sort().map(t => (
                                <option key={t} value={t}>{t}</option>
                            ))}
                        </select>
                    </div>

                    <Modal
                        title={editingId ? 'Edit Equity' : 'Add Equity'}
                        isOpen={isModalOpen}
                        onClose={() => setIsModalOpen(false)}
                    >
                        {!editingId && <div className="note">Existing position found — shares will be combined</div>}
                        <div className="form-group">
                            <label>Ticker</label>
                            <input
                                type="text"
                                placeholder="AAPL"
                                value={formData.ticker}
                                onChange={(e) => setFormData({ ...formData, ticker: e.target.value })}
                                disabled={!!editingId}
                            />
                        </div>
                        <div className="form-group">
                            <label>Quantity</label>
                            <input
                                type="number"
                                step="0.0001"
                                placeholder="100"
                                value={formData.quantity}
                                onChange={(e) => setFormData({ ...formData, quantity: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Average Cost</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="150.00"
                                value={formData.avg_cost}
                                onChange={(e) => setFormData({ ...formData, avg_cost: e.target.value })}
                            />
                        </div>
                        {!editingId && <div className="form-group"><label>Date Acquired</label><input type="date" value={formData.date_acquired || ''} onChange={(e) => setFormData({ ...formData, date_acquired: e.target.value })} /></div>}
                        <button className="button button-primary" onClick={handleAddEdit} style={{ width: '100%' }}>
                            {editingId ? 'Update' : 'Add'}
                        </button>
                    </Modal>

                    <Modal title={closeModal.eq ? 'Record Sale - '+closeModal.eq.ticker : 'Record Sale'} isOpen={closeModal.open} onClose={() => setCloseModal({open:false,eq:null})}>
                        <div className="form-group"><label>Date Sold</label><input type="date" value={closeForm.date_closed} onChange={e=>setCloseForm({...closeForm,date_closed:e.target.value})} /></div>
                        <div className="form-group"><label>Sell Price/Share</label><input type="number" step="0.01" placeholder="0.00" value={closeForm.sell_price} onChange={e=>setCloseForm({...closeForm,sell_price:e.target.value})} /></div>
                        <div className="form-group"><label>Qty Sold</label><input type="number" step="0.0001" value={closeForm.qty_sold} onChange={e=>setCloseForm({...closeForm,qty_sold:e.target.value})} /></div>
                        {closeForm.sell_price && closeForm.qty_sold && closeModal.eq && (() => { const sp=parseFloat(closeForm.sell_price),qs=parseFloat(closeForm.qty_sold),pl=(sp-(closeModal.eq.avg_cost||0))*qs; return (<div style={{padding:'10px',background:'rgba(0,212,255,0.08)',borderRadius:'8px',marginBottom:'12px',fontSize:'13px'}}><div>Proceeds: <strong>{formatCurrency(sp*qs)}</strong></div><div>Cost: <strong>{formatCurrency((closeModal.eq.avg_cost||0)*qs)}</strong></div><div>Realized P/L: <strong className={pl>=0?'positive':'negative'}>{formatCurrency(pl)}</strong></div></div>); })()}
                        <button className="button button-primary" onClick={handleConfirmClose} style={{width:'100%'}}>Record Sale in Tax Ledger</button>
                    </Modal>

                    <div className="card">
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('ticker')} style={{ cursor: 'pointer' }}>
                                            Ticker {sortConfig.key === 'ticker' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('quantity')}>
                                            Qty {sortConfig.key === 'quantity' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('avg_cost')}>
                                            Avg Cost {sortConfig.key === 'avg_cost' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('live_price')}>
                                            Live Price {sortConfig.key === 'live_price' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('market_value')}>
                                            Market Value {sortConfig.key === 'market_value' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('pl_dollar')}>
                                            P/L ($) {sortConfig.key === 'pl_dollar' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('pl_percent')}>
                                            P/L (%) {sortConfig.key === 'pl_percent' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th>CC Income</th>
                                        <th>CC Yield</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedEquities.length === 0 ? (
                                        <tr>
                                            <td colSpan="10" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No equities</td>
                                        </tr>
                                    ) : (
                                        sortedEquities.map(equity => {
                                            const { pl, pct, assetPct } = getPL(equity);
                                            return (
                                            <tr key={equity.id}>
                                                <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>{equity.ticker}</td>
                                                <td>{formatNumber(equity.quantity, 4)}</td>
                                                <td>{formatCurrency(equity.avg_cost)}</td>
                                                <td>{formatCurrency(equity.live_price)}</td>
                                                <td>{formatCurrency(equity.market_value)}</td>
                                                <td className={pl >= 0 ? 'positive' : 'negative'}>
                                                    {formatCurrency(pl)}
                                                </td>
                                                <td className={pct >= 0 ? 'positive' : 'negative'}>
                                                    {formatPercent(pct)}
                                                    {assetPct !== null && Math.abs(assetPct - pct) > 0.001 && (
                                                        <div style={{ fontSize: '10px', color: assetPct >= 0 ? '#10b981' : '#ef4444', opacity: 0.7 }}>
                                                            Asset: {assetPct >= 0 ? '+' : ''}{(assetPct * 100).toFixed(1)}%
                                                        </div>
                                                    )}
                                                </td>
                                                <td>{formatCurrency(equity.cc_income || 0)}</td>
                                                <td>{formatPercent((equity.cc_yield || 0))}</td>
                                                <td>
                                                    <div className="action-buttons">
                                                        <button
                                                            className="action-button"
                                                            onClick={() => handleEdit(equity)}
                                                            title="Edit"
                                                        >
                                                            ✏️
                                                        </button>
                                                        <button className="action-button" onClick={() => handleClosePosition(equity)} title="Record Sale" style={{ color: '#f59e0b', borderColor: '#f59e0b' }}>$</button>
                                                        <button
                                                            className="action-button delete"
                                                            onClick={() => handleDelete(equity.id, equity.ticker)}
                                                            title="Delete"
                                                        >
                                                            ✕
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );})
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Options Tab
        const OptionsTab = ({ data, snapshots, onSetData, onSetError, onSetSuccess, tickerFilter, onClearFilter, onSetTickerFilter }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'position_name', direction: 'asc' });
            const [optInterval, setOptInterval] = useState('all');
            const [markHistory, setMarkHistory] = useState(null);
            const [markLoading, setMarkLoading] = useState(false);
            const displayOptions = tickerFilter ? data.options.filter(o => o.position_name === tickerFilter || o.position_name.split(' ')[0].toUpperCase() === tickerFilter.toUpperCase()) : data.options;

            // Fetch mark history once
            useEffect(() => {
                fetch(`${API_BASE}/options/mark-history`).then(r => r.json()).then(setMarkHistory).catch(() => {});
            }, []);

            // Interval start date
            const getOptIntervalStart = () => {
                const now = new Date();
                const daysMap = { '1d': 1, '1w': 7, '1m': 30, '3m': 90, '1y': 365 };
                if (optInterval === 'ytd') return `${now.getFullYear()}-01-01`;
                const days = daysMap[optInterval];
                if (!days) return '';
                const start = new Date(now); start.setDate(start.getDate() - days);
                return start.toISOString().split('T')[0];
            };

            // Aggregate interval P/L from snapshots
            const optTotal = useMemo(() => {
                if (optInterval === 'all') {
                    const totalPL = displayOptions.reduce((s, o) => s + (o.pl_dollar || 0), 0);
                    const inv = displayOptions.reduce((s, o) => s + (o.total_invested || 0), 0);
                    return { totalPL, totalPct: inv > 0 ? totalPL / inv : 0 };
                }
                // Snapshot-based aggregate
                const intervalStart = getOptIntervalStart();
                if (!intervalStart || !snapshots || snapshots.length === 0) {
                    const totalPL = displayOptions.reduce((s, o) => s + (o.pl_dollar || 0), 0);
                    const inv = displayOptions.reduce((s, o) => s + (o.total_invested || 0), 0);
                    return { totalPL, totalPct: inv > 0 ? totalPL / inv : 0 };
                }
                // Find snapshot closest to interval start
                const startSnap = snapshots.reduce((best, s) => {
                    const d = s.timestamp || s.date || '';
                    if (d >= intervalStart && (!best || d < (best.timestamp || best.date || ''))) return s;
                    return best;
                }, null) || snapshots.find(s => (s.timestamp || s.date || '') <= intervalStart);
                const startVal = startSnap ? (startSnap.options_value || 0) : 0;
                const curVal = displayOptions.reduce((s, o) => s + (o.total_value || 0), 0);
                const totalPL = curVal - startVal;
                return { totalPL, totalPct: startVal > 0 ? totalPL / startVal : 0 };
            }, [displayOptions, optInterval, snapshots]);

            // Per-position interval P/L from mark history
            const getOptPL = (option) => {
                if (optInterval === 'all') return { pl: option.pl_dollar || 0, estimated: false };
                if (!markHistory) return { pl: option.pl_dollar || 0, estimated: true };
                const posEntry = markHistory[String(option.id)];
                const posHist = posEntry ? posEntry.marks : null;
                if (!posHist || posHist.length === 0) return { pl: option.pl_dollar || 0, estimated: true };
                const intervalStart = getOptIntervalStart();
                // Find mark closest to interval start
                let startMark = null;
                for (const entry of posHist) {
                    if (entry.date <= intervalStart) startMark = entry;
                    else break;
                }
                if (!startMark) {
                    // No history far enough back — use earliest available or fall back to cost basis
                    if (posHist[0].date > intervalStart) return { pl: option.pl_dollar || 0, estimated: true };
                    startMark = posHist[0];
                }
                const curMark = option.net_spread || (option.live_price_long || 0);
                const contracts = option.contracts || 0;
                const pl = (curMark - startMark.mark) * contracts * 100;
                return { pl: round2(pl), estimated: false };
            };
            const round2 = (n) => Math.round(n * 100) / 100;
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                position_name: '',
                occ_long: '',
                occ_short: '',
                contracts: '',
                avg_cost: '',
                date_acquired: new Date().toISOString().split('T')[0]
            });
            const [closeOptModal, setCloseOptModal] = useState({ open: false, option: null });
            const [closeOptForm, setCloseOptForm] = useState({ date_closed: '', sell_price: '', contracts_to_close: '' });
            const [expandedOptRoll, setExpandedOptRoll] = useState(null);

            const sortedOptions = useMemo(() => {
                const sorted = [...displayOptions];
                sorted.sort((a, b) => {
                    const aVal = a[sortConfig.key];
                    const bVal = b[sortConfig.key];
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
                return sorted;
            }, [data.options, sortConfig, tickerFilter]);

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            const handleAddEdit = async () => {
                try {
                    const payload = {
                        position_name: formData.position_name,
                        occ_long: formData.occ_long ? formData.occ_long.toUpperCase() : '',
                        occ_short: formData.occ_short ? formData.occ_short.toUpperCase() : '',
                        contracts: parseFloat(formData.contracts),
                        avg_cost: parseFloat(formData.avg_cost),
                        date_acquired: formData.date_acquired
                    };

                    if (editingId) {
                        await fetch(`${API_BASE}/portfolio/options/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        await fetch(`${API_BASE}/portfolio/options`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }

                    const [updated, _tl2] = await Promise.all([
                        fetch(`${API_BASE}/portfolio/options`).then(r => r.json()),
                        fetch(`${API_BASE}/tax-ledger`).then(r => r.json())
                    ]);
                    onSetData(prev => ({ ...prev, options: Array.isArray(updated) ? updated : [], taxLedger: Array.isArray(_tl2) ? _tl2 : [] }));
                    onSetSuccess(editingId ? 'Option updated' : 'Option added');
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({ position_name: '', occ_long: '', occ_short: '', contracts: '', avg_cost: '', date_acquired: new Date().toISOString().split('T')[0] });
                } catch (err) {
                    onSetError('Failed to save option');
                }
            };

            const handleCloseOption = async () => {
                const { option } = closeOptModal;
                if (!option) return;
                try {
                    const posName = (option.position_name || '').toLowerCase();
                    const isCC = posName.includes('covered call') || posName.includes(' cc ');
                    const totalContracts = parseFloat(option.contracts);
                    const contractsToClose = parseFloat(closeOptForm.contracts_to_close) || totalContracts;
                    const sellPrice = parseFloat(closeOptForm.sell_price);
                    const isPartial = contractsToClose < totalContracts;

                    if (isCC) {
                        // CC close: always full close via cc_income workflow
                        const qty = totalContracts;
                        const ccTicker = (option.position_name || '').split(' ')[0].toUpperCase();
                        const ccData = await fetch(`${API_BASE}/cc-income`).then(r => r.json());
                        const ccEntry = ccData.find(c => c.ticker?.toUpperCase() === ccTicker && !c.date_closed);
                        if (ccEntry) {
                            await fetch(`${API_BASE}/cc-income/${ccEntry.id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ date_closed: closeOptForm.date_closed, cost_to_close: sellPrice * qty * 100 }) });
                        } else {
                            const costBasis = parseFloat(option.avg_cost);
                            await fetch(`${API_BASE}/cc-income`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ ticker: ccTicker, date_opened: option.date_acquired||'', contract_details: option.position_name, premium_collected: costBasis*qty*100, date_closed: closeOptForm.date_closed, cost_to_close: sellPrice*qty*100 }) });
                        }
                        await fetch(`${API_BASE}/portfolio/options/${option.id}`, { method: 'DELETE' });
                    } else {
                        // Regular option: use sell endpoint (handles partial and full)
                        await fetch(`${API_BASE}/portfolio/options/sell`, {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({
                                id: option.id,
                                position_name: option.position_name,
                                contracts: contractsToClose,
                                sell_price: sellPrice,
                                date_sold: closeOptForm.date_closed
                            })
                        });
                    }

                    const [uo, ul, cc] = await Promise.all([fetch(`${API_BASE}/portfolio/options`).then(r=>r.json()), fetch(`${API_BASE}/tax-ledger`).then(r=>r.json()), fetch(`${API_BASE}/cc-income`).then(r=>r.json())]);
                    onSetData(prev => ({ ...prev, options: Array.isArray(uo)?uo:[], taxLedger: Array.isArray(ul)?ul:[], ccIncome: Array.isArray(cc)?cc:[] }));
                    onSetSuccess(isPartial ? `Closed ${contractsToClose} of ${totalContracts} contracts — ${option.position_name}` : option.position_name + ' closed and Tax Ledger updated');
                    setCloseOptModal({ open: false, option: null });
                } catch(e) { onSetError('Failed to close option: '+e.message); }
            };

            const handleEdit = (option) => {
                setFormData({
                    position_name: option.position_name,
                    occ_long: option.occ_long || '',
                    occ_short: option.occ_short || '',
                    contracts: option.contracts.toString(),
                    avg_cost: option.avg_cost.toString(),
                    date_acquired: option.date_acquired || ''
                });
                setEditingId(option.id);
                setIsModalOpen(true);
            };

            const handleDelete = async (id, name) => {
                if (!window.confirm(`Delete ${name}?`)) return;
                try {
                    await fetch(`${API_BASE}/portfolio/options/${id}`, { method: 'DELETE' });
                    const updated = await fetch(`${API_BASE}/portfolio/options`).then(r => r.json());
                    onSetData(prev => ({ ...prev, options: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('Option deleted');
                } catch (err) {
                    onSetError('Failed to delete option');
                }
            };

            const handleOpenModal = () => {
                setEditingId(null);
                setFormData({ position_name: '', occ_long: '', occ_short: '', contracts: '', avg_cost: '', date_acquired: new Date().toISOString().split('T')[0] });
                setIsModalOpen(true);
            };

            return (
                <div>
                    <IntervalBar interval={optInterval} setInterval={setOptInterval} total={optTotal} loading={markLoading} />
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                        <div className="stat-card">
                            <div className="stat-label">Options Portfolio Value</div>
                            <div className="stat-value" style={{ color: 'var(--accent)' }}>{formatCurrency(data.summary?.options_value || 0)}</div>
                        </div>
                    </div>
                    {tickerFilter && (
                        <div style={{ marginBottom: '12px', padding: '8px 16px', background: 'rgba(var(--accent), 0.1)', border: '1px solid var(--accent)', borderRadius: '6px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <span style={{ fontSize: '13px', fontFamily: 'Oswald, sans-serif' }}>Filtered: <strong style={{ color: 'var(--accent)' }}>{tickerFilter}</strong></span>
                            <button onClick={onClearFilter} style={{ background: 'none', border: '1px solid var(--text-muted)', borderRadius: '4px', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px 10px', fontSize: '11px' }}>Show All</button>
                        </div>
                    )}
                    <div style={{ marginBottom: '16px', display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <button className="button button-primary" onClick={handleOpenModal}>
                            + Add Option
                        </button>
                        <select value={tickerFilter || ''} onChange={e => e.target.value ? onSetTickerFilter(e.target.value) : onClearFilter()}
                            className="search-box" style={{ maxWidth: '220px', padding: '6px 10px', fontSize: '12px' }}>
                            <option value="">Filter by position...</option>
                            {[...new Set(data.options.map(o => o.position_name))].sort().map(t => (
                                <option key={t} value={t}>{t}</option>
                            ))}
                        </select>
                    </div>

                    <Modal
                        title={editingId ? 'Edit Option' : 'Add Option'}
                        isOpen={isModalOpen}
                        onClose={() => setIsModalOpen(false)}
                    >
                        <div className="form-group">
                            <label>Position Name</label>
                            <input
                                type="text"
                                placeholder="AAPL Call Spread"
                                value={formData.position_name}
                                onChange={(e) => setFormData({ ...formData, position_name: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>OCC Long</label>
                            <input
                                type="text"
                                placeholder="AAPL"
                                value={formData.occ_long}
                                onChange={(e) => setFormData({ ...formData, occ_long: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>OCC Short</label>
                            <input
                                type="text"
                                placeholder="AAPL"
                                value={formData.occ_short}

                        <div className="form-group">
                            <label>Contracts</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="1.00"
                                value={formData.contracts}
                                onChange={(e) => setFormData({ ...formData, contracts: e.target.value })}

                        </div>
                        <div className="form-group">
                            <label>Avg Cost</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="2.50"
                                value={formData.avg_cost}
                                onChange={(e) => setFormData({ ...formData, avg_cost: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Date Acquired</label>
                            <input type="date" value={formData.date_acquired || ''} onChange={(e) => setFormData({ ...formData, date_acquired: e.target.value })} />
                        </div>
                        <button className="button button-primary" onClick={handleAddEdit} style={{ width: '100%' }}>
                            {editingId ? 'Update' : 'Add'}
                        </button>
                    </Modal>

                    <Modal title={closeOptModal.option ? (parseFloat(closeOptForm.contracts_to_close || closeOptModal.option.contracts) < parseFloat(closeOptModal.option.contracts) ? `Close ${closeOptForm.contracts_to_close} of ${closeOptModal.option.contracts} contracts — ${closeOptModal.option.position_name}` : 'Close: ' + closeOptModal.option.position_name) : 'Close Option'} isOpen={closeOptModal.open} onClose={() => setCloseOptModal({ open: false, option: null })}>
                        <div style={{marginBottom:'8px',color:'var(--text-muted)',fontSize:'13px'}}>{closeOptModal.option && (closeOptModal.option.contracts + ' contracts @ $' + parseFloat(closeOptModal.option.avg_cost||0).toFixed(2))}</div>
                        {closeOptModal.option && !(((closeOptModal.option.position_name||'').toLowerCase().includes('covered call')) || ((closeOptModal.option.position_name||'').toLowerCase().includes(' cc '))) && (
                            <div className="form-group">
                                <label>Contracts to Close</label>
                                <input type="number" min="1" max={closeOptModal.option.contracts} step="1" value={closeOptForm.contracts_to_close} onChange={e => setCloseOptForm({...closeOptForm, contracts_to_close: e.target.value})} />
                            </div>
                        )}
                        <div className="form-group"><label>Date Closed</label><input type="date" value={closeOptForm.date_closed} onChange={e=>setCloseOptForm({...closeOptForm,date_closed:e.target.value})} /></div>
                        <div className="form-group"><label>Sell Price (per contract)</label><input type="number" step="0.01" placeholder="3.50" value={closeOptForm.sell_price} onChange={e=>setCloseOptForm({...closeOptForm,sell_price:e.target.value})} /></div>
                        <button className="button button-primary" onClick={handleCloseOption} style={{width:'100%'}} disabled={!closeOptForm.date_closed||!closeOptForm.sell_price}>{parseFloat(closeOptForm.contracts_to_close || 0) < parseFloat(closeOptModal.option?.contracts || 0) ? `Close ${closeOptForm.contracts_to_close} Contracts` : 'Record Close and Move to Tax Ledger'}</button>
                    </Modal>

                    <div className="card">
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('position_name')}>
                                            Position Name {sortConfig.key === 'position_name' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('contracts')}>
                                            Contracts {sortConfig.key === 'contracts' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('avg_cost')}>
                                            Avg Cost {sortConfig.key === 'avg_cost' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('live_price_long')}>
                                            Live Price (Long) {sortConfig.key === 'live_price_long' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('live_price_short')}>
                                            Live Price (Short) {sortConfig.key === 'live_price_short' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('net_spread')}>
                                            Net Spread {sortConfig.key === 'net_spread' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('pl_dollar')}>
                                            P/L ($) {sortConfig.key === 'pl_dollar' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('pl_percent')}>
                                            P/L (%) {sortConfig.key === 'pl_percent' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('total_value')}>
                                            Total Value {sortConfig.key === 'total_value' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('total_invested')}>
                                            Total Invested {sortConfig.key === 'total_invested' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedOptions.length === 0 ? (
                                        <tr>
                                            <td colSpan="11" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No options</td>
                                        </tr>
                                    ) : (
                                        sortedOptions.map(option => {
                                            const ccMatch = (data.ccIncome || []).find(c => c.ticker?.toUpperCase() === (option.occ_long || '').toUpperCase() && (c.roll_history || []).length > 1);
                                            const rolls = ccMatch ? ccMatch.roll_history : [];
                                            const hasRolls = rolls.length > 1;
                                            const isRollExpanded = expandedOptRoll === option.id;
                                            return (
                                            <React.Fragment key={option.id}>
                                            <tr style={{ cursor: hasRolls ? 'pointer' : 'default' }} onClick={() => hasRolls && setExpandedOptRoll(isRollExpanded ? null : option.id)}>
                                                <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>
                                                    {option.position_name}
                                                    {hasRolls && <span style={{ fontSize: '9px', marginLeft: '6px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600, color: 'var(--accent)', background: 'rgba(241,90,34,0.1)' }}>Rolled ({rolls.length}x)</span>}
                                                </td>
                                                <td>{formatNumber(option.contracts, 2)}</td>
                                                <td>{formatCurrency(option.avg_cost)}</td>
                                                <td>{formatCurrency(option.live_price_long)}</td>
                                                <td>{formatCurrency(option.live_price_short)}</td>
                                                <td>{formatCurrency(option.net_spread)}</td>
                                                {(() => { const { pl, estimated } = getOptPL(option); const hasDualPL = option.current_leg_pl !== undefined && option.roll_count > 1; return (
                                                <React.Fragment>
                                                <td className={pl >= 0 ? 'positive' : 'negative'}>
                                                    {hasDualPL ? (
                                                        <div>
                                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px' }}>All-In:</div>
                                                            <div>{estimated && optInterval !== 'all' ? '~' : ''}{formatCurrency(pl)}</div>
                                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Current Leg:</div>
                                                            <div style={{ color: option.current_leg_pl >= 0 ? 'var(--positive)' : 'var(--negative)' }}>{formatCurrency(option.current_leg_pl)}</div>
                                                        </div>
                                                    ) : (
                                                        <span>{estimated && optInterval !== 'all' ? '~' : ''}{formatCurrency(pl)}</span>
                                                    )}
                                                </td>
                                                <td style={{ color: (option.pl_percent || 0) >= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                                                    {hasDualPL ? (
                                                        <div>
                                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px' }}>All-In:</div>
                                                            <div>{(option.all_in_pct || 0) >= 0 ? '+' : ''}{((option.all_in_pct || 0) * 100).toFixed(2)}%</div>
                                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Current Leg:</div>
                                                            <div style={{ color: (option.current_leg_pct || 0) >= 0 ? 'var(--positive)' : 'var(--negative)' }}>{(option.current_leg_pct || 0) >= 0 ? '+' : ''}{((option.current_leg_pct || 0) * 100).toFixed(2)}%</div>
                                                        </div>
                                                    ) : (
                                                        <span>{(option.pl_percent || 0) >= 0 ? '+' : ''}{((option.pl_percent || 0) * 100).toFixed(2)}%</span>
                                                    )}
                                                </td>
                                                </React.Fragment>
                                                ); })()}
                                                <td>{formatCurrency(option.total_value)}</td>
                                                <td>{formatCurrency(option.total_invested)}</td>
                                                <td>
                                                    <div className="action-buttons">
                                                        <button
                                                            className="action-button"
                                                            title="Close position"
                                                            onClick={e => { e.stopPropagation(); setCloseOptModal({open:true,option}); setCloseOptForm({date_closed:new Date().toISOString().split('T')[0],sell_price:'',contracts_to_close:String(option.contracts)}); }}
                                                            style={{color:'var(--positive)',fontWeight:'bold',fontSize:'16px'}}
                                                        >$</button>
                                                        <button className="action-button" onClick={e => { e.stopPropagation(); handleEdit(option); }}>✏️</button>
                                                        <button className="action-button delete" onClick={e => { e.stopPropagation(); handleDelete(option.id, option.position_name); }}>✕</button>
                                                    </div>
                                                </td>
                                            </tr>
                                            {isRollExpanded && (
                                                <tr style={{ background: 'rgba(241,90,34,0.02)' }}>
                                                    <td colSpan="11" style={{ padding: '12px 16px' }}>
                                                        <table style={{ width: '100%', fontSize: '12px' }}>
                                                            <thead>
                                                                <tr style={{ color: 'var(--text-muted)' }}>
                                                                    <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Leg</th>
                                                                    <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Date</th>
                                                                    <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Action</th>
                                                                    <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Strike/Expiry</th>
                                                                    <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Premium In</th>
                                                                    <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Cost to Close</th>
                                                                    <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Net/Contract</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {rolls.map((leg, li) => (
                                                                    <tr key={li} style={{ borderBottom: '1px solid var(--border)' }}>
                                                                        <td style={{ padding: '4px 8px' }}>{leg.leg}</td>
                                                                        <td style={{ padding: '4px 8px' }}>{leg.date}</td>
                                                                        <td style={{ padding: '4px 8px', textTransform: 'capitalize' }}>{leg.action}</td>
                                                                        <td style={{ padding: '4px 8px' }}>{leg.strike} {leg.expiry}</td>
                                                                        <td style={{ padding: '4px 8px', textAlign: 'right', color: 'var(--positive)' }}>${leg.premium.toFixed(2)}</td>
                                                                        <td style={{ padding: '4px 8px', textAlign: 'right', color: leg.cost_to_close > 0 ? 'var(--negative)' : 'var(--text-muted)' }}>
                                                                            {leg.cost_to_close > 0 ? `$${leg.cost_to_close.toFixed(2)}` : '—'}
                                                                        </td>
                                                                        <td style={{ padding: '4px 8px', textAlign: 'right', fontWeight: 600, color: leg.net_per_contract >= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                                                                            {leg.net_per_contract >= 0 ? '+' : ''}{leg.net_per_contract.toFixed(2)}
                                                                        </td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                        <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginTop: '10px', padding: '8px', background: 'var(--bg-secondary)', borderRadius: '4px', fontSize: '12px' }}>
                                                            <span>Total Premium: <strong style={{ color: 'var(--positive)' }}>{formatCurrency(ccMatch.premium_collected)}</strong></span>
                                                            <span>Total Roll Costs: <strong style={{ color: 'var(--negative)' }}>{formatCurrency(ccMatch.cost_to_close || 0)}</strong></span>
                                                            {(() => { const net = (ccMatch.premium_collected || 0) - (ccMatch.cost_to_close || 0); return (
                                                                <span>Net Closed Rolls: <strong style={{ color: net >= 0 ? 'var(--positive)' : 'var(--negative)' }}>{formatCurrency(net)}</strong></span>
                                                            ); })()}
                                                        </div>
                                                        <div style={{ marginTop: '6px', fontSize: '11px', color: 'var(--text-muted)' }}>
                                                            Current Leg: <strong style={{ color: 'var(--text-primary)' }}>{rolls[rolls.length - 1].strike} {rolls[rolls.length - 1].expiry}</strong>
                                                            {option.live_price_short > 0 && (
                                                                <span> | Mark: <strong style={{ color: 'var(--text-primary)' }}>${option.live_price_short.toFixed(2)}</strong> | Cost to Close: <strong style={{ color: 'var(--negative)' }}>{formatCurrency(option.live_price_short * (option.contracts || 0) * 100)}</strong></span>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                            </React.Fragment>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Watchlist Tab
        const WatchlistTab = ({ onSetError }) => {
            const [watchlist, setWatchlist] = useState([]);
            const [alerts, setAlerts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ ticker: '', target_buy: '', notes: '' });
            const [expandedTicker, setExpandedTicker] = useState(null);
            const [expandedData, setExpandedData] = useState({});
            const [chartData, setChartData] = useState({});
            const [chartPeriod, setChartPeriod] = useState('1m');
            const [masterTicker, setMasterTicker] = useState('');
            const [masterSearch, setMasterSearch] = useState('');
            const [masterPeriod, setMasterPeriod] = useState('1m');
            const [masterChartData, setMasterChartData] = useState(null);
            const [masterLoading, setMasterLoading] = useState(false);

            const loadData = async () => {
                setLoading(true);
                try {
                    const [wRes, aRes] = await Promise.all([
                        fetch(`${API_BASE}/watchlist`).then(r => r.json()),
                        fetch(`${API_BASE}/watchlist/alerts`).then(r => r.json()).catch(() => [])
                    ]);
                    if (Array.isArray(wRes)) setWatchlist(wRes);
                    if (Array.isArray(aRes)) setAlerts(aRes);
                } catch (e) {
                    onSetError('Failed to load watchlist');
                }
                setLoading(false);
            };

            useEffect(() => { loadData(); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!form.ticker.trim()) return;
                const payload = { ticker: form.ticker.trim(), target_buy: parseFloat(form.target_buy) || 0, notes: form.notes };
                const url = editingId ? `${API_BASE}/watchlist/${editingId}` : `${API_BASE}/watchlist`;
                const method = editingId ? 'PUT' : 'POST';
                try {
                    await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    setForm({ ticker: '', target_buy: '', notes: '' });
                    setShowForm(false);
                    setEditingId(null);
                    loadData();
                } catch { onSetError('Failed to save'); }
            };

            const handleEdit = (item) => {
                setForm({ ticker: item.ticker, target_buy: item.target_buy ? String(item.target_buy) : '', notes: item.notes || '' });
                setEditingId(item.id);
                setShowForm(true);
            };

            const handleDelete = async (id, ticker) => {
                if (!confirm(`Remove ${ticker} from watchlist?`)) return;
                try {
                    await fetch(`${API_BASE}/watchlist/${id}`, { method: 'DELETE' });
                    loadData();
                } catch { onSetError('Failed to delete'); }
            };

            const safeFetch = async (url) => { try { const r = await fetch(url); return await r.json(); } catch { return null; } };

            const CHART_PERIODS = [
                { key: '1d', label: '1D', period: '1d', interval: '5m' },
                { key: '1w', label: '1W', period: '5d', interval: '15m' },
                { key: '1m', label: '1M', period: '1mo', interval: '1d' },
                { key: '3m', label: '3M', period: '3mo', interval: '1d' },
                { key: '6m', label: '6M', period: '6mo', interval: '1d' },
                { key: '1y', label: '1Y', period: '1y', interval: '1wk' },
                { key: '5y', label: '5Y', period: '5y', interval: '1mo' },
            ];

            const fetchChart = async (ticker, periodKey) => {
                const p = CHART_PERIODS.find(c => c.key === periodKey) || CHART_PERIODS[2];
                const data = await safeFetch(`${API_BASE}/chart/${ticker}?period=${p.period}&interval=${p.interval}`);
                if (Array.isArray(data)) {
                    setChartData(prev => ({ ...prev, [`${ticker}:${periodKey}`]: data }));
                }
            };

            const toggleExpand = async (ticker) => {
                if (expandedTicker === ticker) { setExpandedTicker(null); return; }
                setExpandedTicker(ticker);
                setChartPeriod('1m');
                fetchChart(ticker, '1m');
                if (expandedData[ticker]) return;
                const [dp, ins, flow, news] = await Promise.all([
                    safeFetch(`${API_BASE}/darkpool/${ticker}`),
                    safeFetch(`${API_BASE}/insiders/${ticker}`),
                    safeFetch(`${API_BASE}/options-flow/${ticker}`),
                    safeFetch(`${API_BASE}/news/${ticker}`),
                ]);
                setExpandedData(prev => ({ ...prev, [ticker]: { dp, ins, flow, news } }));
            };

            const fetchMasterChart = async (ticker, periodKey) => {
                if (!ticker) return;
