                                            <button onClick={() => { setExpandedWheel(isExpanded && expandedSection === 'risk' ? null : w.id); setExpandedSection('risk'); }}
                                                style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontSize: '12px' }}>
                                                {isExpanded && expandedSection === 'risk' ? '▾' : '▸'} Risk Details
                                            </button>
                                            {w.context?.rolls_count > 0 && (
                                                <button onClick={() => { setExpandedWheel(isExpanded && expandedSection === 'history' ? null : w.id); setExpandedSection('history'); }}
                                                    style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontSize: '12px' }}>
                                                    {isExpanded && expandedSection === 'history' ? '▾' : '▸'} Roll History ({w.context.rolls_count} legs)
                                                </button>
                                            )}
                                            <button onClick={() => onAnalyzeTicker(w.ticker)}
                                                style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 0, fontSize: '12px' }}>
                                                ▸ Analyze in Phase 1
                                            </button>
                                            <button onClick={() => onSimulate && onSimulate(w.ticker, w.strike, w.type)}
                                                style={{ background: 'none', border: 'none', color: '#3b82f6', cursor: 'pointer', padding: 0, fontSize: '12px' }}>
                                                ▸ Simulate Multi-Cycle
                                            </button>
                                        </div>

                                        {/* Risk details expansion */}
                                        {isExpanded && expandedSection === 'risk' && (
                                            <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(255,255,255,0.02)', borderRadius: '6px', fontSize: '12px' }}>
                                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '8px' }}>
                                                    <div>Moneyness: <strong>{w.risk_metrics?.moneyness}</strong> ({w.risk_metrics?.pct_otm?.toFixed(1)}% OTM)</div>
                                                    <div>Breakeven: <strong>{formatCurrency(w.risk_metrics?.breakeven)}</strong></div>
                                                    <div>Max Profit: <strong>{formatCurrency(w.risk_metrics?.max_profit)}</strong></div>
                                                    <div>Opened: <strong>{w.context?.original_open_date}</strong> ({w.context?.days_held}d ago)</div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Roll history expansion */}
                                        {isExpanded && expandedSection === 'history' && w.context?.roll_history && (
                                            <div style={{ marginTop: '12px' }}>
                                                <table style={{ width: '100%', fontSize: '12px' }}>
                                                    <thead>
                                                        <tr style={{ color: 'var(--text-muted)' }}>
                                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Leg</th>
                                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Date</th>
                                                            <th style={{ textAlign: 'left', padding: '4px 8px' }}>Strike/Expiry</th>
                                                            <th style={{ textAlign: 'right', padding: '4px 8px' }}>Premium</th>
                                                            <th style={{ textAlign: 'right', padding: '4px 8px' }}>Cost to Close</th>
                                                            <th style={{ textAlign: 'right', padding: '4px 8px' }}>Net</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {w.context.roll_history.map((leg, i) => (
                                                            <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                                                                <td style={{ padding: '4px 8px' }}>{leg.leg || i + 1}</td>
                                                                <td style={{ padding: '4px 8px' }}>{leg.date}</td>
                                                                <td style={{ padding: '4px 8px' }}>{leg.strike} {leg.expiry}</td>
                                                                <td style={{ padding: '4px 8px', textAlign: 'right', color: '#10b981' }}>${(leg.premium || 0).toFixed(2)}</td>
                                                                <td style={{ padding: '4px 8px', textAlign: 'right', color: leg.cost_to_close > 0 ? '#ef4444' : 'var(--text-muted)' }}>{leg.cost_to_close > 0 ? `$${leg.cost_to_close.toFixed(2)}` : '—'}</td>
                                                                <td style={{ padding: '4px 8px', textAlign: 'right', fontWeight: 600, color: (leg.net_per_contract || 0) >= 0 ? '#10b981' : '#ef4444' }}>{(leg.net_per_contract || 0) >= 0 ? '+' : ''}{(leg.net_per_contract || 0).toFixed(2)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // Scenario Simulator (Phase 3)
        const ScenarioSimulator = ({ config, onClearConfig }) => {
            const [simTicker, setSimTicker] = useState('');
            const [simStrike, setSimStrike] = useState('');
            const [simType, setSimType] = useState('csp');
            const [simCadence, setSimCadence] = useState('monthly');
            const [simMonths, setSimMonths] = useState(6);
            const [simClose, setSimClose] = useState(50);
            const [simResult, setSimResult] = useState(null);
            const [simLoading, setSimLoading] = useState(false);
            const [expandedCycle, setExpandedCycle] = useState(null);

            // Pre-fill from config (Phase 1/2 buttons)
            useEffect(() => {
                if (config) {
                    setSimTicker(config.ticker || '');
                    setSimStrike(String(config.strike || ''));
                    setSimType(config.type || 'csp');
                    // Auto-run
                    if (config.ticker && config.strike) {
                        runSim(config.ticker, config.strike, config.type || 'csp');
                    }
                }
            }, [config]);

            const runSim = async (t, s, tp) => {
                t = t || simTicker;
                s = s || simStrike;
                tp = tp || simType;
                if (!t || !s) return;
                setSimLoading(true);
                try {
                    const r = await fetch(`${API_BASE}/wheel/simulate/${t}?strike=${s}&type=${tp}&expiration_cadence=${simCadence}&months=${simMonths}&close_at=${simClose}`);
                    const d = await r.json();
                    if (d.error) { setSimResult(null); } else { setSimResult(d); }
                } catch { setSimResult(null); }
                setSimLoading(false);
            };

            const handleRun = (e) => { e.preventDefault(); runSim(); };
            const ps = simResult?.projection_summary;
            const ctx = simResult?.portfolio_context;
            const scenarios = simResult?.assignment_scenarios || [];
            const cycles = simResult?.cycles || [];
            const compound = simResult?.compound_projection || {};

            return (
                <div style={{ marginTop: '32px' }}>
                    <div style={{ borderTop: '1px solid var(--border)', paddingTop: '24px' }}>
                        <h3 style={{ color: '#00d4ff', fontSize: '16px', fontWeight: 600, marginBottom: '16px' }}>Scenario Simulator</h3>

                        {/* Config Bar */}
                        <form onSubmit={handleRun} style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
                            <input type="text" placeholder="Ticker" value={simTicker} onChange={e => setSimTicker(e.target.value.toUpperCase())} className="search-box" style={{ width: '80px' }} />
                            <input type="number" placeholder="Strike" value={simStrike} onChange={e => setSimStrike(e.target.value)} className="search-box" style={{ width: '80px' }} step="0.5" />
                            <select value={simType} onChange={e => setSimType(e.target.value)} className="search-box" style={{ width: '80px' }}>
                                <option value="csp">CSP</option><option value="cc">CC</option>
                            </select>
                            <select value={simCadence} onChange={e => setSimCadence(e.target.value)} className="search-box" style={{ width: '100px' }}>
                                <option value="weekly">Weekly</option><option value="biweekly">Biweekly</option><option value="monthly">Monthly</option>
                            </select>
                            <select value={simClose} onChange={e => setSimClose(Number(e.target.value))} className="search-box" style={{ width: '90px' }}>
                                <option value={50}>Close 50%</option><option value={65}>Close 65%</option><option value={100}>Expiry</option>
                            </select>
                            {[3, 6, 12].map(m => (
                                <button key={m} type="button" onClick={() => setSimMonths(m)} style={{
                                    padding: '4px 10px', fontSize: '11px', borderRadius: '4px', cursor: 'pointer',
                                    border: simMonths === m ? '1px solid var(--accent)' : '1px solid var(--border)',
                                    background: simMonths === m ? 'rgba(241,90,34,0.15)' : 'transparent',
                                    color: simMonths === m ? 'var(--accent)' : 'var(--text-muted)',
                                }}>{m}mo</button>
                            ))}
                            <button type="submit" className="button button-primary" style={{ padding: '6px 16px', fontSize: '12px' }} disabled={simLoading}>{simLoading ? 'Running...' : 'Run Simulation'}</button>
                        </form>

                        {simResult && (
                            <div>
                                {/* IV label */}
                                <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '12px' }}>
                                    {simResult.ticker} @ ${simResult.current_price?.toFixed(2)} | Strike ${simResult.strike} | IV: {(simResult.iv_used * 100).toFixed(0)}% ({simResult.iv_label}) | {simResult.cadence} × {ps?.total_cycles} cycles
                                </div>

                                {/* Portfolio context */}
                                {ctx && (
                                    <div style={{ marginBottom: '16px', padding: '8px 14px', background: 'rgba(0,212,255,0.05)', border: '1px solid rgba(0,212,255,0.2)', borderRadius: '6px', fontSize: '12px' }}>
                                        Cash: <strong>{formatCurrency(ctx.cash_available)}</strong> | Capital/contract: <strong>{formatCurrency(ctx.capital_per_contract)}</strong> | Max: <strong>{ctx.max_contracts} contracts</strong>
                                        {ctx.shares_owned > 0 && <span> | Owns {ctx.shares_owned} shares @ ${ctx.avg_cost.toFixed(2)}</span>}
                                    </div>
                                )}

                                {/* 3 Scenario Cards */}
                                {ps && (
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '12px', marginBottom: '20px' }}>
                                        <div className="stat-card" style={{ borderLeft: '3px solid #10b981' }}>
                                            <div className="stat-label" style={{ color: '#10b981' }}>Best Case</div>
                                            <div className="stat-value" style={{ fontSize: '20px', color: '#10b981' }}>{formatCurrency(ps.best_case.total_income)}</div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{ps.best_case.annualized_yield.toFixed(1)}% ann. | Capital: {formatCurrency(ps.best_case.capital_tied)}</div>
                                        </div>
                                        <div className="stat-card" style={{ borderLeft: '3px solid #3b82f6' }}>
                                            <div className="stat-label" style={{ color: '#3b82f6' }}>Expected</div>
                                            <div className="stat-value" style={{ fontSize: '20px', color: '#3b82f6' }}>{formatCurrency(ps.expected_case.expected_income)}</div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{ps.expected_case.expected_yield.toFixed(1)}% ann. | ~{ps.expected_case.expected_assignments} assignments</div>
                                        </div>
                                        <div className="stat-card" style={{ borderLeft: '3px solid #ef4444' }}>
                                            <div className="stat-label" style={{ color: '#ef4444' }}>Worst Case (-20%)</div>
                                            <div className="stat-value" style={{ fontSize: '20px', color: ps.worst_case.net_pnl >= 0 ? '#10b981' : '#ef4444' }}>{ps.worst_case.net_pnl >= 0 ? '+' : ''}{formatCurrency(ps.worst_case.net_pnl)}</div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>BE: ${ps.worst_case.breakeven_price.toFixed(2)} | Recovery: {ps.worst_case.cycles_to_recover} cycles</div>
                                        </div>
                                    </div>
                                )}

                                {/* Cycle Timeline */}
                                {cycles.length > 0 && (
                                    <div className="card" style={{ marginBottom: '16px' }}>
                                        <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '10px' }}>Cycle Timeline</div>
                                        <div style={{ display: 'flex', gap: '4px', overflowX: 'auto', paddingBottom: '8px' }}>
                                            {cycles.map(c => (
                                                <div key={c.cycle} onClick={() => setExpandedCycle(expandedCycle === c.cycle ? null : c.cycle)}
                                                    style={{ flex: '1 0 70px', minWidth: '70px', padding: '8px 6px', textAlign: 'center', borderRadius: '6px', cursor: 'pointer',
                                                        background: expandedCycle === c.cycle ? 'rgba(241,90,34,0.1)' : 'rgba(255,255,255,0.02)',
                                                        border: expandedCycle === c.cycle ? '1px solid var(--accent)' : '1px solid var(--border)' }}>
                                                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)' }}>C{c.cycle}</div>
                                                    <div style={{ fontSize: '12px', color: '#10b981', fontWeight: 600 }}>${c.income_if_otm}</div>
                                                    <div style={{ fontSize: '9px', color: 'var(--text-muted)' }}>{c.prob_otm * 100}% OTM</div>
                                                    <div style={{ fontSize: '9px', color: 'var(--text-muted)' }}>{c.dte}d</div>
                                                </div>
                                            ))}
                                        </div>
                                        {expandedCycle && (() => {
                                            const c = cycles.find(x => x.cycle === expandedCycle);
                                            if (!c) return null;
                                            return (
                                                <div style={{ marginTop: '10px', padding: '10px', background: 'rgba(255,255,255,0.02)', borderRadius: '6px', fontSize: '12px' }}>
                                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '6px' }}>
                                                        <div>Entry: {c.entry_date}</div>
                                                        <div>Expiry: {c.expiration}</div>
                                                        <div>Premium: <strong>${c.estimated_premium}</strong></div>
                                                        <div>Close target: <strong>${c.premium_at_close_target}</strong></div>
                                                        <div>Est. days: <strong>{c.est_days_to_close}d</strong></div>
                                                        <div>Ann. yield: <strong style={{ color: '#10b981' }}>{c.annualized_yield}%</strong></div>
                                                        <div>Cumulative: <strong>{formatCurrency(c.cumulative_income)}</strong></div>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                )}

                                {/* Assignment Scenarios */}
                                {scenarios.length > 0 && (
                                    <div className="card" style={{ marginBottom: '16px' }}>
                                        <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '10px' }}>Assignment Scenarios</div>
                                        <div className="table-container">
                                            <table>
                                                <thead><tr>
                                                    <th>Scenario</th><th>Stock Price</th><th>Cost Basis</th><th>Unrealized P/L</th><th>Recovery</th>
                                                </tr></thead>
                                                <tbody>
                                                    {scenarios.map((s, i) => (
                                                        <tr key={i} style={{ background: s.unrealized_pl >= 0 ? 'rgba(16,185,129,0.03)' : s.unrealized_pl > -100 ? 'rgba(245,158,11,0.03)' : 'rgba(239,68,68,0.03)' }}>
                                                            <td style={{ fontWeight: 600 }}>Stock {s.label}</td>
                                                            <td>${s.stock_price.toFixed(2)}</td>
                                                            <td>${s.cost_basis.toFixed(2)}</td>
                                                            <td style={{ color: s.unrealized_pl >= 0 ? '#10b981' : '#ef4444', fontWeight: 600 }}>{s.unrealized_pl >= 0 ? '+' : ''}{formatCurrency(s.unrealized_pl)}</td>
                                                            <td>{s.recovery_cycles === 0 ? 'None needed' : `${s.recovery_cycles} cycles`}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* Compound Projection */}
                                {Object.keys(compound).length > 0 && (
                                    <div className="card">
                                        <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text-primary)', marginBottom: '10px' }}>Compound Projection</div>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>
                                            {['3_month', '6_month', '12_month'].map(k => compound[k] && (
                                                <div key={k} style={{ padding: '10px', background: 'rgba(255,255,255,0.02)', borderRadius: '6px', textAlign: 'center' }}>
                                                    <div style={{ fontSize: '14px', fontWeight: 700, color: 'var(--accent)' }}>{k.replace('_', ' ')}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', margin: '4px 0' }}>{compound[k].cycles} cycles</div>
                                                    <div style={{ fontSize: '13px' }}>Best: <strong style={{ color: '#10b981' }}>{formatCurrency(compound[k].best_income)}</strong></div>
                                                    <div style={{ fontSize: '13px' }}>Expected: <strong style={{ color: '#3b82f6' }}>{formatCurrency(compound[k].expected_income)}</strong></div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Yield: {compound[k].yield_on_capital.toFixed(1)}%</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {!simResult && !simLoading && (
                            <div style={{ textAlign: 'center', padding: '30px 20px', color: 'var(--text-muted)', fontSize: '13px' }}>
                                Configure a simulation above, or click "Simulate Multi-Cycle" on any strike row or active wheel.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Tax Ledger Tab
        const TaxLedgerTab = ({ data, onSetData, onSetError, onSetSuccess, taxRate, setTaxRate, initialFilter }) => {
            const [yearFilter, setYearFilter] = useState(initialFilter === 'realized-ytd' ? String(new Date().getFullYear()) : 'all');
            const [ytdToggle, setYtdToggle] = useState(false);
            const [statusFilter, setStatusFilter] = useState(initialFilter === 'realized-ytd' ? 'closed' : 'all');
            const [sortConfig, setSortConfig] = useState({ key: 'date_acquired', direction: 'desc' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                date_acquired: '',
                ticker: '',
                asset_type: 'stock',
                quantity: '',
                cost_basis: '',
                premium_received: '',
                current_price: '',
                date_closed: '',
                sell_price: ''
            });

            const currentYear = new Date().getFullYear();
            const years = ['all', ...new Set(data.taxLedger.map(t => {
                const date = new Date(t.date_acquired);
                return date.getFullYear();
            }))].sort((a, b) => {
                if (a === 'all') return -1;
                return b - a;
            });

            const filteredLedger = useMemo(() => {
                let filtered = data.taxLedger;

                if (yearFilter !== 'all') {
                    filtered = filtered.filter(t => {
                        return (t.date_acquired || '').startsWith(yearFilter) || (t.date_closed || '').startsWith(yearFilter);
                    });
                }

                if (ytdToggle) {
                    const yr = String(currentYear);
                    filtered = filtered.filter(t => {
                        return (t.date_acquired || '').startsWith(yr) || (t.date_closed || '').startsWith(yr);
                    });
                }

                if (statusFilter !== 'all') {
                    filtered = filtered.filter(t => {
                        const isClosed = !!t.date_closed;
                        return statusFilter === 'closed' ? isClosed : !isClosed;
                    });
                }

                filtered.sort((a, b) => {
                    const aVal = a[sortConfig.key];
                    const bVal = b[sortConfig.key];
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });

                return filtered;
            }, [data.taxLedger, yearFilter, ytdToggle, statusFilter, sortConfig]);

            // Compute tax reserve for a single entry using the user-set rate
            const calcReserve = (entry) => {
                const rpl = parseFloat(entry.realized_pl) || 0;
                if (rpl <= 0) return 0; // only reserve on gains
                return rpl * (taxRate / 100);
            };

            const summaryData = useMemo(() => {
                // Stat cards: filter realized P/L by date_closed year, not date_acquired
                let closedOnly = data.taxLedger.filter(t => !!t.date_closed);
                if (yearFilter !== 'all') {
                    closedOnly = closedOnly.filter(t => (t.date_closed || '').startsWith(yearFilter));
                }
                if (ytdToggle) {
                    closedOnly = closedOnly.filter(t => (t.date_closed || '').startsWith(String(currentYear)));
                }
                const totalRealizedPL = closedOnly.reduce((sum, t) => sum + (parseFloat(t.realized_pl) || 0), 0);
                const openCount = filteredLedger.filter(t => !t.date_closed).length;
                return {
                    totalRealizedPL,
                    shortTermPL: closedOnly.filter(t => (t.days_held || 0) < 365).reduce((sum, t) => sum + (parseFloat(t.realized_pl) || 0), 0),
                    longTermPL: closedOnly.filter(t => (t.days_held || 0) >= 365).reduce((sum, t) => sum + (parseFloat(t.realized_pl) || 0), 0),
                    taxReserve: Math.max(0, totalRealizedPL) * (taxRate / 100),
                    open: openCount,
                    closed: closedOnly.length
                };
            }, [filteredLedger, data.taxLedger, yearFilter, ytdToggle, statusFilter, taxRate]);

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            const handleAddEdit = async () => {
                try {
                    const payload = {
                        date_acquired: formData.date_acquired,
                        ticker: formData.ticker.toUpperCase(),
                        asset_type: formData.asset_type,
                        quantity: parseFloat(formData.quantity),
                        cost_basis: parseFloat(formData.cost_basis),
                        premium_received: formData.premium_received ? parseFloat(formData.premium_received) : 0,
                        current_price: parseFloat(formData.current_price),
                        date_closed: formData.date_closed || null,
                        sell_price: formData.sell_price ? parseFloat(formData.sell_price) : null
                    };

                    if (editingId) {
                        await fetch(`${API_BASE}/tax-ledger/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        await fetch(`${API_BASE}/tax-ledger`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }

                    const updated = await fetch(`${API_BASE}/tax-ledger`).then(r => r.json());
                    onSetData(prev => ({ ...prev, taxLedger: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess(editingId ? 'Tax entry updated' : 'Tax entry added');
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({
                        date_acquired: '',
                        ticker: '',
                        asset_type: 'stock',
                        quantity: '',
                        cost_basis: '',
                        premium_received: '',
                        current_price: '',
                        date_closed: '',
                        sell_price: ''
                    });
                } catch (err) {
                    onSetError('Failed to save tax entry');
                }
            };

            const handleEdit = (entry) => {
                setFormData({
                    date_acquired: entry.date_acquired,
                    ticker: entry.ticker || '',
                    asset_type: entry.asset_type || 'stock',
                    quantity: entry.quantity.toString(),
                    cost_basis: entry.cost_basis.toString(),
                    premium_received: (entry.premium_received || 0).toString(),
                    current_price: entry.current_price.toString(),
                    date_closed: entry.date_closed || '',
                    sell_price: (entry.sell_price || '').toString()
                });
                setEditingId(entry.id);
                setIsModalOpen(true);
            };

            const handleDelete = async (id) => {
                if (!window.confirm('Delete this tax entry?')) return;
                try {
                    await fetch(`${API_BASE}/tax-ledger/${id}`, { method: 'DELETE' });
                    const updated = await fetch(`${API_BASE}/tax-ledger`).then(r => r.json());
                    onSetData(prev => ({ ...prev, taxLedger: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('Tax entry deleted');
                } catch (err) {
                    onSetError('Failed to delete tax entry');
                }
            };

            const handleOpenModal = () => {
                setEditingId(null);
                setFormData({
                    date_acquired: '',
                    ticker: '',
                    asset_type: 'stock',
                    quantity: '',
                    cost_basis: '',
                    premium_received: '',
                    current_price: '',
                    date_closed: '',
                    sell_price: ''
                });
                setIsModalOpen(true);
            };

            return (
                <div>
                    {/* Tax Rate Setting */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '20px', padding: '14px 18px', background: 'rgba(241,90,34,0.08)', border: '1px solid var(--border)', borderRadius: '8px' }}>
                        <span style={{ color: 'var(--text-muted)', fontSize: '0.85rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Combined Tax Rate (Fed + NJ)</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <input
                                type="number"
                                min="0"
                                max="60"
                                step="0.5"
                                value={taxRate}
                                onChange={e => setTaxRate(parseFloat(e.target.value) || 0)}
                                style={{ width: '70px', padding: '6px 10px', background: 'var(--input-bg)', border: '1px solid var(--accent)', borderRadius: '6px', color: 'var(--accent)', fontFamily: 'Courier New, monospace', fontSize: '1rem', fontWeight: 700, textAlign: 'center' }}
                            />
                            <span style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '1rem' }}>%</span>
                        </div>
                        <span style={{ color: 'var(--text-muted)', fontSize: '0.8rem' }}>Applied to all realized gains — adjust to match your effective bracket</span>
                        <button className="button button-primary" onClick={handleOpenModal} style={{ marginLeft: 'auto' }}>
                            + Add Trade
                        </button>
                    </div>

                    <div className="year-filter">
                        {years.map(year => (
                            <button
                                key={year}
                                className={`year-button ${yearFilter === year.toString() ? 'active' : ''}`}
                                onClick={() => setYearFilter(year.toString())}
                            >
                                {year === 'all' ? 'All' : year}
                            </button>
                        ))}
                    </div>

                    <div className="toggle-switch">
                        <input
                            type="checkbox"
                            id="ytd"
                            checked={ytdToggle}
                            onChange={(e) => setYtdToggle(e.target.checked)}
                        />
                        <label htmlFor="ytd">YTD Only</label>
                    </div>

                    <div className="year-filter">
                        {['all', 'open', 'closed'].map(status => (
                            <button
                                key={status}
                                className={`year-button ${statusFilter === status ? 'active' : ''}`}
                                onClick={() => setStatusFilter(status)}
                            >
                                {status.charAt(0).toUpperCase() + status.slice(1)}
                            </button>
                        ))}
                    </div>

                    <div className="stats-row">
                        <div className="stat-card">
                            <div className="stat-label">Total Realized P/L</div>
                            <div className={`stat-value ${summaryData.totalRealizedPL >= 0 ? 'positive' : 'negative'}`}>
                                {formatCurrency(summaryData.totalRealizedPL)}
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Short-term P/L</div>
                            <div className={`stat-value ${summaryData.shortTermPL >= 0 ? 'positive' : 'negative'}`}>
                                {formatCurrency(summaryData.shortTermPL)}
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Long-term P/L</div>
                            <div className={`stat-value ${summaryData.longTermPL >= 0 ? 'positive' : 'negative'}`}>
                                {formatCurrency(summaryData.longTermPL)}
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Tax Reserve</div>
                            <div className="stat-value negative">
                                {formatCurrency(summaryData.taxReserve)}
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Open Positions</div>
                            <div className="stat-value">
                                {summaryData.open}
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Closed Positions</div>
                            <div className="stat-value">
                                {summaryData.closed}
                            </div>
                        </div>
                    </div>

                    <Modal
                        title={editingId ? 'Edit Trade' : 'Add Trade'}
                        isOpen={isModalOpen}
                        onClose={() => setIsModalOpen(false)}
                    >
                        <div className="form-group">
                            <label>Date Acquired</label>
                            <input
                                type="date"
                                value={formData.date_acquired}
                                onChange={(e) => setFormData({ ...formData, date_acquired: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Ticker</label>
                            <input
                                type="text"
                                placeholder="AAPL"
                                value={formData.ticker}
                                onChange={(e) => setFormData({ ...formData, ticker: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Asset Type</label>
                            <select
                                value={formData.asset_type}
                                onChange={(e) => setFormData({ ...formData, asset_type: e.target.value })}
                            >
                                <option value="stock">Stock</option>
                                <option value="option">Option</option>
                                <option value="crypto">Crypto</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Quantity</label>
                            <input
                                type="number"
                                step="0.0001"
                                placeholder="100"
                                value={formData.quantity}
                                onChange={(e) => setFormData({ ...formData, quantity: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Cost Basis</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="150.00"
                                value={formData.cost_basis}
                                onChange={(e) => setFormData({ ...formData, cost_basis: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Premium Received</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="0.00"
                                value={formData.premium_received}
                                onChange={(e) => setFormData({ ...formData, premium_received: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Current Price</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="155.00"
                                value={formData.current_price}
                                onChange={(e) => setFormData({ ...formData, current_price: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Date Closed (optional)</label>
                            <input
                                type="date"
                                value={formData.date_closed}
                                onChange={(e) => setFormData({ ...formData, date_closed: e.target.value })}
                            />
                        </div>
                        <div className="form-group">
                            <label>Sell Price (optional)</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="160.00"
                                value={formData.sell_price}
                                onChange={(e) => setFormData({ ...formData, sell_price: e.target.value })}
                            />
                        </div>
                        <button className="button button-primary" onClick={handleAddEdit} style={{ width: '100%' }}>
                            {editingId ? 'Update' : 'Add'}
                        </button>
                    </Modal>

                    <div className="card">
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('date_acquired')}>
                                            Date Acquired {sortConfig.key === 'date_acquired' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('ticker')}>
                                            Ticker {sortConfig.key === 'ticker' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('asset_type')}>
                                            Type {sortConfig.key === 'asset_type' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('quantity')}>
                                            Qty {sortConfig.key === 'quantity' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('cost_basis')}>
                                            Cost Basis {sortConfig.key === 'cost_basis' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('premium_received')}>
                                            Premium {sortConfig.key === 'premium_received' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('days_held')} style={{ cursor: 'pointer' }}>
                                            Days Held {sortConfig.key === 'days_held' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('date_closed')} style={{ cursor: 'pointer' }}>
                                            Date Closed {sortConfig.key === 'date_closed' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('sell_price')} style={{ cursor: 'pointer' }}>
                                            Sell Price {sortConfig.key === 'sell_price' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('realized_pl')} style={{ cursor: 'pointer' }}>
                                            Realized P/L {sortConfig.key === 'realized_pl' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('tax_reserve')}>
                                            Tax Reserve {sortConfig.key === 'tax_reserve' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredLedger.length === 0 ? (
                                        <tr>
                                            <td colSpan="13" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No trades</td>
                                        </tr>
                                    ) : (
                                        filteredLedger.map(entry => (
                                            <tr key={entry.id}>
                                                <td>{entry.date_acquired}</td>
                                                <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>{entry.ticker || 'N/A'}</td>
                                                <td>{entry.asset_type}</td>
                                                <td>{formatNumber(entry.quantity, 4)}</td>
                                                <td>{formatCurrency(entry.cost_basis)}</td>
                                                <td>{formatCurrency(entry.premium_received || 0)}</td>
                                                <td>{entry.days_held || 0}</td>
                                                <td>{entry.date_closed || '—'}</td>
                                                <td>{entry.sell_price ? formatCurrency(entry.sell_price) : '—'}</td>
                                                <td className={(entry.realized_pl || 0) >= 0 ? 'positive' : 'negative'}>
                                                    {formatCurrency(entry.realized_pl || 0)}
                                                </td>
                                                <td className="negative">{formatCurrency(calcReserve(entry))}</td>
                                                <td>
                                                    <span className={entry.date_closed ? 'badge badge-closed' : 'badge badge-open'}>
                                                        {entry.date_closed ? 'Closed' : 'Open'}
                                                    </span>
                                                </td>
                                                <td>
                                                    <div className="action-buttons">
                                                        <button
                                                            className="action-button"
                                                            onClick={() => handleEdit(entry)}
                                                        >
                                                            ✏️
                                                        </button>
                                                        <button
                                                            className="action-button delete"
                                                            onClick={() => handleDelete(entry.id)}
                                                        >
                                                            ✕
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // CC Income Tab
        const CCIncomeTab = ({ data, onSetData, onSetError, onSetSuccess }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'date_opened', direction: 'desc' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [yearFilter, setYearFilter] = useState('all');
            const [expandedRoll, setExpandedRoll] = useState(null);
            const [rollModal, setRollModal] = useState({ open: false, cc: null });
            const [rollForm, setRollForm] = useState({ cost_to_close: '', new_strike: '', new_expiry: '', new_premium: '' });
            const [formData, setFormData] = useState({
                ticker: '',
                date_opened: '',
                contract_details: '',
                premium_collected: '',
                date_closed: '',
                cost_to_close: ''
            });

            const availableYears = useMemo(() => {
                const years = new Set();
                data.ccIncome.forEach(item => {
                    const d = item.date_opened || item.date_closed || '';
                    if (d) years.add(d.slice(0, 4));
                });
                return [...years].sort().reverse();
            }, [data.ccIncome]);

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            const filteredIncome = useMemo(() => {
                if (yearFilter === 'all') return data.ccIncome;
                return data.ccIncome.filter(item => {
                    const d = item.date_opened || item.date_closed || '';
                    return d.startsWith(yearFilter);
                });
            }, [data.ccIncome, yearFilter]);

            const sortedIncome = useMemo(() => {
                const sorted = [...filteredIncome];
                sorted.sort((a, b) => {
                    let aVal = a[sortConfig.key];
                    let bVal = b[sortConfig.key];
                    if (sortConfig.key === 'net_profit') {
                        aVal = (a.premium_collected || 0) - (a.cost_to_close || 0);
                        bVal = (b.premium_collected || 0) - (b.cost_to_close || 0);
                    }
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
                return sorted;
            }, [filteredIncome, sortConfig]);

            const totalPremium = useMemo(() => {
                return filteredIncome.reduce((sum, item) => sum + (item.premium_collected || 0), 0);
            }, [filteredIncome]);

            const handleAddEdit = async () => {
                try {
                    const payload = {
                        ticker: formData.ticker.toUpperCase(),
                        date_opened: formData.date_opened,
                        contract_details: formData.contract_details,
                        premium_collected: parseFloat(formData.premium_collected),
                        date_closed: formData.date_closed || null,
                        cost_to_close: formData.cost_to_close ? parseFloat(formData.cost_to_close) : 0
                    };

                    if (editingId) {
                        await fetch(`${API_BASE}/cc-income/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        await fetch(`${API_BASE}/cc-income`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }

                    const updated = await fetch(`${API_BASE}/cc-income`).then(r => r.json());
                    onSetData(prev => ({ ...prev, ccIncome: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess(editingId ? 'CC income updated' : 'CC income added');
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({
                        ticker: '',
                        date_opened: '',
                        contract_details: '',
                        premium_collected: '',
                        date_closed: '',
                        cost_to_close: ''
                    });
                } catch (err) {
                    onSetError('Failed to save CC income');
                }
            };

            const handleEdit = (income) => {
                setFormData({
                    ticker: income.ticker,
                    date_opened: income.date_opened,
                    contract_details: income.contract_details || '',
                    premium_collected: income.premium_collected.toString(),
                    date_closed: income.date_closed || '',
                    cost_to_close: (income.cost_to_close || 0).toString()
                });
                setEditingId(income.id);
                setIsModalOpen(true);
            };

            const handleDelete = async (id, ticker) => {
                if (!window.confirm(`Delete ${ticker} income?`)) return;
                try {
                    await fetch(`${API_BASE}/cc-income/${id}`, { method: 'DELETE' });
                    const updated = await fetch(`${API_BASE}/cc-income`).then(r => r.json());
                    onSetData(prev => ({ ...prev, ccIncome: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('CC income deleted');
                } catch (err) {
                    onSetError('Failed to delete CC income');
                }
            };

            const handleRoll = async () => {
                const cc = rollModal.cc;
                if (!cc) return;
                try {
                    await fetch(`${API_BASE}/cc-income/roll`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            cc_income_id: cc.id,
                            cost_to_close: parseFloat(rollForm.cost_to_close),
                            new_strike: rollForm.new_strike,
                            new_expiry: rollForm.new_expiry,
                            new_premium: parseFloat(rollForm.new_premium),
                        })
                    });
                    const updated = await fetch(`${API_BASE}/cc-income`).then(r => r.json());
                    onSetData(prev => ({ ...prev, ccIncome: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess(`Rolled ${cc.ticker} successfully`);
                    setRollModal({ open: false, cc: null });
                    setRollForm({ cost_to_close: '', new_strike: '', new_expiry: '', new_premium: '' });
                } catch (err) {
                    onSetError('Failed to roll: ' + err.message);
                }
            };

            const handleOpenModal = () => {
                setEditingId(null);
                setFormData({
                    ticker: '',
                    date_opened: '',
                    contract_details: '',
                    premium_collected: '',
                    date_closed: '',
                    cost_to_close: ''
                });
                setIsModalOpen(true);
            };

            return (
                <div>
                    <div className="stats-row">
                        <div className="stat-card">
                            <div className="stat-label">{yearFilter === 'all' ? 'Total' : yearFilter} Premium Harvested</div>
                            <div className="stat-value positive">
                                {formatCurrency(totalPremium)}
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
                        <button className="button button-primary" onClick={handleOpenModal}>
                            + Add Income
                        </button>
                        <div style={{ display: 'flex', gap: '4px', marginLeft: '8px' }}>
                            {['all', ...availableYears].map(yr => (
                                <button key={yr} onClick={() => setYearFilter(yr)}
                                    style={{
                                        padding: '4px 12px', borderRadius: '4px', border: '1px solid',
                                        borderColor: yearFilter === yr ? 'var(--accent)' : 'var(--border)',
                                        background: yearFilter === yr ? 'rgba(var(--accent), 0.2)' : 'transparent',
                                        color: yearFilter === yr ? 'var(--accent)' : 'var(--text-muted)',
                                        cursor: 'pointer', fontSize: '12px', fontFamily: 'Oswald, sans-serif',
                                    }}
                                >{yr === 'all' ? 'All' : yr}</button>
                            ))}
                        </div>
                    </div>

                    <Modal
                        title={editingId ? 'Edit CC Income' : 'Add CC Income'}
                        isOpen={isModalOpen}
                        onClose={() => setIsModalOpen(false)}
                    >
                        <div className="form-group">

                        <div className="form-group">

                        <div className="form-group">
                            <label>Contract Details</label>
                            <input
                                type="text"
                                placeholder="30 DTE, $150 Call"
                                value={formData.contract_details}

                        </div>
                        <div className="form-group">
                            <label>Premium Collected</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="250.00"
                                value={formData.premium_collected}

                        </div>
                        <div className="form-group">
                            <label>Date Closed (optional)</label>
                            <input
                                type="date"
                                value={formData.date_closed}
                                onChange={(e) => setFormData({ ...formData, date_closed: e.target.value })}

                        </div>
                        <div className="form-group">
                            <label>Cost to Close (optional)</label>
                            <input
                                type="number"
                                step="0.01"
                                placeholder="50.00"
                                value={formData.cost_to_close}
                                onChange={(e) => setFormData({ ...formData, cost_to_close: e.target.value })}
