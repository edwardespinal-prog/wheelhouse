                                    {yesterdayTotal >= 0 ? '+' : ''}{yesterdayTotal.toFixed(1)}M
                                </div>
                                <svg width="80" height="24" style={{ display: 'block', marginTop: '4px' }}>
                                    {last7.map((d, i) => {
                                        const v = d.Total || 0;
                                        const h = Math.max(2, (Math.abs(v) / maxAbs) * 20);
                                        return <rect key={i} x={i * 11 + 1} y={22 - h} width="9" height={h} rx="1"
                                            fill={v >= 0 ? '#10b981' : '#ef4444'} opacity="0.8" />;
                                    })}
                                </svg>
                                {etfFlow.stale && <div style={{ fontSize: '9px', color: '#eab308', marginTop: '2px' }}>Data may be stale</div>}
                                {etfFlow.last_updated && <div style={{ fontSize: '9px', color: 'var(--text-muted)', marginTop: '2px' }}>As of: {new Date(etfFlow.last_updated).toLocaleDateString()}</div>}
                            </div>
                        );
                    })()}

                    <div className="card" style={{ marginBottom: '24px' }}>
                        <h3 style={{ color: '#00d4ff', marginBottom: '16px', fontSize: '16px', fontWeight: '600' }}>Performance Timeframes</h3>
                        <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexWrap: 'wrap' }}>
                            {[
                                { key: 'live', label: 'LIVE' },
                                { key: '1d', label: '1D' },
                                { key: '1w', label: '1W' },
                                { key: '1m', label: '1M' },
                                { key: '3m', label: '3M' },
                                { key: 'ytd', label: 'YTD' },
                                { key: '1y', label: '1Y' },
                                { key: 'max', label: 'Max' },
                            ].map(tf => (
                                <button
                                    key={tf.key}
                                    onClick={() => setSelectedTimeframe(tf.key)}
                                    title={timeframeData[tf.key] ? `Ref: ${timeframeData[tf.key].refDate} | Starting: ${formatCurrency(timeframeData[tf.key].refNW)}` : 'No data'}
                                    style={{
                                        padding: '8px 18px',
                                        border: selectedTimeframe === tf.key ? '2px solid #00d4ff' : '1px solid #1e3a5f',
                                        borderRadius: '6px',
                                        background: selectedTimeframe === tf.key ? 'rgba(0,212,255,0.15)' : 'transparent',
                                        color: selectedTimeframe === tf.key ? '#00d4ff' : '#a0aec0',
                                        cursor: 'pointer',
                                        fontSize: '14px',
                                        fontWeight: selectedTimeframe === tf.key ? 700 : 400,
                                        transition: 'all 0.2s ease',
                                    }}
                                >
                                    {tf.label}
                                </button>
                            ))}
                        </div>
                        {activeChange ? (
                            <div style={{ display: 'flex', alignItems: 'center', gap: '24px', flexWrap: 'wrap' }}>
                                <div>
                                    <div style={{ color: 'var(--text-muted)', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>
                                        {selectedTimeframe.toUpperCase()}{activeChange.isToDate ? ' To Date' : ''} Change
                                    </div>
                                    <div style={{ fontSize: '32px', fontWeight: 700, fontFamily: "'Courier New', monospace", color: activeChange.pct >= 0 ? '#10b981' : '#ef4444' }}>
                                        {activeChange.pct >= 0 ? '+' : ''}{activeChange.pct.toFixed(2)}%
                                    </div>
                                </div>
                                <div>
                                    <div style={{ color: 'var(--text-muted)', fontSize: '12px', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '4px' }}>
                                        Dollar Change
                                    </div>
                                    <div style={{ fontSize: '24px', fontWeight: 700, fontFamily: "'Courier New', monospace", color: activeChange.dollar >= 0 ? '#10b981' : '#ef4444' }}>
                                        {activeChange.dollar >= 0 ? '+' : ''}{formatCurrency(activeChange.dollar)}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div style={{ color: 'var(--text-muted)', padding: '20px', textAlign: 'center' }}>
                                {historyLoading ? 'Loading chart data...' : 'Not enough history for this timeframe'}
                            </div>
                        )}
                        {(() => {
                            const filtered = (historyData?.data_points || []).map(p => ({ ...p, net_worth: p.portfolio_value }));
                            if (filtered.length < 2) return null;
                            const W = 800, H = 220, PAD = { top: 20, right: 20, bottom: 30, left: 65 };
                            const plotW = W - PAD.left - PAD.right, plotH = H - PAD.top - PAD.bottom;
                            const vals = filtered.map(s => s.net_worth);
                            const maxV = Math.max(...vals), minV = Math.min(...vals);
                            const rng = maxV - minV || 1;
                            const xPos = (i) => PAD.left + (i / (filtered.length - 1)) * plotW;
                            const yPos = (v) => PAD.top + plotH - ((v - minV) / rng) * plotH;
                            const first = filtered[0].net_worth, last = filtered[filtered.length-1].net_worth;
                            const range = selectedTimeframe;
                            const isUp = last >= first;
                            const lineColor = isUp ? '#10b981' : '#ef4444';
                            const baselineY = yPos(first);
                            // Build green area (above baseline) and red area (below baseline)
                            const greenArea = filtered.map((s, i) => {
                                const y = Math.min(yPos(s.net_worth), baselineY);
                                return `${xPos(i)},${y}`;
                            }).join(' ');
                            const greenPoly = `${xPos(0)},${baselineY} ` + greenArea + ` ${xPos(filtered.length-1)},${baselineY}`;
                            const redArea = filtered.map((s, i) => {
                                const y = Math.max(yPos(s.net_worth), baselineY);
                                return `${xPos(i)},${y}`;
                            }).join(' ');
                            const redPoly = `${xPos(0)},${baselineY} ` + redArea + ` ${xPos(filtered.length-1)},${baselineY}`;
                            // Line segments colored by position relative to baseline
                            const lineSegments = [];
                            for (let i = 0; i < filtered.length - 1; i++) {
                                const aboveStart = filtered[i].net_worth >= first;
                                const aboveEnd = filtered[i+1].net_worth >= first;
                                const color = aboveStart && aboveEnd ? '#10b981' : !aboveStart && !aboveEnd ? '#ef4444' : (aboveEnd ? '#10b981' : '#ef4444');
                                lineSegments.push({ x1: xPos(i), y1: yPos(filtered[i].net_worth), x2: xPos(i+1), y2: yPos(filtered[i+1].net_worth), color });
                            }
                            const gridN = 4;
                            const gridVals = Array.from({length: gridN+1}, (_, i) => minV + (rng/gridN)*i);
                            const labelInt = Math.max(1, Math.floor(filtered.length / 6));

                            return (
                                <div style={{ marginTop: '16px', position: 'relative' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '8px', minHeight: '36px' }}>
                                        <div>
                                            <span id="perf-chart-value" style={{ fontFamily: 'Oswald', fontSize: '28px', fontWeight: 700, color: 'var(--text-primary)' }}>
                                                {formatCurrency(filtered[filtered.length - 1].net_worth)}
                                            </span>
                                            <span id="perf-chart-change" style={{ fontSize: '14px', fontWeight: 600, marginLeft: '8px' }}></span>
                                        </div>
                                        <div id="perf-chart-ts" style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                            {(() => { const d = filtered[filtered.length - 1].date || ''; return d.includes('T') ? d.slice(0, 16).replace('T', ' ') : d; })()}
                                        </div>
                                    </div>
                                    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: '220px', cursor: 'crosshair', overflow: 'visible' }}>
                                        <defs>
                                            <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stopColor="#10b981" stopOpacity="0.03" />
                                                <stop offset={`${Math.max(10, (baselineY / H) * 100)}%`} stopColor="#10b981" stopOpacity="0.45" />
                                            </linearGradient>
                                            <linearGradient id="grad-red" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset={`${Math.min(90, (baselineY / H) * 100)}%`} stopColor="#ef4444" stopOpacity="0.45" />
                                                <stop offset="100%" stopColor="#ef4444" stopOpacity="0.05" />
                                            </linearGradient>
                                        </defs>
                                        {gridVals.map((v, i) => (
                                            <g key={i} style={{pointerEvents:'none'}}>
                                                <line x1={PAD.left} y1={yPos(v)} x2={W-PAD.right} y2={yPos(v)} stroke="var(--border)" strokeWidth="1" />
                                                <text x={PAD.left-8} y={yPos(v)+4} fill="var(--text-muted)" fontSize="10" textAnchor="end" fontFamily="Inter">${(v/1000).toFixed(0)}k</text>
                                            </g>
                                        ))}
                                        {filtered.map((s, i) => i % labelInt === 0 ? (
                                            <text key={i} x={xPos(i)} y={H-6} fill="var(--text-muted)" fontSize="9" textAnchor="middle" fontFamily="Inter" style={{pointerEvents:'none'}}>{s.date && s.date.includes('T') ? s.date.slice(11, 16) : (s.date ? s.date.slice(5) : '')}</text>
                                        ) : null)}
                                        <polygon points={greenPoly} fill="url(#grad-green)" style={{pointerEvents:'none'}} />
                                        <polygon points={redPoly} fill="url(#grad-red)" style={{pointerEvents:'none'}} />
                                        <line x1={PAD.left} y1={baselineY} x2={W-PAD.right} y2={baselineY} stroke="var(--text-muted)" strokeWidth="0.5" strokeDasharray="4" opacity="0.5" style={{pointerEvents:'none'}} />
                                        {lineSegments.map((seg, i) => (
                                            <line key={i} x1={seg.x1} y1={seg.y1} x2={seg.x2} y2={seg.y2} stroke={seg.color} strokeWidth="2" strokeLinejoin="round" style={{pointerEvents:'none'}} />
                                        ))}
                                        <line className="chart-vline" x1="0" y1={PAD.top} x2="0" y2={PAD.top + plotH} stroke="var(--text-muted)" strokeWidth="1" strokeDasharray="3" style={{display:'none', opacity: 0.4, pointerEvents:'none'}} />
                                        <circle className="chart-dot" cx="0" cy="0" r="5" fill="var(--accent)" stroke="var(--bg-primary)" strokeWidth="2" style={{display:'none', pointerEvents:'none'}} />
                                        {/* Transparent overlay on TOP of all elements — sole mouse event handler */}
                                        <rect x="0" y="0" width={W} height={H} fill="transparent" style={{ cursor: 'crosshair', pointerEvents: 'all' }}
                                        onMouseMove={(e) => {
                                            const svg = e.currentTarget.closest('svg');
                                            const pt = svg.createSVGPoint();
                                            pt.x = e.clientX;
                                            pt.y = e.clientY;
                                            const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
                                            const svgX = svgPt.x;
                                            const plotFrac = Math.max(0, Math.min(1, (svgX - PAD.left) / plotW));
                                            const exactIdx = plotFrac * (filtered.length - 1);
                                            const loIdx = Math.min(Math.max(Math.floor(exactIdx), 0), filtered.length - 2);
                                            const hiIdx = loIdx + 1;
                                            const frac = exactIdx - loIdx;
                                            const safeIdx = Math.min(Math.max(Math.round(exactIdx), 0), filtered.length - 1);
                                            const interpX = xPos(loIdx) + (xPos(hiIdx) - xPos(loIdx)) * frac;
                                            const interpY = yPos(filtered[loIdx].net_worth + (filtered[hiIdx].net_worth - filtered[loIdx].net_worth) * frac);
                                            const dot = svg.querySelector('.chart-dot');
                                            const vline = svg.querySelector('.chart-vline');
                                            if (dot) { dot.style.display = 'block'; dot.setAttribute('cx', interpX); dot.setAttribute('cy', interpY); }
                                            if (vline) { vline.style.display = 'block'; vline.setAttribute('x1', interpX); vline.setAttribute('x2', interpX); }
                                            const valEl = document.getElementById('perf-chart-value');
                                            const changeEl = document.getElementById('perf-chart-change');
                                            const tsEl = document.getElementById('perf-chart-ts');
                                            if (valEl) {
                                                const val = filtered[safeIdx].net_worth;
                                                const change = val - filtered[0].net_worth;
                                                const changePct = filtered[0].net_worth ? ((change / filtered[0].net_worth) * 100).toFixed(2) : '0.00';
                                                valEl.textContent = formatCurrency(val);
                                                if (changeEl) {
                                                    changeEl.textContent = `${change >= 0 ? '+' : ''}${formatCurrency(change)} (${change >= 0 ? '+' : ''}${changePct}%)`;
                                                    changeEl.style.color = change >= 0 ? '#10b981' : '#ef4444';
                                                }
                                                if (tsEl) { const d = filtered[safeIdx].date || ''; tsEl.textContent = d.includes('T') ? d.slice(0, 16).replace('T', ' ') : d; }
                                            }
                                        }}
                                        onMouseLeave={(e) => {
                                            const svg = e.currentTarget.closest('svg');
                                            ['chart-dot','chart-vline'].forEach(cls => { const el = svg.querySelector('.'+cls); if (el) el.style.display = 'none'; });
                                            const valEl = document.getElementById('perf-chart-value');
                                            const changeEl = document.getElementById('perf-chart-change');
                                            const tsEl = document.getElementById('perf-chart-ts');
                                            if (valEl) {
                                                const latest = filtered[filtered.length - 1];
                                                valEl.textContent = formatCurrency(latest.net_worth);
                                                if (changeEl) changeEl.textContent = '';
                                                if (tsEl) { const d = latest.date || ''; tsEl.textContent = d.includes('T') ? d.slice(0, 16).replace('T', ' ') : d; }
                                            }
                                        }} />
                                    </svg>
                                    <div className="chart-tooltip" style={{
                                        display: 'none', position: 'absolute', top: '-8px', transform: 'translateX(-50%)',
                                        background: 'var(--input-bg)', border: '1px solid var(--input-border)', borderRadius: '6px', padding: '6px 10px',
                                        fontSize: '12px', color: 'var(--text-primary)', pointerEvents: 'none', zIndex: 10, whiteSpace: 'nowrap'
                                    }}></div>
                                </div>
                            );
                        })()}

                    </div>

                    <div className="card">
                        <h3 style={{ color: 'var(--accent)', marginBottom: '20px', fontSize: '16px', fontWeight: '600' }}>Portfolio Allocation</h3>
                        {portfolioData.length > 0 ? (
                            <DonutChart data={portfolioData} onSliceClick={(tab)=>tab && onNavigate(tab)} />
                        ) : (
                            <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '40px 20px' }}>
                                No portfolio data available
                            </div>
                        )}
                    </div>

                    {/* Realized vs Unrealized P/L */}
                    <div className="card" style={{ marginTop: '24px' }}>
                        <h3 style={{ color: 'var(--accent)', marginBottom: '16px', fontSize: '16px', fontWeight: '600' }}>Realized vs. Unrealized P/L</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px', marginBottom: '16px' }}>
                            {[
                                { label: 'Equities P/L', val: (summary.equities_value || 0) - (summary.equities_invested || 0), tab: 'equities' },
                                { label: 'Options P/L', val: (summary.options_value || 0) - (summary.options_invested || 0), tab: 'options' },
                                { label: 'Crypto P/L', val: (summary.crypto_value || 0) - (summary.crypto_invested || 0), tab: 'crypto' },
                            ].map((item, i) => (
                                <div key={i} className="stat-card" style={{ cursor: 'pointer' }} onClick={() => onNavigate(item.tab)}>
                                    <div className="stat-label">{item.label} (Open Positions)</div>
                                    <div className={`stat-value ${item.val >= 0 ? 'positive' : 'negative'}`} style={{fontSize:'18px'}}>
                                        {item.val >= 0 ? '+' : ''}{formatCurrency(item.val)}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '12px', marginBottom: '20px' }}>
                            <div className="stat-card" style={{ cursor: 'pointer' }} onClick={() => onNavigate('equities')}>
                                <div className="stat-label">Unrealized Short-Term (Open Positions)</div>
                                <div className={`stat-value ${(summary.unrealized_st || 0) >= 0 ? 'positive' : 'negative'}`} style={{fontSize:'18px'}}>
                                    {(summary.unrealized_st || 0) >= 0 ? '+' : ''}{formatCurrency(summary.unrealized_st || 0)}
                                </div>
                            </div>
                            <div className="stat-card" style={{ cursor: 'pointer' }} onClick={() => onNavigate('equities')}>
                                <div className="stat-label">Unrealized Long-Term (Open Positions)</div>
                                <div className={`stat-value ${(summary.unrealized_lt || 0) >= 0 ? 'positive' : 'negative'}`} style={{fontSize:'18px'}}>
                                    {(summary.unrealized_lt || 0) >= 0 ? '+' : ''}{formatCurrency(summary.unrealized_lt || 0)}
                                </div>
                            </div>
                            <div className="stat-card" style={{ cursor: 'pointer' }} onClick={() => onNavigate('tax-ledger', null, 'realized-ytd')}>
                                <div className="stat-label">Realized (2026 YTD)</div>
                                <div className={`stat-value ${(summary.realized_pl || 0) >= 0 ? 'positive' : 'negative'}`} style={{fontSize:'18px'}}>
                                    {(summary.realized_pl || 0) >= 0 ? '+' : ''}{formatCurrency(summary.realized_pl || 0)}
                                </div>
                            </div>
                            <div className="stat-card" style={{borderLeftColor: (summary.potential_tax_savings || 0) > 0 ? '#eab308' : 'var(--border)'}}>
                                <div className="stat-label">Harvestable Tax Savings</div>
                                <div className="stat-value" style={{fontSize:'18px', color: '#eab308'}}>
                                    {formatCurrency(summary.potential_tax_savings || 0)}
                                </div>
                            </div>
                        </div>

                        {(summary.harvest_candidates || []).length > 0 && (
                            <div>
                                <h4 style={{ fontFamily: 'Oswald', fontSize: '14px', color: '#eab308', marginBottom: '8px' }}>Tax-Loss Harvesting Candidates</h4>
                                <div className="table-container">
                                    <table>
                                        <thead><tr><th>Position</th><th>Unrealized Loss</th><th>Holding Period</th><th>Date Acquired</th><th>Action</th></tr></thead>
                                        <tbody>
                                            {summary.harvest_candidates.map((h, i) => {
                                                const isOption = options.some(o => o.position_name.split(' ')[0].toUpperCase() === h.ticker.split(' ')[0].toUpperCase());
                                                return (
                                                <tr key={i}>
                                                    <td style={{fontWeight:600, cursor: 'pointer', color: 'var(--accent)'}} onClick={() => onNavigate(isOption ? 'options' : 'equities', h.ticker)}>{h.ticker}</td>
                                                    <td className="negative">{formatCurrency(h.loss)}</td>
                                                    <td><span className={h.holding === 'Long-Term' ? 'badge badge-success' : 'badge badge-open'} style={{fontSize:'10px'}}>{h.holding}</span></td>
                                                    <td style={{color:'var(--text-muted)'}}>{h.date_acquired || '—'}</td>
                                                    <td>
                                                        <button onClick={() => { setHarvestModal({ open: true, position: h, type: isOption ? 'option' : 'equity' }); setHarvestForm({ date_closed: new Date().toISOString().split('T')[0], sell_price: '', qty_sold: '' }); }}
                                                            style={{ padding: '2px 8px', fontSize: '10px', background: 'none', border: '1px solid #eab308', borderRadius: '4px', color: '#eab308', cursor: 'pointer', fontFamily: 'Oswald' }}>
                                                            Record Sale
                                                        </button>
                                                    </td>
                                                </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>

                                <Modal title={harvestModal.position ? `Close: ${harvestModal.position.ticker}` : 'Record Sale'} isOpen={harvestModal.open} onClose={() => setHarvestModal({ open: false, position: null, type: null })}>
                                    {harvestModal.position && (() => {
                                        const h = harvestModal.position;
                                        const isEq = harvestModal.type === 'equity';
                                        const match = isEq ? equities.find(e => e.ticker === h.ticker) : options.find(o => o.position_name.split(' ')[0].toUpperCase() === h.ticker.split(' ')[0].toUpperCase());
                                        const maxQty = isEq ? (match?.quantity || 0) : (match?.contracts || 0);
                                        const costBasis = isEq ? (match?.avg_cost || 0) : (match?.avg_cost || 0);
                                        const sp = parseFloat(harvestForm.sell_price) || 0;
                                        const qty = parseFloat(harvestForm.qty_sold) || maxQty;
                                        const rpl = isEq ? (sp - costBasis) * qty : (sp - costBasis) * qty * 100;
                                        return (<>
                                            <div style={{ padding: '8px', background: 'rgba(234,179,8,0.08)', borderRadius: '6px', marginBottom: '12px', fontSize: '12px' }}>
                                                <div>Current Loss: <strong className="negative">{formatCurrency(h.loss)}</strong></div>
                                                <div>{isEq ? 'Shares' : 'Contracts'}: <strong>{maxQty}</strong> @ <strong>{formatCurrency(costBasis)}</strong> avg</div>
                                            </div>
                                            <div className="form-group"><label>Date Sold</label><input type="date" value={harvestForm.date_closed} onChange={e => setHarvestForm({...harvestForm, date_closed: e.target.value})} /></div>
                                            <div className="form-group"><label>Sell Price {isEq ? '/ Share' : '/ Contract'}</label><input type="number" step="0.01" placeholder="0.00" value={harvestForm.sell_price} onChange={e => setHarvestForm({...harvestForm, sell_price: e.target.value})} /></div>
                                            <div className="form-group"><label>{isEq ? 'Qty Sold' : 'Contracts'} (max: {maxQty})</label><input type="number" step="0.0001" value={harvestForm.qty_sold} placeholder={String(maxQty)} onChange={e => setHarvestForm({...harvestForm, qty_sold: e.target.value})} /></div>
                                            {sp > 0 && (
                                                <div style={{ padding: '8px', background: 'rgba(0,212,255,0.06)', borderRadius: '6px', marginBottom: '12px', fontSize: '12px' }}>
                                                    <div>Proceeds: <strong>{formatCurrency(sp * qty * (isEq ? 1 : 100))}</strong></div>
                                                    <div>Cost: <strong>{formatCurrency(costBasis * qty * (isEq ? 1 : 100))}</strong></div>
                                                    <div>Realized P/L: <strong className={rpl >= 0 ? 'positive' : 'negative'}>{formatCurrency(rpl)}</strong></div>
                                                </div>
                                            )}
                                            <button className="button button-primary" onClick={handleHarvestSale} style={{ width: '100%' }} disabled={!harvestForm.sell_price || !harvestForm.date_closed}>Record Sale in Tax Ledger</button>
                                        </>);
                                    })()}
                                </Modal>

                                <div style={{ marginTop: '8px', fontSize: '11px', color: 'var(--text-muted)' }}>
                                    Selling these positions would realize losses that offset realized gains. 30-day wash sale rule applies — do not rebuy within 30 days.
                                </div>
                            </div>
                        )}
                    </div>

                    {(topMovers.gainers.length > 0 || topMovers.losers.length > 0) && (
                        <div className="card" style={{ marginTop: '24px' }}>
                            <h3 style={{ color: 'var(--accent)', marginBottom: '20px', fontSize: '16px', fontWeight: '600' }}>Top Movers</h3>
                            <div className="top-movers">
                                {topMovers.gainers.length > 0 && (
                                    <div className="movers-section">
                                        <h3>Top Gainers</h3>
                                        {topMovers.gainers.map(pos => (
                                            <div key={pos.ticker} className="mover-item gainer">
                                                <span className="mover-ticker">{pos.ticker}</span>
                                                <span className={`mover-pct positive`}>
                                                    {formatPercent(pos.pl_percent)}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {topMovers.losers.length > 0 && (
                                    <div className="movers-section">
                                        <h3>Top Losers</h3>
                                        {topMovers.losers.map(pos => (
                                            <div key={pos.ticker} className="mover-item loser">
                                                <span className="mover-ticker">{pos.ticker}</span>
                                                <span className={`mover-pct negative`}>
                                                    {formatPercent(pos.pl_percent)}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Risk Tab
        const RiskTab = ({ onSetError, onNavigate }) => {
            const [riskData, setRiskData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`${API_BASE}/risk`)
                    .then(r => r.json())
                    .then(d => { if (d.error) { onSetError(`Risk: ${d.error}`); } else { setRiskData(d); } setLoading(false); })
                    .catch(e => { onSetError('Failed to load risk data'); setLoading(false); });
            }, []);

            if (loading) return <div className="card" style={{textAlign:'center',padding:'40px'}}><Spinner /></div>;
            if (!riskData) return null;

            const { concentration, beta, sectors, options_risk, underlying_exposure, risk_score, alerts } = riskData;
            const fmt = (v) => '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            const scoreColor = { HIGH: '#ef4444', MODERATE: '#eab308', LOW: '#10b981', MINIMAL: '#10b981' };

            return (
                <div>
                    {/* Risk Score + Alerts */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: '16px', marginBottom: '24px' }}>
                        <div className="stat-card" style={{ minWidth: '160px', borderLeftColor: scoreColor[risk_score] || 'var(--accent)', position: 'relative', cursor: 'help' }}
                            title={'MINIMAL: 0 alerts — portfolio is well-diversified\nLOW: 1-2 alerts — minor concentration or expiry risks\nMODERATE: 3-5 alerts — multiple positions need attention\nHIGH: 6+ alerts — significant concentration, sector, or options risk\n\nAlerts trigger on: single position >15%, sector >30%, options expiring <30 days, deep OTM positions (>25% away from strike)'}>
                            <div className="stat-label">Risk Score <span style={{fontSize:'10px',color:'#a0aec0'}}>(?)</span></div>
                            <div className="stat-value" style={{ color: scoreColor[risk_score], fontSize: '28px' }}>{risk_score}</div>
                            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{alerts.length} alert{alerts.length !== 1 ? 's' : ''}</div>
                        </div>
                        <div className="card" style={{ maxHeight: '140px', overflowY: 'auto' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '14px', color: 'var(--accent)', marginBottom: '8px' }}>Active Alerts</h3>
                            {alerts.length === 0 ? <div style={{color:'#a0aec0',fontSize:'13px'}}>No risk alerts</div> : (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                                    {alerts.map((a, i) => (
                                        <div key={i} style={{ fontSize: '12px', padding: '4px 8px', background: 'rgba(239,68,68,0.1)', borderRadius: '4px', color: 'var(--text-primary)' }}>
                                            ⚠ {a}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Concentration + Beta row */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px' }}>
                        {/* Concentration Pie Chart */}
                        <div className="card">
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginBottom: '4px' }}>Concentration</h3>
                            <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '12px' }}>Top 5 = {concentration.top5_pct}% | HHI = {concentration.hhi}</div>
                            {(() => {
                                const colors = ['var(--accent)','#ef4444','#10b981','#eab308','var(--accent-blue)','#8b5cf6','#ec4899','#06b6d4','#f97316'];
                                const total = concentration.positions.reduce((s, p) => s + p.market_value, 0);
                                let cumAngle = 0;
                                const cx = 100, cy = 100, r = 80;
                                const slices = concentration.positions.map((p, i) => {
                                    const angle = (p.market_value / total) * 360;
                                    const start = cumAngle;
                                    cumAngle += angle;
                                    const startRad = (start - 90) * Math.PI / 180;
                                    const endRad = (start + angle - 90) * Math.PI / 180;
                                    const largeArc = angle > 180 ? 1 : 0;
                                    const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
                                    const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
                                    const midRad = (start + angle / 2 - 90) * Math.PI / 180;
                                    const lx = cx + (r + 15) * Math.cos(midRad), ly = cy + (r + 15) * Math.sin(midRad);
                                    const path = `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z`;
                                    return { ...p, path, color: colors[i % colors.length], lx, ly };
                                });
                                return (
                                    <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                                        <svg viewBox="0 0 240 200" style={{ width: '220px', height: '200px', flexShrink: 0 }}>
                                            {slices.map((s, i) => (
                                                <g key={i} style={{ cursor: 'pointer' }} onClick={() => onNavigate && onNavigate(s.asset_class === 'crypto' ? 'crypto' : 'equities', s.ticker)}>
                                                    <path d={s.path} fill={s.color} stroke="var(--bg-primary)" strokeWidth="1.5"
                                                        onMouseEnter={e => e.target.setAttribute('opacity','0.8')}
                                                        onMouseLeave={e => e.target.setAttribute('opacity','1')} />
                                                    {s.pct > 5 && <text x={s.lx} y={s.ly} fill="var(--text-primary)" fontSize="9" textAnchor="middle" fontFamily="Oswald" pointerEvents="none">{s.ticker}</text>}
                                                </g>
                                            ))}
                                        </svg>
                                        <div style={{ flex: 1 }}>
                                            {slices.map((s, i) => (
                                                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px', cursor: 'pointer', fontSize: '12px' }}
                                                    onClick={() => onNavigate && onNavigate(s.asset_class === 'crypto' ? 'crypto' : 'equities', s.ticker)}>
                                                    <div style={{ width: '10px', height: '10px', borderRadius: '2px', background: s.color, flexShrink: 0 }}></div>
                                                    <div style={{ fontWeight: 600, color: s.alert ? '#ef4444' : 'var(--text-primary)', width: '50px' }}>{s.ticker}</div>
                                                    <div style={{ color: 'var(--text-muted)' }}>{s.pct}%</div>
                                                    <div style={{ color: 'var(--text-muted)', marginLeft: 'auto' }}>{fmt(s.market_value)}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>

                        {/* Beta Exposure */}
                        <div className="card">
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginBottom: '12px' }}>Beta Exposure</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                                <div className="stat-card" title="Portfolio Beta measures overall market sensitivity.\n\nCalculated as the weighted average of each position's beta, where weights are based on market value.\n\nBeta = 1.0 means moves with the market.\nBeta > 1.0 means more volatile than the market.\nBeta < 1.0 means less volatile.\n\nFormula: Σ (position_weight × position_beta) for all positions." style={{ cursor: 'help' }}>
                                    <div className="stat-label">Portfolio Beta</div>
                                    <div className="stat-value" style={{ color: beta.portfolio_beta > 1.5 ? '#ef4444' : beta.portfolio_beta > 1 ? '#eab308' : '#10b981' }}>
                                        {beta.portfolio_beta}x
                                    </div>
                                </div>
                                <div className="stat-card" title="Dollar Beta = Portfolio Value × Portfolio Beta.\n\nRepresents your portfolio's effective market exposure in dollar terms.\n\nExample: $100K portfolio with 1.5 beta = $150K of market exposure.\n\nThis tells you how much dollar value you'd expect to gain or lose for every 1% move in the market." style={{ cursor: 'help' }}>
                                    <div className="stat-label">Dollar Beta</div>
                                    <div className="stat-value">{fmt(beta.dollar_beta_exposure)}</div>
                                </div>
                            </div>
                            <div className="table-container">
                                <table>
                                    <thead><tr><th>Ticker</th><th>Beta</th><th>Weight</th><th>Contribution</th></tr></thead>
                                    <tbody>
                                        {beta.positions.map((b, i) => (
                                            <tr key={i}>
                                                <td style={{ fontWeight: 600 }}>{b.ticker}</td>
                                                <td style={{ color: b.beta > 1.5 ? '#ef4444' : b.beta > 1 ? '#eab308' : '#10b981' }}>{b.beta}</td>
                                                <td>{(b.weight * 100).toFixed(1)}%</td>
                                                <td>{b.weighted_beta.toFixed(3)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Sector + Underlying Exposure row */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '20px' }}>
                        {/* Sector */}
                        <div className="card">
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginBottom: '12px' }}>Sector Exposure</h3>
                            {sectors.breakdown.map((s, i) => (
                                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: '13px', fontWeight: 600, color: s.pct > 30 ? '#ef4444' : 'var(--text-primary)' }}>{s.sector}</div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{s.tickers.join(', ')}</div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <div style={{ fontSize: '14px', fontWeight: 600 }}>{s.pct}%</div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{fmt(s.market_value)}</div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Underlying Exposure */}
                        <div className="card">
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginBottom: '12px' }}>Underlying Exposure</h3>
                            <div style={{ fontSize: '10px', color: 'var(--text-muted)', marginBottom: '8px' }}>Equity + Options + Crypto combined per ticker</div>
                            <div className="table-container">
                                <table>
                                    <thead><tr><th>Ticker</th><th>Equity</th><th>Options</th><th>Crypto</th><th>Total</th><th>%</th></tr></thead>
                                    <tbody>
                                        {underlying_exposure.map((u, i) => (
                                            <tr key={i}>
                                                <td style={{ fontWeight: 600 }}>{u.ticker}</td>
                                                <td>{u.equity_value > 0 ? fmt(u.equity_value) : '—'}</td>
                                                <td>{u.options_value > 0 ? fmt(u.options_value) : '—'}</td>
                                                <td>{u.crypto_value > 0 ? fmt(u.crypto_value) : '—'}</td>
                                                <td style={{ fontWeight: 600 }}>{fmt(u.total_exposure)}</td>
                                                <td>{u.pct}%</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* Options At-Risk */}
                    <div className="card">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)' }}>Options At-Risk</h3>
                            <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                {fmt(options_risk.total_value)} value ({options_risk.pct_of_portfolio}% of portfolio) | {fmt(options_risk.total_invested)} invested
                            </div>
                        </div>
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr><th>Position</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Days</th><th>Status</th><th>Invested</th><th>Value</th><th>P/L</th><th>Alerts</th></tr>
                                </thead>
                                <tbody>
                                    {options_risk.positions.map((p, i) => (
                                        <tr key={i} style={{ cursor: 'pointer' }} onClick={() => onNavigate && onNavigate('options', p.name)}>
                                            <td style={{fontWeight:600, color: 'var(--accent)'}}>{p.name}</td>
                                            <td><span className={p.type === 'put' ? 'badge badge-danger' : 'badge badge-success'} style={{fontSize:'9px'}}>{(p.type||'').toUpperCase()}</span></td>
                                            <td>{p.strike ? `$${p.strike}` : '—'}</td>
                                            <td>{p.expiration || '—'}</td>
                                            <td style={{ color: (p.days_to_expiry || 999) <= 30 ? '#ef4444' : '#a0aec0', fontWeight: (p.days_to_expiry || 999) <= 30 ? 600 : 400 }}>
                                                {p.days_to_expiry != null ? p.days_to_expiry : '—'}
                                            </td>
                                            <td>{p.moneyness ? <span style={{color: p.moneyness === 'ITM' ? '#10b981' : '#ef4444', fontWeight:600}}>{p.moneyness} {p.distance_pct != null ? `(${p.distance_pct}%)` : ''}</span> : '—'}</td>
                                            <td>{fmt(p.invested)}</td>
                                            <td>{fmt(p.current_value)}</td>
                                            <td className={p.pl >= 0 ? 'positive' : 'negative'}>{p.pl >= 0 ? '+' : ''}{fmt(p.pl)}</td>
                                            <td>
                                                {p.alerts && p.alerts.length > 0 ? p.alerts.map((a,j) => (
                                                    <div key={j} style={{fontSize:'10px',color:'#ef4444'}}>⚠ {a}</div>
                                                )) : <span style={{color:'#a0aec0'}}>—</span>}
                                                {p.recommendations && p.recommendations.length > 0 && (
                                                    <div style={{marginTop:'4px',borderTop:'1px solid var(--border)',paddingTop:'4px'}}>
                                                        {p.recommendations.slice(0,2).map((r,j) => (
                                                            <div key={j} style={{fontSize:'10px',color:'#10b981'}}>→ {r}</div>
                                                        ))}
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // News Tab
        const NewsTab = ({ data, onSetError }) => {
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('all');
            const [searchTicker, setSearchTicker] = useState('');
            const [summary, setSummary] = useState(null);
            const [sentimentHistory, setSentimentHistory] = useState(null);
            const [sortMode, setSortMode] = useState('relevance');
            const [heatmapData, setHeatmapData] = useState(null);
            const [heatmapOpen, setHeatmapOpen] = useState(true);

            useEffect(() => {
                fetch(`${API_BASE}/heatmap`).then(r => r.json()).then(setHeatmapData).catch(() => {});
            }, []);

            const loadNews = async () => {
                setLoading(true);
                try {
                    const [newsResp, sumResp, shResp] = await Promise.all([
                        fetch(`${API_BASE}/news/portfolio`),
                        fetch(`${API_BASE}/news/summary`).catch(() => null),
                        fetch(`${API_BASE}/news/sentiment-history`).catch(() => null)
                    ]);
                    const result = await newsResp.json();
                    if (result.error) { onSetError(`News: ${result.error}`); } else { setArticles(result); }
                    if (sumResp) { const s = await sumResp.json(); if (!s.error) setSummary(s); }
                    if (shResp) { const sh = await shResp.json(); if (!sh.error) setSentimentHistory(sh); }
                } catch (e) {
                    onSetError('Failed to load news');
                }
                setLoading(false);
            };

            const searchNews = async (ticker) => {
                setLoading(true);
                try {
                    const resp = await fetch(`${API_BASE}/news/${ticker}`);
                    const result = await resp.json();
                    if (Array.isArray(result)) {
                        setArticles(prev => {
                            // Merge search results with existing articles, dedup by title
                            const existing = new Map(prev.map(a => [a.title.toLowerCase().trim(), a]));
                            result.forEach(a => { if (!existing.has(a.title.toLowerCase().trim())) existing.set(a.title.toLowerCase().trim(), a); });
                            return [...existing.values()].sort((a, b) => (b.published_ts || 0) - (a.published_ts || 0));
                        });
                        setFilter(ticker);
                    }
                } catch (e) {
                    onSetError(`Failed to load news for ${ticker}`);
                }
                setLoading(false);
            };

            useEffect(() => { loadNews(); }, []);

            const portfolioTickers = useMemo(() => {
                const tickers = new Set();
                (data.equities || []).forEach(e => { if (!['OPENZ','OPENL','OPENW'].includes(e.ticker)) tickers.add(e.ticker); });
                (data.crypto || []).forEach(c => { if (c.asset) tickers.add(c.asset); });
                return [...tickers].sort();
            }, [data.equities, data.crypto]);

            // Alert keyword detection (Feature 4)
            const ALERT_KEYWORDS = {
                earnings: ["earnings", "EPS", "revenue miss", "revenue beat", "quarterly results", "guidance"],
                analyst: ["upgrade", "downgrade", "price target", "initiates coverage", "overweight", "underweight", "buy rating", "sell rating", "outperform"],
                insider: ["insider", "CEO buy", "officer purchase", "10b5-1", "Form 4"],
                regulatory: ["SEC", "DOJ", "lawsuit", "settlement", "investigation", "FDA approval"],
                corporate: ["acquisition", "merger", "buyback", "dividend", "stock split", "offering", "dilution"]
            };
            const classifyAlert = (a) => {
                const text = ((a.title || '') + ' ' + (a.description || '')).toLowerCase();
                for (const [type, keywords] of Object.entries(ALERT_KEYWORDS)) {
                    if (keywords.some(k => text.includes(k.toLowerCase()))) return type;
                }
                return null;
            };

            // Relevance scoring (Feature 3)
            const positionValues = useMemo(() => {
                const vals = {};
                let total = 0;
                (data.equities || []).forEach(e => { vals[e.ticker] = e.market_value || 0; total += (e.market_value || 0); });
                (data.crypto || []).forEach(c => { vals[c.asset] = c.market_value || 0; total += (c.market_value || 0); });
                return { vals, total };
            }, [data.equities, data.crypto]);

            const getRelevanceScore = (a) => {
                const now = Date.now() / 1000;
                const age = now - (a.published_ts || 0);
                const recency = age < 3600 ? 1.0 : age < 14400 ? 0.8 : age < 43200 ? 0.6 : age < 86400 ? 0.4 : 0.2;
                if (a.is_macro) return 0.3 * recency;
                const tickers = a.tickers || [a.ticker];
                const maxWeight = Math.max(...tickers.map(t => positionValues.total > 0 ? (positionValues.vals[t] || 0) / positionValues.total : 0));
                return maxWeight * recency;
            };

            const filtered = useMemo(() => {
                let result;
                if (filter === 'all') result = articles;
                else if (filter === 'portfolio') result = articles.filter(a => !a.is_macro);
                else if (filter === 'macro') result = articles.filter(a => a.is_macro);
                else if (filter === 'alerts') result = articles.filter(a => classifyAlert(a) !== null);
                else result = articles.filter(a => a.ticker === filter || (a.tickers && a.tickers.includes(filter)));
                if (sortMode === 'relevance') {
                    return [...result].sort((a, b) => getRelevanceScore(b) - getRelevanceScore(a));
                }
                return [...result].sort((a, b) => (b.published_ts || 0) - (a.published_ts || 0));
            }, [articles, filter, sortMode, positionValues]);

            const alertCount = useMemo(() => articles.filter(a => classifyAlert(a) !== null).length, [articles]);

            const sentimentColor = (s) => s === 'bullish' ? '#10b981' : s === 'bearish' ? '#ef4444' : 'var(--text-muted)';
            const sentimentLabel = (s) => s === 'bullish' ? 'Bullish' : s === 'bearish' ? 'Bearish' : 'Neutral';
            const alertTypeLabel = (type) => ({ earnings: 'Earnings', analyst: 'Analyst', insider: 'Insider', regulatory: 'Regulatory', corporate: 'Corporate' }[type] || '');
            const alertTypeColor = (type) => ({ earnings: '#f59e0b', analyst: '#8b5cf6', insider: '#3b82f6', regulatory: '#ef4444', corporate: '#06b6d4' }[type] || 'var(--text-muted)');

            const sentimentSummary = useMemo(() => {
                const portfolio = articles.filter(a => !a.is_macro);
                const b = portfolio.filter(a => a.sentiment === 'bullish').length;
                const bear = portfolio.filter(a => a.sentiment === 'bearish').length;
                const n = portfolio.filter(a => a.sentiment === 'neutral').length;
                const ratio = (b + bear) > 0 ? Math.round((b / (b + bear)) * 100) : 50;
                return { bullish: b, bearish: bear, neutral: n, total: b + bear + n, ratio };
            }, [articles]);

            // Movers + News pairing (Feature 2)
            const moversWithNews = useMemo(() => {
                if (!summary || !summary.movers) return [];
                return summary.movers.slice(0, 6).map(m => {
                    const match = articles.find(a => (a.tickers || [a.ticker]).includes(m.ticker) && !a.is_macro);
                    return { ...m, article: match || null };
                });
            }, [summary, articles]);

            const formatTimeAgo = (ts) => {
                if (!ts) return '';
                const diff = Math.floor(Date.now() / 1000 - ts);
                if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
                if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
                if (diff < 172800) return 'Yesterday';
                return `${Math.floor(diff / 86400)}d ago`;
            };

            const ArticleCard = ({ a, compact }) => {
                const alertType = classifyAlert(a);
                const tickerValue = (a.tickers || [a.ticker]).reduce((max, t) => Math.max(max, positionValues.vals[t] || 0), 0);
                const showValue = tickerValue > 0 && !a.is_macro;
                return (
                <a href={a.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'none', color: 'inherit' }}>
                    <div className="card" style={{
                        padding: compact ? '10px 14px' : '14px 18px', cursor: 'pointer', transition: 'border-color 0.2s, background 0.2s',
                        borderLeft: `3px solid ${sentimentColor(a.sentiment)}`,
                        display: 'flex', gap: '12px', alignItems: 'flex-start'
                    }}
                    onMouseEnter={e => { e.currentTarget.style.borderLeftColor = 'var(--accent)'; e.currentTarget.style.background = 'rgba(255,255,255,0.02)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderLeftColor = sentimentColor(a.sentiment); e.currentTarget.style.background = ''; }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: 'flex', gap: '6px', alignItems: 'center', marginBottom: '4px', flexWrap: 'wrap' }}>
                                {(a.tickers || [a.ticker]).map(t => (
                                    <span key={t} style={{ fontWeight: 600, color: '#fff', fontSize: '10px', background: 'var(--accent)', padding: '1px 6px', borderRadius: '3px' }}>
                                        {t}{showValue && positionValues.vals[t] ? ` ($${(positionValues.vals[t]/1000).toFixed(1)}K)` : ''}
                                    </span>
                                ))}
                                {a.is_macro && <span style={{ fontSize: '10px', color: 'var(--text-muted)', background: 'rgba(160,174,192,0.15)', padding: '1px 5px', borderRadius: '3px' }}>MARKET</span>}
                                <span style={{ fontSize: '10px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600,
                                    color: sentimentColor(a.sentiment), background: a.sentiment === 'bullish' ? 'rgba(16,185,129,0.1)' : a.sentiment === 'bearish' ? 'rgba(239,68,68,0.1)' : 'rgba(160,174,192,0.1)' }}>
                                    {sentimentLabel(a.sentiment)}
                                </span>
                                {alertType && <span style={{ fontSize: '10px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600, color: alertTypeColor(alertType), background: `${alertTypeColor(alertType)}15` }}>
                                    {alertTypeLabel(alertType)}
                                </span>}
                                <span style={{ fontSize: '11px', color: 'var(--text-muted)', marginLeft: 'auto', whiteSpace: 'nowrap' }}>
                                    {formatTimeAgo(a.published_ts)}
                                </span>
                            </div>
                            <div style={{ fontSize: compact ? '13px' : '14px', fontWeight: 500, lineHeight: 1.4, marginBottom: '2px' }}>
                                {a.title}
                            </div>
                            {!compact && a.description && (
                                <div style={{ fontSize: '12px', color: 'var(--text-muted)', lineHeight: 1.4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                    {a.description}
                                </div>
                            )}
                            <div style={{ fontSize: '10px', color: 'var(--text-muted)', marginTop: '2px' }}>{a.source}</div>
                        </div>
                    </div>
                </a>
                );
            };

            return (
                <div>
                    {/* Feature 1: What Moved Today Summary Bar */}
                    {summary && (
                        <div className="card" style={{ padding: '14px 20px', marginBottom: '16px', background: 'var(--bg-secondary)', borderLeft: '3px solid var(--accent)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                                <span style={{ fontSize: '14px', fontWeight: 600, color: 'var(--text-primary)', lineHeight: 1.5 }}>
                                    {summary.portfolio_change_pct !== 0 && (
                                        <span style={{ color: summary.portfolio_change_pct >= 0 ? 'var(--positive)' : 'var(--negative)', marginRight: '8px' }}>
                                            Portfolio {summary.portfolio_change_pct >= 0 ? '+' : ''}{summary.portfolio_change_pct}%
                                        </span>
                                    )}
                                    {summary.movers && summary.movers.slice(0, 4).map((m, i) => (
                                        <span key={m.ticker}>
                                            {i > 0 && <span style={{ color: 'var(--text-muted)' }}> · </span>}
                                            <span style={{ color: m.direction === 'up' ? 'var(--positive)' : 'var(--negative)' }}>
                                                {m.ticker} {m.change_pct >= 0 ? '+' : ''}{m.change_pct}%
                                            </span>
                                        </span>
                                    ))}
                                    {summary.spy_change !== null && (
                                        <span style={{ color: 'var(--text-muted)', fontWeight: 400, fontSize: '12px', marginLeft: '8px' }}>
                                            SPY {summary.spy_change >= 0 ? '+' : ''}{summary.spy_change}%
                                        </span>
                                    )}
                                </span>
                                {summary.alerts && summary.alerts.length > 0 && (
                                    <span style={{ fontSize: '12px', color: '#f59e0b', marginLeft: '8px' }}>
                                        {summary.alerts.join(' · ')}
                                    </span>
                                )}
                                <span style={{ fontSize: '10px', color: 'var(--text-muted)', marginLeft: 'auto', whiteSpace: 'nowrap' }}>
                                    as of {summary.as_of ? new Date(summary.as_of).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}
                                </span>
                            </div>
                        </div>
                    )}

                    {/* Sentiment Summary — 2 cards with sparkline */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '12px', marginBottom: '20px' }}>
                        <div className="stat-card">
                            <div className="stat-label">Portfolio Sentiment</div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <div className="stat-value" style={{ color: sentimentSummary.ratio >= 50 ? '#10b981' : '#ef4444' }}>
                                    {sentimentSummary.ratio}% Bullish
                                </div>
                                {sentimentHistory && (
                                    <span style={{ fontSize: '14px', color: sentimentHistory.trend === 'improving' ? '#10b981' : sentimentHistory.trend === 'declining' ? '#ef4444' : 'var(--text-muted)' }}>
                                        {sentimentHistory.trend === 'improving' ? '↑' : sentimentHistory.trend === 'declining' ? '↓' : '→'}
                                    </span>
                                )}
                            </div>
                            {/* 7-day sparkline */}
                            {sentimentHistory && sentimentHistory.history && sentimentHistory.history.length > 1 && (() => {
                                const pts = sentimentHistory.history.slice(-7);
                                const w = 160, h = 30;
                                const vals = pts.map(p => p.ratio);
                                const min = Math.min(...vals, 0.2), max = Math.max(...vals, 0.8);
                                const range = max - min || 0.1;
                                const points = vals.map((v, i) => `${(i / (vals.length - 1)) * w},${h - ((v - min) / range) * h}`).join(' ');
                                const avgRatio = vals.reduce((s, v) => s + v, 0) / vals.length;
                                const color = avgRatio > 0.6 ? '#10b981' : avgRatio < 0.4 ? '#ef4444' : '#f59e0b';
                                return (
                                    <svg width={w} height={h} style={{ marginTop: '6px', display: 'block' }}>
                                        <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" />
                                        {vals.map((v, i) => (
                                            <circle key={i} cx={(i / (vals.length - 1)) * w} cy={h - ((v - min) / range) * h} r="2" fill={color} />
                                        ))}
                                    </svg>
                                );
                            })()}
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">Today's Coverage</div>
                            <div className="stat-value" style={{ fontSize: '14px' }}>
                                <span style={{ color: '#10b981' }}>{sentimentSummary.bullish} bullish</span>
                                <span style={{ color: 'var(--text-muted)' }}> · </span>
                                <span style={{ color: '#ef4444' }}>{sentimentSummary.bearish} bearish</span>
                                <span style={{ color: 'var(--text-muted)' }}> · </span>
                                <span style={{ color: 'var(--text-muted)' }}>{sentimentSummary.neutral} neutral</span>
                            </div>
                        </div>
                    </div>

                    {/* Search + Filters */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
                        <form onSubmit={e => { e.preventDefault(); if (searchTicker.trim()) searchNews(searchTicker.trim().toUpperCase()); }} style={{ display: 'flex', gap: '8px' }}>

                                onChange={e => setSearchTicker(e.target.value)} className="search-box" style={{ maxWidth: '200px' }} />
                            <button type="submit" className="button button-primary">{loading ? <Spinner /> : 'Search'}</button>

                        <button onClick={() => { setFilter('all'); setSearchTicker(''); setSortMode('relevance'); loadNews(); }} className="button button-primary" style={{fontSize:'11px',padding:'6px 12px'}}>Refresh</button>
                        <div style={{ display: 'flex', gap: '4px', marginLeft: '8px' }}>

                                <button key={k} onClick={() => setFilter(k)}

                                        background: filter === k ? (k === 'alerts' ? '#f59e0b' : 'var(--accent)') : 'transparent',

                            {[['relevance', 'Relevance'], ['recent', 'Recent']].map(([k, label]) => (
                                <button key={k} onClick={() => setSortMode(k)}

                                <button key={t} onClick={() => setFilter(t)}

                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Heat Map */}
                    {heatmapData?.tiles && (
                        <div style={{ marginBottom: '16px' }}>
                            <div onClick={() => setHeatmapOpen(!heatmapOpen)} style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px', userSelect: 'none' }}>
                                {heatmapOpen ? '▾' : '▸'} <span style={{ fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '1px', fontSize: '11px' }}>Heat Map</span>
                                {heatmapData.as_of && <span style={{ marginLeft: '8px', fontSize: '10px', opacity: 0.6 }}>as of {heatmapData.as_of.slice(0,16).replace('T',' ')}</span>}
                            </div>
                            {heatmapOpen && (() => {
                                const tiles = [...heatmapData.tiles].sort((a, b) => (b.weight || 0) - (a.weight || 0));
                                const totalW = tiles.reduce((s, t) => s + (t.weight || 1), 0);
                                const getColor = (pct) => {
                                    if (pct >= 3) return '#16a34a';
                                    if (pct >= 1) return '#22c55e';
                                    if (pct >= 0.5) return '#4ade80';
                                    if (pct > -0.5) return '#6b7280';
                                    if (pct > -1) return '#f87171';
                                    if (pct > -3) return '#ef4444';
                                    return '#dc2626';
                                };
                                return (
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '2px', minHeight: '120px' }}>
                                        {tiles.map(tile => {
                                            const span = Math.max(8, Math.round((tile.weight || 1) / totalW * 100));
                                            return (
                                                <div key={tile.ticker}
                                                    onClick={() => setFilter(tile.ticker)}
                                                    title={`${tile.ticker} | $${tile.price?.toFixed(2)} | ${tile.daily_change_pct >= 0 ? '+' : ''}${tile.daily_change_pct?.toFixed(2)}%${tile.market_value ? ' | MV: $' + tile.market_value.toLocaleString() : ''}${tile.weight ? ' | ' + tile.weight.toFixed(1) + '% of portfolio' : ''}`}
                                                    style={{
                                                        flex: `${span} 0 0`,
                                                        minWidth: '60px',
                                                        padding: '6px 4px',
                                                        background: getColor(tile.daily_change_pct || 0),
                                                        borderRadius: '4px',
                                                        cursor: 'pointer',
                                                        display: 'flex',
                                                        flexDirection: 'column',
                                                        justifyContent: 'center',
                                                        alignItems: 'center',
                                                        transition: 'opacity 0.15s',
                                                        opacity: filter !== 'all' && filter !== tile.ticker ? 0.4 : 1,
