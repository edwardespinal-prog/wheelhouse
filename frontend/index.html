                    <div className="card">
                        <div className="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('ticker')} style={{ cursor: 'pointer' }}>
                                            Ticker {sortConfig.key === 'ticker' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('date_opened')} style={{ cursor: 'pointer' }}>
                                            Date Opened {sortConfig.key === 'date_opened' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('contract_details')} style={{ cursor: 'pointer' }}>
                                            Contract Details {sortConfig.key === 'contract_details' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('premium_collected')} style={{ cursor: 'pointer' }}>
                                            Premium Collected {sortConfig.key === 'premium_collected' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('date_closed')} style={{ cursor: 'pointer' }}>
                                            Date Closed {sortConfig.key === 'date_closed' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('cost_to_close')} style={{ cursor: 'pointer' }}>
                                            Cost to Close {sortConfig.key === 'cost_to_close' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th onClick={() => handleSort('net_profit')} style={{ cursor: 'pointer' }}>
                                            Net Profit {sortConfig.key === 'net_profit' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                        </th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {sortedIncome.length === 0 ? (
                                        <tr>
                                            <td colSpan="8" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No CC income</td>
                                        </tr>
                                    ) : (
                                        sortedIncome.map(income => {
                                            const netProfit = (income.premium_collected || 0) - (income.cost_to_close || 0);
                                            const rolls = income.roll_history || [];
                                            const hasRolls = rolls.length > 1;
                                            const isExpanded = expandedRoll === income.id;
                                            return (
                                                <React.Fragment key={income.id}>
                                                <tr style={{ cursor: hasRolls ? 'pointer' : 'default' }} onClick={() => hasRolls && setExpandedRoll(isExpanded ? null : income.id)}>
                                                    <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>
                                                        {income.ticker}
                                                        {hasRolls && (
                                                            <span style={{ fontSize: '9px', marginLeft: '6px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600, color: 'var(--accent)', background: 'rgba(241,90,34,0.1)' }}>
                                                                Rolled ({rolls.length}x)
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td>{income.date_opened}</td>
                                                    <td>{income.contract_details || 'N/A'}</td>
                                                    <td>{formatCurrency(income.premium_collected)}</td>
                                                    <td>{income.date_closed || 'Open'}</td>
                                                    <td>{formatCurrency(income.cost_to_close || 0)}</td>
                                                    <td className={netProfit >= 0 ? 'positive' : 'negative'}>
                                                        {income.current_leg_pl !== undefined && hasRolls ? (
                                                            <div>
                                                                <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px' }}>All-In:</div>
                                                                <div>{formatCurrency(netProfit)}</div>
                                                                <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Current Leg:</div>
                                                                <div style={{ color: income.current_leg_pl >= 0 ? 'var(--positive)' : 'var(--negative)' }}>{formatCurrency(income.current_leg_pl)}</div>
                                                            </div>
                                                        ) : formatCurrency(netProfit)}
                                                    </td>
                                                    <td>
                                                        <div className="action-buttons">
                                                            {!income.date_closed && (
                                                                <button className="action-button" onClick={e => { e.stopPropagation(); setRollModal({ open: true, cc: income }); setRollForm({ cost_to_close: '', new_strike: '', new_expiry: '', new_premium: '' }); }} title="Roll">
                                                                    🔄
                                                                </button>
                                                            )}
                                                            <button className="action-button" onClick={e => { e.stopPropagation(); handleEdit(income); }}>✏️</button>
                                                            <button className="action-button delete" onClick={e => { e.stopPropagation(); handleDelete(income.id, income.ticker); }}>✕</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                                {isExpanded && (
                                                    <tr style={{ background: 'rgba(241,90,34,0.02)' }}>
                                                        <td colSpan="8" style={{ padding: '12px 16px' }}>
                                                            <table style={{ width: '100%', fontSize: '12px' }}>
                                                                <thead>
                                                                    <tr style={{ color: 'var(--text-muted)' }}>
                                                                        <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Leg</th>
                                                                        <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Date</th>
                                                                        <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Action</th>
                                                                        <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500 }}>Strike/Expiry</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Premium In</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Cost to Close</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px', fontWeight: 500 }}>Net/Contract</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {rolls.map((leg, li) => (
                                                                        <tr key={li} style={{ borderBottom: '1px solid var(--border)' }}>
                                                                            <td style={{ padding: '4px 8px' }}>{leg.leg}</td>
                                                                            <td style={{ padding: '4px 8px' }}>{leg.date}</td>
                                                                            <td style={{ padding: '4px 8px', textTransform: 'capitalize' }}>{leg.action}</td>
                                                                            <td style={{ padding: '4px 8px' }}>{leg.strike} {leg.expiry}</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right', color: 'var(--positive)' }}>${leg.premium.toFixed(2)}</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right', color: leg.cost_to_close > 0 ? 'var(--negative)' : 'var(--text-muted)' }}>
                                                                                {leg.cost_to_close > 0 ? `$${leg.cost_to_close.toFixed(2)}` : '—'}
                                                                            </td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right', fontWeight: 600, color: leg.net_per_contract >= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                                                                                {leg.net_per_contract >= 0 ? '+' : ''}{leg.net_per_contract.toFixed(2)}
                                                                            </td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                            <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginTop: '10px', padding: '8px', background: 'var(--bg-secondary)', borderRadius: '4px', fontSize: '12px' }}>
                                                                <span>Total Premium: <strong style={{ color: 'var(--positive)' }}>{formatCurrency(income.premium_collected)}</strong></span>
                                                                <span>Total Roll Costs: <strong style={{ color: 'var(--negative)' }}>{formatCurrency(income.cost_to_close || 0)}</strong></span>
                                                                <span>Net Closed Rolls: <strong style={{ color: netProfit >= 0 ? 'var(--positive)' : 'var(--negative)' }}>{formatCurrency(netProfit)}</strong></span>
                                                            </div>
                                                            {!income.date_closed && rolls.length > 0 && (
                                                                <div style={{ marginTop: '6px', fontSize: '11px', color: 'var(--text-muted)' }}>
                                                                    Current Leg: <strong style={{ color: 'var(--text-primary)' }}>{rolls[rolls.length - 1].strike} {rolls[rolls.length - 1].expiry}</strong>
                                                                </div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                )}
                                                </React.Fragment>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Roll Modal */}
                    <Modal title={`Roll ${rollModal.cc?.ticker || ''} ${rollModal.cc?.contract_details || ''}`} isOpen={rollModal.open} onClose={() => setRollModal({ open: false, cc: null })}>
                        <div className="form-group">
                            <label>Cost to Close Current Leg (per contract)</label>
                            <input type="number" step="0.01" placeholder="21.85" value={rollForm.cost_to_close}
                                onChange={e => setRollForm({ ...rollForm, cost_to_close: e.target.value })} />
                        </div>
                        <div className="form-group">
                            <label>New Strike</label>
                            <input type="text" placeholder="$90C" value={rollForm.new_strike}
                                onChange={e => setRollForm({ ...rollForm, new_strike: e.target.value })} />
                        </div>
                        <div className="form-group">
                            <label>New Expiry</label>
                            <input type="text" placeholder="06/2027" value={rollForm.new_expiry}
                                onChange={e => setRollForm({ ...rollForm, new_expiry: e.target.value })} />
                        </div>
                        <div className="form-group">
                            <label>New Premium (per contract)</label>
                            <input type="number" step="0.01" placeholder="12.50" value={rollForm.new_premium}
                                onChange={e => setRollForm({ ...rollForm, new_premium: e.target.value })} />
                        </div>
                        <button className="button button-primary" onClick={handleRoll} style={{ width: '100%' }}>Roll Position</button>
                    </Modal>
                </div>
            );
        };

        // Dark Pool & Insiders Tab
        const MiniSparkline = ({ data, width = 80, height = 24 }) => {
            if (!data || data.length < 2) return null;
            const vals = data.map(d => d.short_ratio);
            const min = Math.min(...vals), max = Math.max(...vals);
            const range = max - min || 1;
            const points = vals.map((v, i) =>
                `${(i / (vals.length - 1)) * width},${height - ((v - min) / range) * (height - 4) - 2}`
            ).join(' ');
            return (
                <svg width={width} height={height} style={{ display: 'block' }}>
                    <polyline points={points} fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeLinejoin="round" />
                </svg>
            );
        };

        const DarkPoolChart = ({ dailyData, ticker }) => {
            if (!dailyData || dailyData.length < 2) return <div style={{color:'#a0aec0',textAlign:'center',padding:'20px'}}>No dark pool data available</div>;
            const W = 700, H = 220, PAD = { top: 20, right: 20, bottom: 35, left: 55 };
            const plotW = W - PAD.left - PAD.right, plotH = H - PAD.top - PAD.bottom;
            const vals = dailyData.map(d => d.short_ratio);
            const maxVal = Math.max(...vals, 60), minVal = Math.min(...vals, 20);
            const range = maxVal - minVal || 1;
            const x = (i) => PAD.left + (i / (dailyData.length - 1)) * plotW;
            const y = (v) => PAD.top + plotH - ((v - minVal) / range) * plotH;
            const line = dailyData.map((d, i) => `${x(i)},${y(d.short_ratio)}`).join(' ');
            const areaPoints = `${x(0)},${y(minVal)} ` + dailyData.map((d, i) => `${x(i)},${y(d.short_ratio)}`).join(' ') + ` ${x(dailyData.length-1)},${y(minVal)}`;
            const gridLines = 4;
            const gridVals = Array.from({ length: gridLines + 1 }, (_, i) => minVal + (range / gridLines) * i);
            const labelInterval = Math.max(1, Math.floor(dailyData.length / 7));
            return (
                <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', maxHeight: '240px' }}>
                    {gridVals.map((v, i) => (
                        <g key={i}>
                            <line x1={PAD.left} y1={y(v)} x2={W-PAD.right} y2={y(v)} stroke="var(--border)" strokeWidth="1" />
                            <text x={PAD.left-8} y={y(v)+4} fill="var(--text-muted)" fontSize="10" textAnchor="end" fontFamily="Inter">{v.toFixed(0)}%</text>
                        </g>
                    ))}
                    <line x1={PAD.left} y1={y(40)} x2={W-PAD.right} y2={y(40)} stroke="#eab30855" strokeWidth="1" strokeDasharray="4" />
                    <line x1={PAD.left} y1={y(55)} x2={W-PAD.right} y2={y(55)} stroke="#ef444455" strokeWidth="1" strokeDasharray="4" />
                    {dailyData.map((d, i) => i % labelInterval === 0 ? (
                        <text key={i} x={x(i)} y={H-6} fill="var(--text-muted)" fontSize="9" textAnchor="middle" fontFamily="Inter">{d.date.slice(5)}</text>
                    ) : null)}
                    <polygon points={areaPoints} fill="rgba(241,90,34,0.1)" />
                    <polyline points={line} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" />
                </svg>
            );
        };

        const DarkPoolInsidersTab = ({ data, onSetError }) => {
            const [view, setView] = useState('portfolio');
            const [selectedTicker, setSelectedTicker] = useState(null);
            const [searchTicker, setSearchTicker] = useState('');
            const [dpPortfolio, setDpPortfolio] = useState({});
            const [insiderPortfolio, setInsiderPortfolio] = useState({});
            const [optionsFlowPortfolio, setOptionsFlowPortfolio] = useState({});
            const [dpDetail, setDpDetail] = useState(null);
            const [insiderDetail, setInsiderDetail] = useState(null);
            const [flowDetail, setFlowDetail] = useState(null);
            const [flowExp, setFlowExp] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sortBy, setSortBy] = useState('ratio');
            const [insiderFilter, setInsiderFilter] = useState('all');
            const [detailTab, setDetailTab] = useState('darkpool');
            const [showDailyTable, setShowDailyTable] = useState(false);

            const loadPortfolio = async () => {
                setLoading(true);
                try {
                    const dpResp = await fetch(`${API_BASE}/darkpool/portfolio`);
                    const dpRes = await dpResp.json();
                    if (dpRes.error) { onSetError(`Dark pool: ${dpRes.error}`); } else { setDpPortfolio(dpRes); }

                    const insResp = await fetch(`${API_BASE}/insiders/portfolio`);
                    const insRes = await insResp.json();
                    if (insRes.error) { onSetError(`Insiders: ${insRes.error}`); } else { setInsiderPortfolio(insRes); }

                    const ofResp = await fetch(`${API_BASE}/options-flow/portfolio`);
                    const ofRes = await ofResp.json();
                    if (!ofRes.error) { setOptionsFlowPortfolio(ofRes); }
                } catch (e) {
                    onSetError('Failed to load dark pool data: ' + e.message);
                }
                setLoading(false);
            };

            const loadTickerDetail = async (ticker, exp) => {
                setSelectedTicker(ticker);
                setView('detail');
                if (!exp) setLoading(true);

                const safeFetch = async (url) => {
                    try {
                        const r = await fetch(url);
                        const text = await r.text();
                        return JSON.parse(text);
                    } catch { return null; }
                };

                if (!exp) {
                    const [dpRes, insRes] = await Promise.all([
                        safeFetch(`${API_BASE}/darkpool/${ticker}`),
                        safeFetch(`${API_BASE}/insiders/${ticker}`)
                    ]);
                    if (dpRes && !dpRes.error) setDpDetail(dpRes);
                    if (insRes && !insRes.error) setInsiderDetail(insRes);
                }

                const expParam = exp ? `?exp=${exp}` : '';
                const flowRes = await safeFetch(`${API_BASE}/options-flow/${ticker}${expParam}`);
                if (flowRes) {
                    setFlowDetail(flowRes);
                    if (flowRes.expiration) setFlowExp(flowRes.expiration);
                }

                setLoading(false);
            };

            const handleSearch = (e) => {
                e.preventDefault();
                if (searchTicker.trim()) {
                    loadTickerDetail(searchTicker.trim().toUpperCase());
                    setSearchTicker('');
                }
            };

            useEffect(() => { loadPortfolio(); }, []);

            const ratioColor = (r) => r > 55 ? '#ef4444' : r > 40 ? '#eab308' : '#10b981';
            const fmt = (n) => n ? n.toLocaleString() : '0';

            const pcColor = (r) => r > 1.0 ? '#ef4444' : r > 0.7 ? '#eab308' : '#10b981';

            const sortedTickers = useMemo(() => {
                const entries = Object.entries(dpPortfolio).map(([ticker, d]) => ({
                    ticker, ...d,
                    latestInsider: (insiderPortfolio[ticker] || [])[0] || null,
                    optionsFlow: optionsFlowPortfolio[ticker] || null
                }));
                if (sortBy === 'ratio') entries.sort((a, b) => (b.short_ratio || 0) - (a.short_ratio || 0));
                else if (sortBy === 'ticker') entries.sort((a, b) => a.ticker.localeCompare(b.ticker));
                else if (sortBy === 'insider') entries.sort((a, b) => {
                    const aDate = a.latestInsider?.trade_date || '';
                    const bDate = b.latestInsider?.trade_date || '';
                    return bDate.localeCompare(aDate);
                });
                return entries;
            }, [dpPortfolio, insiderPortfolio, optionsFlowPortfolio, sortBy]);

            const filteredInsiderTrades = useMemo(() => {
                if (!insiderDetail) return [];
                let trades = insiderDetail.trades || [];
                if (insiderFilter === 'buys') trades = trades.filter(t => t.is_purchase);
                else if (insiderFilter === 'sells') trades = trades.filter(t => !t.is_purchase);
                return trades;
            }, [insiderDetail, insiderFilter]);

            // Portfolio Overview
            if (view === 'portfolio') return (
                <div>
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '20px' }}>
                        <form onSubmit={handleSearch} style={{ display: 'flex', gap: '8px', flex: 1 }}>
                            <input type="text" placeholder="Search any ticker..." value={searchTicker}
                                onChange={e => setSearchTicker(e.target.value)} className="search-box" style={{ flex: 1, maxWidth: 'none' }} />
                            <button type="submit" className="button button-primary">{loading ? <Spinner /> : 'Search'}</button>
                        </form>
                        <button className="button button-primary" onClick={loadPortfolio}>Refresh</button>
                    </div>

                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                        <span style={{ color: 'var(--text-muted)', fontSize: '12px', lineHeight: '28px' }}>Sort:</span>
                        {[['ratio', 'Short Ratio'], ['ticker', 'Ticker'], ['insider', 'Recent Insider']].map(([key, label]) => (
                            <button key={key} onClick={() => setSortBy(key)}
                                style={{ padding: '4px 12px', fontSize: '11px', border: '1px solid var(--border)', borderRadius: '4px', cursor: 'pointer',
                                    background: sortBy === key ? 'var(--accent)' : 'transparent', color: sortBy === key ? '#fff' : '#a0aec0' }}>
                                {label}
                            </button>
                        ))}
                    </div>

                    {loading ? <div style={{textAlign:'center',padding:'40px'}}><Spinner /></div> : (<>
                        {sortedTickers.length > 0 && (() => {
                            const highShort = sortedTickers.filter(t => t.short_ratio > 50).length;
                            const unusual = sortedTickers.filter(t => t.optionsFlow?.unusual_count > 0).length;
                            const recentBuys = sortedTickers.filter(t => t.latestInsider?.is_purchase).length;
                            return (highShort > 0 || unusual > 0 || recentBuys > 0) ? (
                                <div style={{ marginBottom: '16px', padding: '10px 16px', background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: '6px', fontSize: '12px', display: 'flex', gap: '20px', flexWrap: 'wrap' }}>
                                    {highShort > 0 && <span style={{ color: '#ef4444' }}>{highShort} ticker{highShort > 1 ? 's' : ''} with short ratio &gt;50%</span>}
                                    {unusual > 0 && <span style={{ color: 'var(--accent)' }}>{unusual} with unusual options activity</span>}
                                    {recentBuys > 0 && <span style={{ color: '#10b981' }}>{recentBuys} with insider buying</span>}
                                </div>
                            ) : null;
                        })()}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '16px' }}>
                            {sortedTickers.map(item => (
                                <div key={item.ticker} className="card" onClick={() => loadTickerDetail(item.ticker)}
                                    style={{ cursor: 'pointer', transition: 'border-color 0.2s', borderColor: 'transparent' }}
                                    onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                                    onMouseLeave={e => e.currentTarget.style.borderColor = 'transparent'}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                                        <div>
                                            <div style={{ fontFamily: 'Oswald', fontSize: '20px', color: 'var(--accent)' }}>{item.ticker}</div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{item.date}</div>
                                        </div>
                                        <div style={{ textAlign: 'right' }}>
                                            <div style={{ fontFamily: 'Oswald', fontSize: '28px', color: ratioColor(item.short_ratio), lineHeight: 1 }}>
                                                {(item.short_ratio || 0).toFixed(1)}%
                                            </div>
                                            <div style={{ fontSize: '10px', color: 'var(--text-muted)', textTransform: 'uppercase' }}>Short Ratio</div>
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                        <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                            Short: {fmt(item.short_volume)} / Total: {fmt(item.total_volume)}
                                        </div>
                                        <MiniSparkline data={item.history || []} />
                                    </div>
                                    {item.optionsFlow && (
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px', fontSize: '11px' }}>
                                            <div style={{ color: 'var(--text-muted)' }}>
                                                P/C: <span style={{ color: pcColor(item.optionsFlow.put_call_ratio), fontWeight: 600 }}>{item.optionsFlow.put_call_ratio}</span>
                                                <span style={{ marginLeft: '8px' }}>Vol: {(item.optionsFlow.call_volume + item.optionsFlow.put_volume).toLocaleString()}</span>
                                            </div>
                                            {item.optionsFlow.unusual_count > 0 && (
                                                <span style={{ background: 'rgba(241,90,34,0.2)', color: 'var(--accent)', padding: '2px 6px', borderRadius: '3px', fontSize: '10px', fontWeight: 600 }}>
                                                    {item.optionsFlow.unusual_count} UNUSUAL
                                                </span>
                                            )}
                                        </div>
                                    )}
                                    {item.latestInsider && (
                                        <div style={{ fontSize: '11px', borderTop: '1px solid var(--border)', paddingTop: '8px', color: 'var(--text-muted)' }}>
                                            <span className={item.latestInsider.is_purchase ? 'badge badge-success' : 'badge badge-danger'} style={{fontSize:'9px',padding:'2px 5px',marginRight:'4px'}}>
                                                {item.latestInsider.trade_type}
                                            </span>
                                            {item.latestInsider.insider_name} — {item.latestInsider.value} ({item.latestInsider.trade_date})
                                        </div>
                                    )}
                                </div>
                            ))}
                            {sortedTickers.length === 0 && !loading && (
                                <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>
                                    No dark pool data available. Click Refresh to load.
                                </div>
                            )}
                        </div>
                    </>)}
                </div>
            );

            // Single Ticker Detail View
            return (
                <div>
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', alignItems: 'center' }}>
                        <button className="button button-primary" onClick={() => { setView('portfolio'); setSelectedTicker(null); setDetailTab('darkpool'); }}>
                            ← Back
                        </button>
                        <h2 style={{ fontFamily: 'Oswald', fontSize: '24px', color: 'var(--accent)', margin: 0 }}>{selectedTicker}</h2>
                        <form onSubmit={handleSearch} style={{ display: 'flex', gap: '8px', flex: 1, marginLeft: 'auto' }}>
                            <input type="text" placeholder="Search ticker..." value={searchTicker}
                                onChange={e => setSearchTicker(e.target.value)} className="search-box" style={{ flex: 1, maxWidth: '200px', marginBottom: 0 }} />
                            <button type="submit" className="button button-primary">Go</button>
                        </form>
                    </div>

                    {/* Summary bar */}
                    {dpDetail && dpDetail.stats && (
                        <div style={{ padding: '10px 16px', background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: '6px', marginBottom: '16px', display: 'flex', gap: '24px', flexWrap: 'wrap', fontSize: '13px', alignItems: 'center' }}>
                            <div>Short Ratio: <strong style={{ color: ratioColor(dpDetail.latest?.short_ratio || 0), fontFamily: 'Oswald' }}>{(dpDetail.latest?.short_ratio || 0).toFixed(1)}%</strong></div>
                            <div style={{ color: 'var(--text-muted)' }}>30D Avg: <strong>{dpDetail.stats.avg_ratio}%</strong></div>
                            <div style={{ color: 'var(--text-muted)' }}>High: <strong style={{ color: '#ef4444' }}>{dpDetail.stats.max_ratio}%</strong></div>
                            <div style={{ color: 'var(--text-muted)' }}>Low: <strong style={{ color: '#10b981' }}>{dpDetail.stats.min_ratio}%</strong></div>
                            {flowDetail && !flowDetail.error && <>
                                <div style={{ borderLeft: '1px solid var(--border)', paddingLeft: '16px' }}>P/C: <strong style={{ color: pcColor(flowDetail.put_call_ratio) }}>{flowDetail.put_call_ratio}</strong></div>
                                {flowDetail.unusual_count > 0 && <span style={{ background: 'rgba(241,90,34,0.2)', color: 'var(--accent)', padding: '2px 8px', borderRadius: '3px', fontSize: '11px', fontWeight: 600 }}>{flowDetail.unusual_count} UNUSUAL</span>}
                            </>}
                        </div>
                    )}

                    {/* Detail tabs */}
                    <div style={{ display: 'flex', gap: '4px', marginBottom: '16px' }}>
                        {[['darkpool', 'Dark Pool'], ['flow', 'Options Flow'], ['insiders', 'Insiders']].map(([key, label]) => (
                            <button key={key} onClick={() => setDetailTab(key)}
                                style={{ padding: '6px 16px', fontSize: '13px', fontFamily: 'Oswald, sans-serif', border: '1px solid',
                                    borderColor: detailTab === key ? 'var(--accent)' : 'var(--border)',
                                    background: detailTab === key ? 'rgba(241,90,34,0.1)' : 'transparent',
                                    color: detailTab === key ? 'var(--accent)' : 'var(--text-muted)',
                                    borderRadius: '4px', cursor: 'pointer' }}>
                                {label}
                            </button>
                        ))}
                    </div>

                    {loading ? <div style={{textAlign:'center',padding:'40px'}}><Spinner /></div> : (
                        <div>
                            {/* Dark Pool Tab */}
                            {detailTab === 'darkpool' && dpDetail && dpDetail.stats && (
                                <div>
                                    <div className="card" style={{ marginBottom: '16px', padding: '20px' }}>
                                        <DarkPoolChart dailyData={dpDetail.daily} ticker={selectedTicker} />
                                    </div>
                                    <div className="card">
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                            <h3 style={{ fontFamily: 'Oswald', fontSize: '14px', color: 'var(--accent)' }}>Daily Volume</h3>
                                            <button onClick={() => setShowDailyTable(!showDailyTable)}
                                                style={{ background: 'none', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px 10px', fontSize: '11px' }}>
                                                {showDailyTable ? 'Hide' : 'Show'} ({(dpDetail.daily || []).length} days)
                                            </button>
                                        </div>
                                        {showDailyTable && (
                                            <div className="table-container">
                                                <table>
                                                    <thead><tr><th>Date</th><th>Short Vol</th><th>Total Vol</th><th>Ratio</th><th>Exempt</th></tr></thead>
                                                    <tbody>
                                                        {[...(dpDetail.daily || [])].reverse().map((d, i) => (
                                                            <tr key={i}>
                                                                <td>{d.date}</td>
                                                                <td>{d.short_volume.toLocaleString()}</td>
                                                                <td>{d.total_volume.toLocaleString()}</td>
                                                                <td style={{ color: ratioColor(d.short_ratio), fontWeight: 600 }}>{d.short_ratio}%</td>
                                                                <td>{d.short_exempt.toLocaleString()}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Options Flow Tab */}
                            {detailTab === 'flow' && flowDetail && !flowDetail.error && (
                                <div className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <div style={{ display: 'flex', gap: '16px', fontSize: '13px' }}>
                                            <span>Calls: <strong style={{ color: '#10b981' }}>{flowDetail.call_volume?.toLocaleString()}</strong></span>
                                            <span>Puts: <strong style={{ color: '#ef4444' }}>{flowDetail.put_volume?.toLocaleString()}</strong></span>
                                        </div>
                                        <select value={flowExp || ''} onChange={e => { setFlowExp(e.target.value); loadTickerDetail(selectedTicker, e.target.value); }}
                                            style={{ padding: '4px 8px', fontSize: '11px', background: 'var(--input-bg)', border: '1px solid var(--input-border)', borderRadius: '4px', color: 'var(--text-primary)' }}>
                                            {(flowDetail.expirations || []).map(exp => (
                                                <option key={exp} value={exp}>{exp}</option>
                                            ))}
                                        </select>
                                    </div>
                                    {flowDetail.flow && flowDetail.flow.length > 0 && (
                                        <div className="table-container">
                                            <table>
                                                <thead><tr><th>Type</th><th>Strike</th><th>Vol</th><th>OI</th><th>Vol/OI</th><th>IV</th><th>Price</th><th>Premium</th><th>Signal</th></tr></thead>
                                                <tbody>
                                                    {flowDetail.flow.map((f, i) => (
                                                        <tr key={i} style={{ background: f.unusual ? 'rgba(241,90,34,0.06)' : 'transparent' }}>
                                                            <td><span className={f.type === 'C' ? 'badge badge-success' : 'badge badge-danger'}>{f.type === 'C' ? 'CALL' : 'PUT'}</span></td>
                                                            <td style={{ fontWeight: 600 }}>${f.strike}</td>
                                                            <td>{f.volume.toLocaleString()}</td>
                                                            <td>{f.oi.toLocaleString()}</td>
                                                            <td style={{ color: f.vol_oi > 1 ? 'var(--accent)' : 'var(--text-muted)', fontWeight: f.vol_oi > 1 ? 600 : 400 }}>{f.vol_oi}x</td>
                                                            <td>{f.iv}%</td>
                                                            <td>${f.price}</td>
                                                            <td>${f.premium.toLocaleString()}</td>
                                                            <td>{f.unusual && <span style={{ background: 'rgba(241,90,34,0.2)', color: 'var(--accent)', padding: '2px 6px', borderRadius: '3px', fontSize: '10px', fontWeight: 600 }}>UNUSUAL</span>}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Insiders Tab */}
                            {detailTab === 'insiders' && (
                                <div className="card">
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <h3 style={{ fontFamily: 'Oswald', fontSize: '14px', color: 'var(--accent)' }}>Insider Transactions</h3>
                                        <div style={{ display: 'flex', gap: '4px' }}>
                                            {[['all', 'All'], ['buys', 'Buys'], ['sells', 'Sells']].map(([key, label]) => (
                                                <button key={key} onClick={() => setInsiderFilter(key)}
                                                    style={{ padding: '4px 10px', fontSize: '11px', border: '1px solid var(--border)', borderRadius: '4px', cursor: 'pointer',
                                                        background: insiderFilter === key ? 'var(--accent)' : 'transparent', color: insiderFilter === key ? '#fff' : 'var(--text-muted)' }}>
                                                    {label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="table-container">
                                        <table>
                                            <thead><tr><th>Filing</th><th>Trade Date</th><th>Insider</th><th>Title</th><th>Type</th><th>Price</th><th>Qty</th><th>Value</th><th>Owned</th></tr></thead>
                                            <tbody>
                                                {filteredInsiderTrades.length === 0 ? (
                                                    <tr><td colSpan="9" style={{textAlign:'center',color:'var(--text-muted)'}}>No insider trades found</td></tr>
                                                ) : filteredInsiderTrades.map((t, i) => (
                                                    <tr key={i}>
                                                        <td>{t.filing_date}</td>
                                                        <td>{t.trade_date}</td>
                                                        <td>{t.insider_name}</td>
                                                        <td>{t.title}</td>
                                                        <td><span className={t.is_purchase ? 'badge badge-success' : 'badge badge-danger'}>{t.trade_type}</span></td>
                                                        <td>{t.price}</td>
                                                        <td>{t.qty}</td>
                                                        <td>{t.value}</td>
                                                        <td>{t.owned}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Cards Tab
        const CardsTab = ({ data, onSetData, onSetError, onSetSuccess }) => {
            const [mainView, setMainView] = useState('collection'); // collection | eddies | all
            const [viewMode, setViewMode] = useState('table');
            const [invViewMode, setInvViewMode] = useState('table'); // inventory view mode
            const [sortConfig, setSortConfig] = useState({ key: 'player', direction: 'asc' });
            const [itemFilter, setItemFilter] = useState('all'); // all | card | sneaker | clothing (for All Items + inventory)
            const [statusFilter, setStatusFilter] = useState('all'); // for All Items view
            const [sales, setSales] = useState([]);
            const [boxPurchases, setBoxPurchases] = useState([]);
            const [taxSummary, setTaxSummary] = useState(null);
            const [salesFilter, setSalesFilter] = useState('all');
            const [catFilter, setCatFilter] = useState('all');
            const [salesModal, setSalesModal] = useState(false);
            const [saleForm, setSaleForm] = useState({item_name:'',category:'cards',platform:'ebay',sale_price:'',shipping_cost:'',purchase_price:'',requires_authentication:false});
            const [boxModal, setBoxModal] = useState(false);
            const [boxForm, setBoxForm] = useState({product:'',cost:'',cards_pulled:'',notable_pulls:''});
            const [taxOpen, setTaxOpen] = useState(false);
            const [boxesOpen, setBoxesOpen] = useState(false);
            const [analyticsOpen, setAnalyticsOpen] = useState(false);
            const [inventoryOpen, setInventoryOpen] = useState(true);
            const [salesLedgerOpen, setSalesLedgerOpen] = useState(true);
            const CAT_COLORS = {card: '#3b82f6', cards: '#3b82f6', sneaker: '#f59e0b', sneakers: '#f59e0b', clothing: '#8b5cf6', other: '#6b7280'};

            useEffect(() => {
                fetch(`${API_BASE}/sales`).then(r=>r.json()).then(d => setSales(Array.isArray(d)?d:[])).catch(()=>{});
                fetch(`${API_BASE}/box-purchases`).then(r=>r.json()).then(d => setBoxPurchases(Array.isArray(d)?d:[])).catch(()=>{});
                fetch(`${API_BASE}/sales/tax-summary`).then(r=>r.json()).then(setTaxSummary).catch(()=>{});
            }, []);

            const addSale = async () => {
                try {
                    const payload = {...saleForm, sale_price: parseFloat(saleForm.sale_price||0), shipping_cost: parseFloat(saleForm.shipping_cost||0), purchase_price: parseFloat(saleForm.purchase_price||0)};
                    const r = await fetch(`${API_BASE}/sales`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
                    const d = await r.json();
                    setSales(prev => [...prev, d]);
                    setSalesModal(false);
                    onSetSuccess('Sale logged');
                } catch { onSetError('Failed to log sale'); }
            };

            const [statusDropdown, setStatusDropdown] = useState(null); // sale id showing dropdown

            const updateSaleStatus = async (id, newStatus) => {
                if (newStatus === 'completed' && !window.confirm('Mark as completed? This will count as realized income on the Dashboard.')) return;
                const ts = new Date().toISOString().slice(0,10);
                const sale = sales.find(s => s.id === id);
                const updates = {status: newStatus};
                // Set timestamps when advancing
                if (newStatus === 'shipped' && !sale?.date_shipped) updates.date_shipped = ts;
                if (newStatus === 'completed') {
                    if (!sale?.date_shipped) updates.date_shipped = ts;
                    if (!sale?.date_completed) updates.date_completed = ts;
                }
                // Clear timestamps when reverting
                if (newStatus === 'sold') { updates.date_shipped = null; updates.date_completed = null; }
                if (newStatus === 'shipped') { updates.date_completed = null; }
                try {
                    await fetch(`${API_BASE}/sales/${id}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
                    setSales(prev => prev.map(s => s.id === id ? {...s, ...updates} : s));
                } catch { onSetError('Failed to update status'); }
                setStatusDropdown(null);
            };

            const addBox = async () => {
                try {
                    const payload = {product: boxForm.product, cost: parseFloat(boxForm.cost||0), cards_pulled: parseInt(boxForm.cards_pulled||0), notable_pulls: boxForm.notable_pulls};
                    const r = await fetch(`${API_BASE}/box-purchases`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
                    const d = await r.json();
                    setBoxPurchases(prev => [...prev, d]);
                    setBoxModal(false);
                    onSetSuccess('Box purchase logged');
                } catch { onSetError('Failed to log box purchase'); }
            };

            const completedSales = sales.filter(s => s.status === 'completed');
            const ytdRevenue = completedSales.reduce((s,x) => s + (x.sale_price||0), 0);
            const ytdFees = completedSales.reduce((s,x) => s + (x.platform_fees||0), 0);
            const ytdNet = completedSales.reduce((s,x) => s + (x.net_profit||0), 0);
            const filteredSales = sales.filter(s => {
                if (salesFilter !== 'all' && s.status !== salesFilter) return false;
                if (catFilter !== 'all' && s.category !== catFilter) return false;
                return true;
            });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                player: '',
                year: '',
                brand: '',
                card_name: '',
                serial: '',
                condition: '',
                est_value: ''
            });

            const getItemName = (c) => {
                const t = c.item_type || 'card';
                if (t === 'card') return `${c.player || ''} ${c.year || ''} ${c.brand || ''} ${c.card_name || ''}`.trim();
                if (t === 'sneaker') return `${c.brand || ''} ${c.model || ''} ${c.colorway || ''}`.trim();
                if (t === 'clothing') return `${c.brand || ''} ${c.model || ''}`.trim();
                return c.player || c.brand || c.card_name || 'Item';
            };

            // Scoped card lists
            const collectionCards = useMemo(() => data.cards.filter(c => (c.item_type || 'card') === 'card' && (!c.status || c.status === 'collection')), [data.cards]);
            const inventoryItems = useMemo(() => data.cards.filter(c => c.status === 'available' || c.status === 'listed'), [data.cards]);
            const allItems = useMemo(() => {
                let items = [...data.cards];
                if (statusFilter !== 'all') items = items.filter(c => c.status === statusFilter);
                if (itemFilter !== 'all') items = items.filter(c => (c.item_type || 'card') === itemFilter);
                return items;
            }, [data.cards, statusFilter, itemFilter]);

            // Collection stats (cards only)
            const collValue = useMemo(() => collectionCards.reduce((s, c) => s + (c.est_value || 0), 0), [collectionCards]);
            const collCost = useMemo(() => collectionCards.reduce((s, c) => s + (c.purchase_price || 0), 0), [collectionCards]);
            const collPL = collValue - collCost;

            // Inventory stats
            const invValue = useMemo(() => inventoryItems.reduce((s, c) => s + (c.est_value || 0), 0), [inventoryItems]);
            const invAvailable = useMemo(() => inventoryItems.filter(c => c.status === 'available').length, [inventoryItems]);
            const invListed = useMemo(() => inventoryItems.filter(c => c.status === 'listed').length, [inventoryItems]);

            // Sort helper for any item list
            const sortItems = (items) => {
                return [...items].sort((a, b) => {
                    const aVal = a[sortConfig.key];
                    const bVal = b[sortConfig.key];
                    const comparison = aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    return sortConfig.direction === 'asc' ? comparison : -comparison;
                });
            };
            const sortedCollectionCards = useMemo(() => sortItems(collectionCards), [collectionCards, sortConfig]);
            const sortedInventoryItems = useMemo(() => sortItems(inventoryItems), [inventoryItems, sortConfig]);
            const sortedAllItems = useMemo(() => sortItems(allItems), [allItems, sortConfig]);

            const totalValue = useMemo(() => data.cards.reduce((sum, card) => sum + (card.est_value || 0), 0), [data.cards]);
            const totalCost = useMemo(() => data.cards.reduce((sum, card) => sum + (card.purchase_price || 0), 0), [data.cards]);
            const totalPL = totalValue - totalCost;

            const handleSort = (key) => {
                setSortConfig({
                    key,
                    direction: sortConfig.key === key && sortConfig.direction === 'asc' ? 'desc' : 'asc'
                });
            };

            const handleAddEdit = async () => {
                try {
                    const itype = formData.item_type || 'card';
                    const payload = {
                        item_type: itype,
                        brand: formData.brand,
                        est_value: parseFloat(formData.est_value || 0),
                        purchase_price: formData.purchase_price ? parseFloat(formData.purchase_price) : 0,
                        date_acquired: formData.date_acquired || '',
                        // Card-specific
                        ...(itype === 'card' ? {
                            player: formData.player,
                            year: parseInt(formData.year || 0),
                            card_name: formData.card_name,
                            serial: formData.serial,
                            condition: formData.condition,
                            grade: formData.grade || '',
                            grader: formData.grader || '',
                        } : {}),
                        // Sneaker/Clothing-specific
                        ...((itype === 'sneaker' || itype === 'clothing') ? {
                            model: formData.model || '',
                            size: formData.size || '',
                        } : {}),
                        ...(itype === 'sneaker' ? { colorway: formData.colorway || '' } : {}),
                    };

                    // Items added from Resale Tracker go to inventory (available), not collection
                    if (!editingId && formData._addToInventory) {
                        payload.status = 'available';
                    }

                    if (editingId) {
                        await fetch(`${API_BASE}/cards/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        await fetch(`${API_BASE}/cards`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }

                    const updated = await fetch(`${API_BASE}/cards`).then(r => r.json());
                    onSetData(prev => ({ ...prev, cards: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess(editingId ? 'Card updated' : 'Card added');
                    setIsModalOpen(false);
                    setEditingId(null);
                    setFormData({
                        player: '', year: '', brand: '', card_name: '', serial: '',
                        condition: '', est_value: '', purchase_price: '', date_acquired: '',
                        grade: '', grader: '',
                    });
                } catch (err) {
                    onSetError('Failed to save card');
                }
            };

            const handleEdit = (card) => {
                // Parse legacy condition strings like "WCG 10", "PSA 9"
                let condition = card.condition || 'Raw';
                let grader = card.grader || '';
                let grade = card.grade || '';
                if (!grader && condition !== 'Raw' && condition !== 'Graded') {
                    const parts = condition.split(' ');
                    if (parts.length >= 2 && ['PSA','BGS','SGC','CGC','WCG'].includes(parts[0])) {
                        grader = parts[0];
                        grade = parts.slice(1).join(' ');
                        condition = 'Graded';
                    }
                }
                setFormData({
                    item_type: card.item_type || 'card',
                    player: card.player || '',
                    year: (card.year || '').toString(),
                    brand: card.brand || '',
                    card_name: card.card_name || '',
                    serial: card.serial || '',
                    condition: condition,
                    est_value: (card.est_value || '').toString(),
                    purchase_price: (card.purchase_price || '').toString(),
                    date_acquired: card.date_acquired || '',
                    grade: grade,
                    grader: grader,
                    model: card.model || '',
                    colorway: card.colorway || '',
                    size: card.size || '',
                });
                setEditingId(card.id);
                setIsModalOpen(true);
            };

            const handleDelete = async (id, player) => {
                if (!window.confirm(`Delete ${player} card?`)) return;
                try {
                    await fetch(`${API_BASE}/cards/${id}`, { method: 'DELETE' });
                    const updated = await fetch(`${API_BASE}/cards`).then(r => r.json());
                    onSetData(prev => ({ ...prev, cards: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('Card deleted');
                } catch (err) {
                    onSetError('Failed to delete card');
                }
            };

            const getEbayUrl = (card) => {
                const query = `${card.player} ${card.year} ${card.brand} ${card.card_name}`;
                return `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}&LH_Complete=1&LH_Sold=1&_sop=13`;
            };

            // Move card from Collection to Resale Tracker inventory
            const handleMoveToInventory = async (card) => {
                if (!window.confirm(`Move "${getItemName(card)}" to Resale Tracker inventory?`)) return;
                try {
                    await fetch(`${API_BASE}/cards/${card.id}`, {
                        method: 'PUT', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ status: 'available', origin: 'collection', date_moved: new Date().toISOString().slice(0,10) })
                    });
                    const updated = await fetch(`${API_BASE}/cards`).then(r => r.json());
                    onSetData(prev => ({ ...prev, cards: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess(`Moved to Resale Tracker inventory`);
                } catch { onSetError('Failed to move item'); }
            };

            // Return item from inventory back to Collection
            const handleReturnToCollection = async (card) => {
                if (!window.confirm(`Return "${getItemName(card)}" to My Collection?`)) return;
                try {
                    await fetch(`${API_BASE}/cards/${card.id}`, {
                        method: 'PUT', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ status: 'collection', origin: null, date_moved: null })
                    });
                    const updated = await fetch(`${API_BASE}/cards`).then(r => r.json());
                    onSetData(prev => ({ ...prev, cards: Array.isArray(updated) ? updated : [] }));
                    onSetSuccess('Returned to collection');
                } catch { onSetError('Failed to return item'); }
            };

            // Open modal for adding a card (collection context — always card type)
            const handleOpenCardModal = () => {
                setEditingId(null);
                setFormData({
                    item_type: 'card', player: '', year: '', brand: '', card_name: '', serial: '',
                    condition: '', est_value: '', purchase_price: '', date_acquired: '', grade: '', grader: '',
                    model: '', colorway: '', size: '',
                });
                setIsModalOpen(true);
            };

            // Open modal for adding an item (inventory context — type selector)
            const handleOpenItemModal = () => {
                setEditingId(null);
                setFormData({
                    item_type: 'card', player: '', year: '', brand: '', card_name: '', serial: '',
                    condition: '', est_value: '', purchase_price: '', date_acquired: '', grade: '', grader: '',
                    model: '', colorway: '', size: '', _addToInventory: true,

                            <button key={v.key} onClick={() => setMainView(v.key)} style={{
                                padding: '8px 18px', fontSize: '13px', borderRadius: '6px', cursor: 'pointer', fontWeight: mainView === v.key ? 700 : 400,
                                border: mainView === v.key ? '2px solid var(--accent)' : '1px solid var(--border)',
                                background: mainView === v.key ? 'rgba(241,90,34,0.15)' : 'transparent',
                                color: mainView === v.key ? 'var(--accent)' : 'var(--text-muted)',

                    </div>

                    {/* ─── Shared Add/Edit Modal ─── */}
                    <Modal
                        title={editingId ? 'Edit Item' : (formData._addToInventory ? 'Add Item to Inventory' : 'Add Card')}

                        onClose={() => setIsModalOpen(false)}
                    >
                        {formData._addToInventory && (
                            <div className="form-group">
                                <label>Item Type</label>
                                <select value={formData.item_type || 'card'} onChange={e => setFormData({...formData, item_type: e.target.value})} style={{width:'100%',padding:'8px',background:'var(--input-bg)',border:'1px solid var(--input-border)',borderRadius:'6px',color:'var(--text-primary)'}}>
                                    <option value="card">Card</option><option value="sneaker">Sneaker</option><option value="clothing">Clothing</option><option value="other">Other</option>
                                </select>
                            </div>
                        )}
                        {(formData.item_type || 'card') === 'card' && (<>
                            <div className="form-group"><label>Player</label><input type="text" placeholder="Michael Jordan" value={formData.player} onChange={e => setFormData({...formData, player: e.target.value})} /></div>
                            <div className="form-group"><label>Year</label><input type="number" placeholder="1986" value={formData.year} onChange={e => setFormData({...formData, year: e.target.value})} /></div>
                            <div className="form-group"><label>Brand/Set</label><input type="text" placeholder="Fleer" value={formData.brand} onChange={e => setFormData({...formData, brand: e.target.value})} /></div>
                            <div className="form-group"><label>Card Name</label><input type="text" placeholder="Rookie Card" value={formData.card_name} onChange={e => setFormData({...formData, card_name: e.target.value})} /></div>
                            <div className="form-group"><label>Serial #</label><input type="text" placeholder="#123" value={formData.serial} onChange={e => setFormData({...formData, serial: e.target.value})} /></div>
                            <div className="form-group"><label>Condition</label><select value={formData.condition} onChange={e => setFormData({...formData, condition: e.target.value})}><option value="">Select condition</option><option value="Raw">Raw (Ungraded)</option><option value="Graded">Graded (enter below)</option></select></div>
