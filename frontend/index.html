                const pk = periodKey || masterPeriod;
                const p = CHART_PERIODS.find(c => c.key === pk) || CHART_PERIODS[2];
                setMasterLoading(true);
                const data = await safeFetch(`${API_BASE}/chart/${ticker.toUpperCase()}?period=${p.period}&interval=${p.interval}`);
                setMasterChartData(Array.isArray(data) ? data : []);
                setMasterLoading(false);
            };

            const handleMasterSearch = (e) => {
                e && e.preventDefault();
                const t = masterSearch.trim().toUpperCase();
                if (!t) return;
                setMasterTicker(t);
                setMasterPeriod('1m');
                fetchMasterChart(t, '1m');
            };

            const handleCardTickerClick = (ticker) => {
                setMasterTicker(ticker.toUpperCase());
                setMasterSearch(ticker.toUpperCase());
                setMasterPeriod('1m');
                fetchMasterChart(ticker, '1m');
            };

            const inputStyle = { padding: '8px 12px', background: 'var(--bg-primary)', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text-primary)', fontSize: '13px', width: '100%' };

            return (
                <div>
                    {/* Alerts Banner */}
                    {alerts.length > 0 && (
                        <div className="card" style={{ marginBottom: '20px', borderLeft: '3px solid #10b981' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '14px', color: '#10b981', marginBottom: '8px' }}>Watchlist Alerts</h3>
                            {alerts.map((a, i) => (
                                <div key={i} style={{ display: 'flex', gap: '8px', alignItems: 'center', padding: '6px 0', borderBottom: i < alerts.length - 1 ? '1px solid var(--border)' : 'none' }}>
                                    <span style={{
                                        padding: '2px 6px', borderRadius: '3px', fontSize: '10px', fontWeight: 600,
                                        background: a.priority === 'high' ? 'rgba(16,185,129,0.2)' : 'rgba(234,179,8,0.2)',
                                        color: a.priority === 'high' ? '#10b981' : '#eab308'
                                    }}>{a.type === 'price_target' ? 'TARGET HIT' : a.type === 'insider_buy' ? 'INSIDER BUY' : 'DARK POOL'}</span>
                                    <span style={{ fontSize: '13px' }}>{a.message}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Master Price Chart */}
                    <div className="card" style={{ marginBottom: '20px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px', flexWrap: 'wrap' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '18px', color: 'var(--accent)', margin: 0 }}>Price Chart</h3>
                            <form onSubmit={handleMasterSearch} style={{ display: 'flex', gap: '6px', flex: '1', minWidth: '200px', maxWidth: '340px' }}>
                                <input type="text" placeholder="Search any ticker..." value={masterSearch} onChange={e => setMasterSearch(e.target.value)}
                                    className="search-box" style={{ flex: 1, padding: '6px 12px', fontSize: '13px' }} />
                                <button type="submit" style={{ padding: '6px 16px', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontFamily: 'Oswald', fontSize: '13px' }}>Go</button>
                            </form>
                            {masterTicker && (
                                <div style={{ display: 'flex', gap: '2px' }}>
                                    {CHART_PERIODS.map(cp => (
                                        <button key={cp.key} onClick={() => { setMasterPeriod(cp.key); fetchMasterChart(masterTicker, cp.key); }}
                                            style={{ padding: '4px 10px', fontSize: '11px', border: '1px solid var(--border)', borderRadius: '3px', cursor: 'pointer',
                                                background: masterPeriod === cp.key ? 'var(--accent)' : 'transparent', color: masterPeriod === cp.key ? '#fff' : 'var(--text-muted)', fontFamily: 'Oswald' }}>
                                            {cp.label}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        {!masterTicker ? (
                            <div style={{ textAlign: 'center', padding: '50px 20px', color: 'var(--text-muted)', fontSize: '14px' }}>
                                Search a ticker to view price action
                            </div>
                        ) : masterLoading ? (
                            <div style={{ textAlign: 'center', padding: '50px 20px' }}><Spinner /></div>
                        ) : !masterChartData || masterChartData.length < 2 ? (
                            <div style={{ textAlign: 'center', padding: '50px 20px', color: 'var(--text-muted)', fontSize: '14px' }}>
                                {masterChartData && masterChartData.length === 0 ? `No chart data for ${masterTicker}` : 'Insufficient data'}
                            </div>
                        ) : (() => {
                            const pts = masterChartData;
                            const W = 800, H = 280, PAD = { top: 20, right: 15, bottom: 30, left: 60 };
                            const plotW = W - PAD.left - PAD.right, plotH = H - PAD.top - PAD.bottom;
                            const closes = pts.map(p => p.close);
                            const minP = Math.min(...closes), maxP = Math.max(...closes);
                            const range = maxP - minP || 1;
                            const first = closes[0], last = closes[closes.length - 1];
                            const isUp = last >= first;
                            const change = last - first;
                            const changePct = first ? ((change / first) * 100).toFixed(2) : '0.00';
                            const color = isUp ? '#10b981' : '#ef4444';
                            const xPos = i => PAD.left + (i / Math.max(pts.length - 1, 1)) * plotW;
                            const yPos = v => PAD.top + plotH - ((v - minP) / range) * plotH;
                            const baselineY = yPos(first);
                            const greenArea = pts.map((p, i) => `${xPos(i)},${Math.min(yPos(p.close), baselineY)}`).join(' ');
                            const greenPoly = `${xPos(0)},${baselineY} ${greenArea} ${xPos(pts.length-1)},${baselineY}`;
                            const redArea = pts.map((p, i) => `${xPos(i)},${Math.max(yPos(p.close), baselineY)}`).join(' ');
                            const redPoly = `${xPos(0)},${baselineY} ${redArea} ${xPos(pts.length-1)},${baselineY}`;
                            const lineSegments = [];
                            for (let i = 0; i < pts.length - 1; i++) {
                                const aboveStart = closes[i] >= first, aboveEnd = closes[i+1] >= first;
                                const c = aboveStart && aboveEnd ? '#10b981' : !aboveStart && !aboveEnd ? '#ef4444' : (aboveEnd ? '#10b981' : '#ef4444');
                                lineSegments.push({ x1: xPos(i), y1: yPos(closes[i]), x2: xPos(i+1), y2: yPos(closes[i+1]), color: c });
                            }
                            const gridN = 5;
                            const gridVals = Array.from({length: gridN+1}, (_, i) => minP + (range/gridN)*i);
                            const labelInt = Math.max(1, Math.floor(pts.length / 8));
                            return (
                                <div style={{ position: 'relative' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '8px', minHeight: '36px' }}>
                                        <div>
                                            <span style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginRight: '10px' }}>{masterTicker}</span>
                                            <span id="master-chart-value" style={{ fontFamily: 'Oswald', fontSize: '28px', fontWeight: 700, color: 'var(--text-primary)' }}>
                                                ${last.toFixed(2)}
                                            </span>
                                            <span id="master-chart-change" style={{ fontSize: '14px', fontWeight: 600, marginLeft: '8px', color }}>
                                                {change >= 0 ? '+' : ''}{formatCurrency(change)} ({change >= 0 ? '+' : ''}{changePct}%)
                                            </span>
                                        </div>
                                        <div id="master-chart-ts" style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                            {pts[pts.length - 1].date}
                                        </div>
                                    </div>
                                    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width: '100%', height: '260px', cursor: 'crosshair', overflow: 'visible' }}>
                                        <defs>
                                            <linearGradient id="master-grad-green" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stopColor="#10b981" stopOpacity="0.03" />
                                                <stop offset={`${Math.max(10, (baselineY / H) * 100)}%`} stopColor="#10b981" stopOpacity="0.45" />
                                            </linearGradient>
                                            <linearGradient id="master-grad-red" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset={`${Math.min(90, (baselineY / H) * 100)}%`} stopColor="#ef4444" stopOpacity="0.45" />
                                                <stop offset="100%" stopColor="#ef4444" stopOpacity="0.05" />
                                            </linearGradient>
                                        </defs>
                                        {gridVals.map((v, i) => (
                                            <g key={i} style={{pointerEvents:'none'}}>
                                                <line x1={PAD.left} y1={yPos(v)} x2={W-PAD.right} y2={yPos(v)} stroke="var(--border)" strokeWidth="1" />
                                                <text x={PAD.left-8} y={yPos(v)+4} fill="var(--text-muted)" fontSize="10" textAnchor="end" fontFamily="Inter">${v >= 1000 ? (v/1000).toFixed(1)+'k' : v.toFixed(2)}</text>
                                            </g>
                                        ))}
                                        {pts.map((p, i) => i % labelInt === 0 ? (
                                            <text key={i} x={xPos(i)} y={H-6} fill="var(--text-muted)" fontSize="9" textAnchor="middle" fontFamily="Inter" style={{pointerEvents:'none'}}>
                                                {p.date.includes(' ') ? p.date.split(' ')[1] || p.date.slice(5,10) : p.date.slice(5,10)}
                                            </text>
                                        ) : null)}
                                        <polygon points={greenPoly} fill="url(#master-grad-green)" style={{pointerEvents:'none'}} />
                                        <polygon points={redPoly} fill="url(#master-grad-red)" style={{pointerEvents:'none'}} />
                                        <line x1={PAD.left} y1={baselineY} x2={W-PAD.right} y2={baselineY} stroke="var(--text-muted)" strokeWidth="0.5" strokeDasharray="4" opacity="0.5" style={{pointerEvents:'none'}} />
                                        {lineSegments.map((seg, i) => (
                                            <line key={i} x1={seg.x1} y1={seg.y1} x2={seg.x2} y2={seg.y2} stroke={seg.color} strokeWidth="2" strokeLinejoin="round" style={{pointerEvents:'none'}} />
                                        ))}
                                        <line className="master-vline" x1="0" y1={PAD.top} x2="0" y2={PAD.top+plotH} stroke="var(--text-muted)" strokeWidth="1" strokeDasharray="3" style={{display:'none', opacity: 0.4, pointerEvents:'none'}} />
                                        <circle className="master-dot" cx="0" cy="0" r="5" fill="var(--accent)" stroke="var(--bg-primary)" strokeWidth="2" style={{display:'none', pointerEvents:'none'}} />
                                        {/* Transparent overlay on TOP — sole mouse event handler */}
                                        <rect x="0" y="0" width={W} height={H} fill="transparent" style={{ cursor: 'crosshair', pointerEvents: 'all' }}
                                            onMouseMove={(e) => {
                                                const svg = e.currentTarget.closest('svg');
                                                const pt = svg.createSVGPoint();
                                                pt.x = e.clientX; pt.y = e.clientY;
                                                const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
                                                const plotFrac = Math.max(0, Math.min(1, (svgPt.x - PAD.left) / plotW));
                                                const idx = Math.round(plotFrac * (pts.length - 1));
                                                const ci = Math.max(0, Math.min(pts.length - 1, idx));
                                                const dot = svg.querySelector('.master-dot');
                                                const vline = svg.querySelector('.master-vline');
                                                if (dot) { dot.style.display = 'block'; dot.setAttribute('cx', xPos(ci)); dot.setAttribute('cy', yPos(closes[ci])); }
                                                if (vline) { vline.style.display = 'block'; vline.setAttribute('x1', xPos(ci)); vline.setAttribute('x2', xPos(ci)); }
                                                const valEl = svg.closest('.card')?.querySelector('#master-chart-value');
                                                const changeEl = svg.closest('.card')?.querySelector('#master-chart-change');
                                                const tsEl = svg.closest('.card')?.querySelector('#master-chart-ts');
                                                if (valEl) {
                                                    const val = closes[ci];
                                                    const ch = val - first;
                                                    const chPct = first ? ((ch / first) * 100).toFixed(2) : '0.00';
                                                    valEl.textContent = '$' + val.toFixed(2);
                                                    if (changeEl) {
                                                        changeEl.textContent = `${ch >= 0 ? '+' : ''}${formatCurrency(ch)} (${ch >= 0 ? '+' : ''}${chPct}%)`;
                                                        changeEl.style.color = ch >= 0 ? '#10b981' : '#ef4444';
                                                    }
                                                    if (tsEl) tsEl.textContent = pts[ci].date;
                                                }
                                            }}
                                            onMouseLeave={(e) => {
                                                const svg = e.currentTarget.closest('svg');
                                                ['master-dot','master-vline'].forEach(cls => { const el = svg.querySelector('.'+cls); if (el) el.style.display = 'none'; });
                                                const valEl = svg.closest('.card')?.querySelector('#master-chart-value');
                                                const changeEl = svg.closest('.card')?.querySelector('#master-chart-change');
                                                const tsEl = svg.closest('.card')?.querySelector('#master-chart-ts');
                                                if (valEl) {
                                                    valEl.textContent = '$' + last.toFixed(2);
                                                    if (changeEl) {
                                                        changeEl.textContent = `${change >= 0 ? '+' : ''}${formatCurrency(change)} (${change >= 0 ? '+' : ''}${changePct}%)`;
                                                        changeEl.style.color = color;
                                                    }
                                                    if (tsEl) tsEl.textContent = pts[pts.length - 1].date;
                                                }
                                            }} />
                                    </svg>
                                </div>
                            );
                        })()}
                    </div>

                    {/* Add Button + Form */}
                    <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '16px' }}>
                        <button onClick={() => { setShowForm(!showForm); setEditingId(null); setForm({ ticker: '', target_buy: '', notes: '' }); }}
                            style={{ padding: '8px 16px', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontFamily: 'Oswald', fontSize: '14px' }}>
                            {showForm ? 'Cancel' : '+ Add to Watchlist'}
                        </button>
                    </div>

                    {showForm && (
                        <div className="card" style={{ marginBottom: '20px' }}>
                            <h3 style={{ fontFamily: 'Oswald', fontSize: '16px', color: 'var(--accent)', marginBottom: '12px' }}>{editingId ? 'Edit' : 'Add to'} Watchlist</h3>
                            <form onSubmit={handleSubmit} style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px', alignItems: 'end' }}>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Ticker</label>
                                    <input type="text" placeholder="PLTR" value={form.ticker} onChange={e => setForm({...form, ticker: e.target.value})} style={inputStyle} required />
                                </div>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Target Buy Price</label>
                                    <input type="number" step="0.01" placeholder="85.00" value={form.target_buy} onChange={e => setForm({...form, target_buy: e.target.value})} style={inputStyle} />
                                </div>
                                <div>
                                    <label style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '4px', display: 'block' }}>Notes</label>
                                    <input type="text" placeholder="Waiting for pullback..." value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} style={inputStyle} />
                                </div>
                                <div>
                                    <button type="submit" style={{ padding: '8px 20px', background: '#10b981', color: '#fff', border: 'none', borderRadius: '4px', cursor: 'pointer', fontSize: '13px', width: '100%' }}>
                                        {editingId ? 'Update' : 'Add'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Watchlist Cards */}
                    {loading ? <div style={{textAlign:'center',padding:'40px'}}><Spinner /></div> : (
                        watchlist.length === 0 ? (
                            <div className="card" style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '60px 20px' }}>
                                No tickers on your watchlist yet. Click "+ Add to Watchlist" to start tracking.
                            </div>
                        ) : (
                            <div style={{ display: 'grid', gridTemplateColumns: expandedTicker ? '1fr' : 'repeat(auto-fill, minmax(300px, 1fr))', gap: '16px' }}>
                                {watchlist.map(item => {
                                    const atTarget = item.at_target;
                                    const aboveTarget = item.distance_pct > 0;
                                    const isExpanded = expandedTicker === item.ticker;
                                    const detail = expandedData[item.ticker];
                                    return (
                                        <div key={item.id} className="card" style={{
                                            borderLeft: atTarget ? '3px solid #10b981' : '3px solid var(--border)',
                                            transition: 'border-color 0.2s'
                                        }}>
                                            <div style={{ cursor: 'pointer' }} onClick={() => toggleExpand(item.ticker)}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                                                    <div>
                                                        <div style={{ fontFamily: 'Oswald', fontSize: '22px', color: 'var(--accent)' }}>{isExpanded ? '▾' : '▸'} <span style={{ cursor: 'pointer', textDecoration: 'underline', textDecorationColor: 'transparent', transition: 'text-decoration-color 0.2s' }} onClick={e => { e.stopPropagation(); handleCardTickerClick(item.ticker); }} onMouseEnter={e => e.target.style.textDecorationColor = 'var(--accent)'} onMouseLeave={e => e.target.style.textDecorationColor = 'transparent'} title="View in chart">{item.ticker}</span></div>
                                                        <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Added {item.date_added}</div>
                                                    </div>
                                                    <div style={{ textAlign: 'right' }}>
                                                        <div style={{ fontFamily: 'Oswald', fontSize: '24px', color: 'var(--text-primary)', lineHeight: 1 }}>
                                                            ${item.live_price || '—'}
                                                        </div>
                                                        <div style={{ fontSize: '10px', color: 'var(--text-muted)', textTransform: 'uppercase' }}>Current</div>
                                                    </div>
                                                </div>

                                                {item.target_buy > 0 && (
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', padding: '8px', background: atTarget ? 'rgba(16,185,129,0.1)' : 'rgba(0,0,0,0.2)', borderRadius: '4px' }}>
                                                        <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                                            Target: <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>${item.target_buy}</span>
                                                        </div>
                                                        <div style={{
                                                            fontSize: '12px', fontWeight: 600,
                                                            color: atTarget ? '#10b981' : aboveTarget ? '#ef4444' : '#eab308'
                                                        }}>
                                                            {atTarget ? 'AT TARGET' : `${item.distance_pct > 0 ? '+' : ''}${item.distance_pct}% ${aboveTarget ? 'above' : 'below'}`}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            {item.notes && (
                                                <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '10px', fontStyle: 'italic' }}>
                                                    {item.notes}
                                                </div>
                                            )}

                                            {/* Expanded Detail */}
                                            {isExpanded && (
                                                <div style={{ borderTop: '1px solid var(--border)', paddingTop: '12px', marginTop: '8px' }}>
                                                    {/* Price Chart */}
                                                    {(() => {
                                                        const pts = chartData[`${item.ticker}:${chartPeriod}`];
                                                        const W = 700, H = 200, pad = { top: 10, right: 10, bottom: 25, left: 55 };
                                                        const cW = W - pad.left - pad.right, cH = H - pad.top - pad.bottom;
                                                        return (
                                                            <div style={{ marginBottom: '16px' }}>
                                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
                                                                    <h4 style={{ fontFamily: 'Oswald', fontSize: '13px', color: 'var(--accent)', margin: 0 }}>Price Chart</h4>
                                                                    <div style={{ display: 'flex', gap: '2px' }}>
                                                                        {CHART_PERIODS.map(cp => (
                                                                            <button key={cp.key} onClick={e => { e.stopPropagation(); setChartPeriod(cp.key); fetchChart(item.ticker, cp.key); }}
                                                                                style={{ padding: '2px 8px', fontSize: '10px', border: '1px solid var(--border)', borderRadius: '3px', cursor: 'pointer',
                                                                                    background: chartPeriod === cp.key ? 'var(--accent)' : 'transparent', color: chartPeriod === cp.key ? '#fff' : 'var(--text-muted)' }}>
                                                                                {cp.label}
                                                                            </button>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                                {!pts ? <div style={{ textAlign: 'center', padding: '20px' }}><Spinner /></div> : pts.length === 0 ? (
                                                                    <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '20px' }}>No chart data</div>
                                                                ) : pts.length < 2 ? (
                                                                    <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '20px' }}>Insufficient data</div>
                                                                ) : (() => {
                                                                    const closes = pts.map(p => p.close);
                                                                    const minP = Math.min(...closes), maxP = Math.max(...closes);
                                                                    const range = maxP - minP || 1;
                                                                    const isUp = closes[closes.length - 1] >= closes[0];
                                                                    const color = isUp ? 'var(--positive)' : 'var(--negative)';
                                                                    const x = i => pad.left + (i / Math.max(pts.length - 1, 1)) * cW;
                                                                    const y = v => pad.top + cH - ((v - minP) / range) * cH;
                                                                    const line = pts.map((p, i) => `${x(i)},${y(p.close)}`).join(' ');
                                                                    const area = `${pad.left},${pad.top + cH} ${line} ${pad.left + cW},${pad.top + cH}`;
                                                                    const gridLines = 4;
                                                                    const labelEvery = Math.max(1, Math.floor(pts.length / 6));
                                                                    return (
                                                                        <div style={{ position: 'relative' }}
                                                                            onWheel={e => e.stopPropagation()}
                                                                            onMouseMove={e => {
                                                                                const rect = e.currentTarget.querySelector('svg')?.getBoundingClientRect();
                                                                                if (!rect) return;
                                                                                const mx = (e.clientX - rect.left) / rect.width * W;
                                                                                const idx = Math.round(((mx - pad.left) / cW) * (pts.length - 1));
                                                                                const ci = Math.max(0, Math.min(pts.length - 1, idx));
                                                                                e.currentTarget.dataset.hoverIdx = ci;
                                                                                e.currentTarget.querySelector('.wl-crosshair')?.setAttribute('x1', x(ci));
                                                                                e.currentTarget.querySelector('.wl-crosshair')?.setAttribute('x2', x(ci));
                                                                                e.currentTarget.querySelector('.wl-dot')?.setAttribute('cx', x(ci));
                                                                                e.currentTarget.querySelector('.wl-dot')?.setAttribute('cy', y(pts[ci].close));
                                                                                const tip = e.currentTarget.querySelector('.wl-tooltip');
                                                                                if (tip) { tip.textContent = `${pts[ci].date} — $${pts[ci].close.toFixed(2)} | Vol: ${(pts[ci].volume/1000000).toFixed(1)}M`; tip.style.display = 'block'; }
                                                                            }}
                                                                            onMouseLeave={e => {
                                                                                e.currentTarget.querySelector('.wl-crosshair')?.setAttribute('x1', -10);
                                                                                e.currentTarget.querySelector('.wl-crosshair')?.setAttribute('x2', -10);
                                                                                e.currentTarget.querySelector('.wl-dot')?.setAttribute('cx', -10);
                                                                                const tip = e.currentTarget.querySelector('.wl-tooltip');
                                                                                if (tip) tip.style.display = 'none';
                                                                            }}>
                                                                        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', maxHeight: '220px' }}>
                                                                            {/* Grid */}
                                                                            {Array.from({ length: gridLines + 1 }, (_, i) => {
                                                                                const yPos = pad.top + (i / gridLines) * cH;
                                                                                const val = maxP - (i / gridLines) * range;
                                                                                return (
                                                                                    <React.Fragment key={i}>
                                                                                        <line x1={pad.left} y1={yPos} x2={W - pad.right} y2={yPos} stroke="var(--border)" strokeWidth="0.5" />
                                                                                        <text x={pad.left - 5} y={yPos + 3} fill="var(--text-muted)" fontSize="9" textAnchor="end" fontFamily="Inter">${val.toFixed(val > 100 ? 0 : 2)}</text>
                                                                                    </React.Fragment>
                                                                                );
                                                                            })}
                                                                            {/* X labels */}
                                                                            {pts.map((p, i) => i % labelEvery === 0 ? (
                                                                                <text key={i} x={x(i)} y={H - 5} fill="var(--text-muted)" fontSize="8" textAnchor="middle" fontFamily="Inter">
                                                                                    {p.date.includes(' ') ? p.date.split(' ')[1] || p.date.slice(5, 10) : p.date.slice(5, 10)}
                                                                                </text>
                                                                            ) : null)}
                                                                            {/* Area fill */}
                                                                            <polygon points={area} fill={isUp ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'} />
                                                                            {/* Line */}
                                                                            <polyline points={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
                                                                            {/* Crosshair + dot */}
                                                                            <line className="wl-crosshair" x1={-10} y1={pad.top} x2={-10} y2={pad.top + cH} stroke="var(--text-muted)" strokeWidth="0.5" strokeDasharray="3,3" />
                                                                            <circle className="wl-dot" cx={-10} cy={0} r="3" fill={color} />
                                                                        </svg>
                                                                        <div className="wl-tooltip" style={{ display: 'none', position: 'absolute', bottom: '4px', left: '50%', transform: 'translateX(-50%)',
                                                                            fontSize: '10px', color: 'var(--text-primary)', background: 'var(--bg-card)', border: '1px solid var(--border)',
                                                                            padding: '2px 8px', borderRadius: '4px', whiteSpace: 'nowrap', pointerEvents: 'none' }}></div>
                                                                        </div>
                                                                    );
                                                                })()}
                                                            </div>
                                                        );
                                                    })()}
                                                    {!detail ? <div style={{textAlign:'center',padding:'12px'}}><Spinner /></div> : (
                                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '16px' }}>
                                                            {/* Dark Pool */}
                                                            <div>
                                                                <h4 style={{ fontFamily: 'Oswald', fontSize: '13px', color: 'var(--accent)', marginBottom: '8px' }}>Dark Pool</h4>
                                                                {detail.dp && detail.dp.latest ? (
                                                                    <div>
                                                                        <div style={{ fontSize: '12px', marginBottom: '4px' }}>
                                                                            Short Ratio: <span style={{ fontWeight: 600, color: detail.dp.latest.short_ratio > 55 ? '#ef4444' : detail.dp.latest.short_ratio > 40 ? '#eab308' : '#10b981' }}>
                                                                                {detail.dp.latest.short_ratio}%
                                                                            </span>
                                                                        </div>
                                                                        {detail.dp.stats && <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                                                            30d avg: {detail.dp.stats.avg_ratio}% | High: {detail.dp.stats.max_ratio}% | Low: {detail.dp.stats.min_ratio}%
                                                                        </div>}
                                                                    </div>
                                                                ) : <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>No data</div>}
                                                            </div>

                                                            {/* Options Flow */}
                                                            <div>
                                                                <h4 style={{ fontFamily: 'Oswald', fontSize: '13px', color: 'var(--accent)', marginBottom: '8px' }}>Options Flow</h4>
                                                                {detail.flow && !detail.flow.error ? (
                                                                    <div>
                                                                        <div style={{ fontSize: '12px', marginBottom: '4px' }}>
                                                                            P/C Ratio: <span style={{ fontWeight: 600, color: detail.flow.put_call_ratio > 1 ? '#ef4444' : detail.flow.put_call_ratio > 0.7 ? '#eab308' : '#10b981' }}>
                                                                                {detail.flow.put_call_ratio}
                                                                            </span>
                                                                            <span style={{ marginLeft: '12px' }}>Unusual: <span style={{ fontWeight: 600, color: 'var(--accent)' }}>{detail.flow.unusual_count}</span></span>
                                                                        </div>
                                                                        <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>
                                                                            Call vol: {(detail.flow.call_volume || 0).toLocaleString()} | Put vol: {(detail.flow.put_volume || 0).toLocaleString()}
                                                                        </div>
                                                                        {detail.flow.flow && detail.flow.flow.filter(f => f.unusual).slice(0, 3).map((f, i) => (
                                                                            <div key={i} style={{ fontSize: '10px', marginTop: '4px', padding: '3px 6px', background: 'rgba(241,90,34,0.06)', borderRadius: '3px' }}>
                                                                                <span className={f.type === 'C' ? 'badge badge-success' : 'badge badge-danger'} style={{fontSize:'8px',padding:'1px 4px',marginRight:'4px'}}>{f.type === 'C' ? 'CALL' : 'PUT'}</span>
                                                                                ${f.strike} | Vol {f.volume.toLocaleString()} | V/OI {f.vol_oi}x
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                ) : <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>No options data</div>}
                                                            </div>

                                                            {/* Insider Trades */}
                                                            <div>
                                                                <h4 style={{ fontFamily: 'Oswald', fontSize: '13px', color: 'var(--accent)', marginBottom: '8px' }}>Recent Insider Trades</h4>
                                                                {detail.ins && detail.ins.trades && detail.ins.trades.length > 0 ? (
                                                                    detail.ins.trades.slice(0, 4).map((t, i) => (
                                                                        <div key={i} style={{ fontSize: '11px', marginBottom: '4px', display: 'flex', gap: '6px', alignItems: 'center' }}>
                                                                            <span className={t.is_purchase ? 'badge badge-success' : 'badge badge-danger'} style={{fontSize:'8px',padding:'1px 4px'}}>{t.trade_type}</span>
                                                                            <span>{t.insider_name}</span>
                                                                            <span style={{ color: 'var(--text-muted)', marginLeft: 'auto' }}>{t.value} ({t.trade_date})</span>
                                                                        </div>
                                                                    ))
                                                                ) : <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>No recent trades</div>}
                                                            </div>

                                                            {/* News */}
                                                            <div>
                                                                <h4 style={{ fontFamily: 'Oswald', fontSize: '13px', color: 'var(--accent)', marginBottom: '8px' }}>Latest News</h4>
                                                                {detail.news && detail.news.length > 0 ? (
                                                                    detail.news.slice(0, 4).map((n, i) => (
                                                                        <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'none', color: 'inherit', display: 'block', marginBottom: '6px' }}>
                                                                            <div style={{ fontSize: '11px', display: 'flex', gap: '6px', alignItems: 'flex-start' }}>
                                                                                <span style={{ color: n.sentiment === 'bullish' ? '#10b981' : n.sentiment === 'bearish' ? '#ef4444' : 'var(--text-muted)', flexShrink: 0 }}>
                                                                                    {n.sentiment === 'bullish' ? '▲' : n.sentiment === 'bearish' ? '▼' : '●'}
                                                                                </span>
                                                                                <span style={{ lineHeight: 1.3 }}>{n.title}</span>
                                                                            </div>
                                                                        </a>
                                                                    ))
                                                                ) : <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>No news</div>}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            <div style={{ display: 'flex', gap: '6px', justifyContent: 'flex-end', marginTop: '8px' }}>
                                                <button onClick={(e) => { e.stopPropagation(); handleEdit(item); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px' }} title="Edit">✏️</button>
                                                <button onClick={(e) => { e.stopPropagation(); handleDelete(item.id, item.ticker); }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px' }} title="Remove">🗑️</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                    )}
                </div>
            );
        };

        // Wheeler's Tab
        const WheelersTab = ({ data, onSetError }) => {
            const [ticker, setTicker] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [expirations, setExpirations] = useState([]);
            const [selectedExps, setSelectedExps] = useState([]);
            const [loading, setLoading] = useState(false);
            const [mode, setMode] = useState('csp'); // csp or cc
            const [expandedStrike, setExpandedStrike] = useState(null);
            const [selectedStrikes, setSelectedStrikes] = useState(new Set());
            const [activeExp, setActiveExp] = useState(null);
            const [simConfig, setSimConfig] = useState(null); // {ticker, strike, type}

            const loadExpirations = async (t) => {
                try {
                    const r = await fetch(`${API_BASE}/wheel/expirations/${t}`);
                    const d = await r.json();
                    const exps = d.expirations || [];
                    setExpirations(exps);
                    setSelectedExps(exps.slice(0, 4));
                    return exps.slice(0, 4);
                } catch { return []; }
            };

            const analyze = async (t, exps) => {
                setLoading(true);
                try {
                    const expParam = exps.join(',');
                    const r = await fetch(`${API_BASE}/wheel/analyze/${t}?expirations=${expParam}`);
                    const d = await r.json();
                    setAnalysis(d);
                    if (d.portfolio?.suggest_mode) setMode(d.portfolio.suggest_mode);
                    if (d.chains?.length > 0) setActiveExp(d.chains[0].expiration);
                } catch (e) { onSetError('Analysis failed: ' + e.message); }
                setLoading(false);
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                const t = ticker.trim().toUpperCase();
                if (!t) return;
                setAnalysis(null);
                setSelectedStrikes(new Set());
                setExpandedStrike(null);
                const exps = await loadExpirations(t);
                if (exps.length > 0) await analyze(t, exps);
            };

            const toggleExp = (exp) => {
                setSelectedExps(prev => prev.includes(exp) ? prev.filter(e => e !== exp) : [...prev, exp]);
            };

            const toggleStrike = (key) => {
                setSelectedStrikes(prev => { const n = new Set(prev); n.has(key) ? n.delete(key) : n.add(key); return n; });
            };

            const sc = analysis?.scorecard;
            const pf = analysis?.portfolio;
            const activeChain = analysis?.chains?.find(c => c.expiration === activeExp);
            const strikes = activeChain ? (mode === 'csp' ? activeChain.puts : activeChain.calls) : [];
            const sortedStrikes = [...strikes].sort((a, b) => mode === 'csp' ? b.strike - a.strike : a.strike - b.strike);

            // Multi-strike summary
            const selectedData = sortedStrikes.filter(s => selectedStrikes.has(`${activeExp}_${s.strike}`));
            const totalPremium = selectedData.reduce((s, o) => s + (o.premium_per_contract || 0), 0);
            const totalCapital = selectedData.reduce((s, o) => s + (o.capital_required || 0), 0);

            return (
                <div>
                    {/* Search */}
                    <form onSubmit={handleSearch} style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                        <input type="text" placeholder="Enter ticker (e.g., SOFI, HOOD, RKLB)..." value={ticker} onChange={e => setTicker(e.target.value)} className="search-box" style={{ flex: 1, maxWidth: 'none' }} />
                        <button type="submit" className="button button-primary" disabled={loading}>{loading ? 'Analyzing...' : 'Analyze'}</button>
                    </form>

                    {/* Expiration selector */}
                    {expirations.length > 0 && (
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
                            <span style={{ fontSize: '12px', color: 'var(--text-muted)', marginRight: '4px' }}>Expirations:</span>
                            {expirations.slice(0, 8).map(exp => (
                                <button key={exp} onClick={() => toggleExp(exp)} style={{
                                    padding: '4px 10px', fontSize: '11px', borderRadius: '4px', cursor: 'pointer',
                                    border: selectedExps.includes(exp) ? '1px solid var(--accent)' : '1px solid var(--border)',
                                    background: selectedExps.includes(exp) ? 'rgba(241,90,34,0.15)' : 'transparent',
                                    color: selectedExps.includes(exp) ? 'var(--accent)' : 'var(--text-muted)',
                                }}>{exp}</button>
                            ))}
                            <button className="button button-primary" style={{ padding: '4px 12px', fontSize: '11px', marginLeft: '8px' }} onClick={() => analysis && analyze(analysis.ticker, selectedExps)}>Re-analyze</button>
                        </div>
                    )}

                    {/* CSP/CC Toggle */}
                    {analysis && (
                        <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', alignItems: 'center' }}>
                            {['csp', 'cc'].map(m => (
                                <button key={m} onClick={() => setMode(m)} style={{
                                    padding: '6px 16px', fontSize: '13px', borderRadius: '6px', cursor: 'pointer', fontWeight: mode === m ? 700 : 400,
                                    border: mode === m ? '2px solid var(--accent)' : '1px solid var(--border)',
                                    background: mode === m ? 'rgba(241,90,34,0.15)' : 'transparent',
                                    color: mode === m ? 'var(--accent)' : 'var(--text-muted)',
                                }}>{m === 'csp' ? 'Cash-Secured Puts' : 'Covered Calls'}</button>
                            ))}
                        </div>
                    )}

                    {/* Scorecard */}
                    {sc && (
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                            <div className="stat-card">
                                <div className="stat-label">Price</div>
                                <div className="stat-value" style={{ fontSize: '20px' }}>{formatCurrency(analysis.price)}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">IV vs HV</div>
                                <div className="stat-value" style={{ fontSize: '20px', color: sc.iv_hv_label === 'RICH' ? '#10b981' : sc.iv_hv_label === 'CHEAP' ? '#ef4444' : '#f59e0b' }}>
                                    {sc.iv_hv_label || 'N/A'} {sc.iv_hv_ratio ? `(${sc.iv_hv_ratio}x)` : ''}
                                </div>
                                <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>IV: {sc.iv_current ? (sc.iv_current * 100).toFixed(0) + '%' : 'N/A'} | HV: {sc.hv_30d ? (sc.hv_30d * 100).toFixed(0) + '%' : 'N/A'}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">IV Rank</div>
                                <div className="stat-value" style={{ fontSize: '20px' }}>{sc.iv_rank !== null ? sc.iv_rank + '%' : 'Building...'}</div>
                                <div style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{sc.iv_rank_days} days cached</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Earnings</div>
                                <div className="stat-value" style={{ fontSize: '16px', color: sc.earnings_date ? '#f59e0b' : 'var(--text-muted)' }}>{sc.earnings_date || 'None found'}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Dark Pool</div>
                                <div className="stat-value" style={{ fontSize: '16px', color: sc.dark_pool?.high ? '#ef4444' : 'var(--text-muted)' }}>
                                    {sc.dark_pool ? `${sc.dark_pool.short_ratio.toFixed(1)}% short` : 'N/A'}
                                </div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Insider Activity</div>
                                <div className="stat-value" style={{ fontSize: '16px' }}>
                                    {sc.insider ? `${sc.insider.buys}B / ${sc.insider.sells}S` : 'None'}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Portfolio Context Banner */}
                    {pf && (
                        <div style={{ marginBottom: '16px', padding: '10px 16px', background: 'rgba(0,212,255,0.05)', border: '1px solid rgba(0,212,255,0.2)', borderRadius: '6px', fontSize: '13px' }}>
                            {pf.shares_owned > 0
                                ? <span>You own <strong style={{ color: 'var(--accent)' }}>{pf.shares_owned} shares</strong> of {analysis.ticker} at ${pf.avg_cost.toFixed(2)} avg. CC mode recommended. <strong>{formatCurrency(pf.cash_available)}</strong> cash available.</span>
                                : <span>You don't own {analysis.ticker}. CSP mode. <strong>{formatCurrency(pf.cash_available)}</strong> cash available.</span>
                            }
                        </div>
                    )}

                    {/* Expiration Tabs */}
                    {analysis?.chains?.length > 0 && (
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '12px', flexWrap: 'wrap' }}>
                            {analysis.chains.map(c => (
                                <button key={c.expiration} onClick={() => { setActiveExp(c.expiration); setExpandedStrike(null); }} style={{
                                    padding: '6px 14px', fontSize: '12px', borderRadius: '4px', cursor: 'pointer',
                                    border: activeExp === c.expiration ? '1px solid var(--accent)' : '1px solid var(--border)',
                                    background: activeExp === c.expiration ? 'rgba(241,90,34,0.1)' : 'transparent',
                                    color: activeExp === c.expiration ? 'var(--accent)' : 'var(--text-muted)',
                                }}>{c.expiration} ({c.dte}d)</button>
                            ))}
                        </div>
                    )}

                    {/* Strike Table */}
                    {sortedStrikes.length > 0 && (
                        <div className="card">
                            <div className="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th style={{width:'30px'}}></th>
                                            <th>Strike</th>
                                            <th>Mark</th>
                                            <th>Delta</th>
                                            <th>Ann. Yield</th>
                                            <th>Premium</th>
                                            <th>Capital</th>
                                            <th>{mode === 'csp' ? 'Breakeven' : 'Upside Cap'}</th>
                                            <th>% OTM</th>
                                            <th>OI</th>
                                            <th>Vol</th>
                                            <th>Spread</th>
                                            <th>Liq</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sortedStrikes.map(opt => {
                                            const key = `${activeExp}_${opt.strike}`;
                                            const d = Math.abs(opt.delta || 0);
                                            const inSweet = d >= 0.15 && d <= 0.35;
                                            const isExpanded = expandedStrike === key;
                                            return (
                                                <React.Fragment key={key}>
                                                <tr onClick={() => setExpandedStrike(isExpanded ? null : key)}
                                                    style={{ cursor: 'pointer', opacity: opt.mark <= 0 ? 0.3 : (inSweet ? 1 : 0.6), background: inSweet ? 'rgba(16,185,129,0.05)' : 'transparent' }}>
                                                    <td><input type="checkbox" checked={selectedStrikes.has(key)} onClick={e => e.stopPropagation()} onChange={() => toggleStrike(key)} /></td>
                                                    <td style={{ fontWeight: 'bold', color: 'var(--accent)' }}>${opt.strike}</td>
                                                    <td>{formatCurrency(opt.mark)}</td>
                                                    <td style={{ color: inSweet ? '#10b981' : 'var(--text-muted)' }}>{opt.delta !== null ? opt.delta.toFixed(2) : 'N/A'}</td>
                                                    <td style={{ fontWeight: 600, color: opt.ann_yield > 30 ? '#10b981' : opt.ann_yield > 15 ? '#f59e0b' : 'var(--text-muted)' }}>{opt.ann_yield.toFixed(1)}%</td>
                                                    <td>{formatCurrency(opt.premium_per_contract)}</td>
                                                    <td>{formatCurrency(opt.capital_required)}</td>
                                                    <td>{formatCurrency(opt.breakeven)}</td>
                                                    <td>{opt.pct_otm.toFixed(1)}%</td>
                                                    <td style={{ color: opt.open_interest < 100 ? '#ef4444' : 'var(--text-muted)' }}>{opt.open_interest.toLocaleString()}</td>
                                                    <td>{opt.volume.toLocaleString()}</td>
                                                    <td style={{ color: opt.bid_ask_spread > 0.10 ? '#f59e0b' : 'var(--text-muted)' }}>${opt.bid_ask_spread.toFixed(2)}</td>
                                                    <td><span style={{ padding: '1px 6px', borderRadius: '3px', fontSize: '10px', fontWeight: 600,
                                                        background: opt.liquidity_score === 'A' ? 'rgba(16,185,129,0.15)' : opt.liquidity_score === 'D' ? 'rgba(239,68,68,0.15)' : 'rgba(245,158,11,0.15)',
                                                        color: opt.liquidity_score === 'A' ? '#10b981' : opt.liquidity_score === 'D' ? '#ef4444' : '#f59e0b',
                                                    }}>{opt.liquidity_score}</span></td>
                                                </tr>
                                                {isExpanded && opt.quick_returns && (
                                                    <tr style={{ background: 'rgba(241,90,34,0.02)' }}>
                                                        <td colSpan="13" style={{ padding: '12px 16px' }}>
                                                            <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px' }}>
                                                                Quick Returns — ${opt.strike} {mode === 'csp' ? 'Put' : 'Call'} | Uses {formatCurrency(opt.capital_required)} ({opt.cash_pct_used.toFixed(1)}% of cash)
                                                                {mode === 'csp' && ` | If assigned: ${analysis.ticker} = ${opt.portfolio_pct_if_assigned.toFixed(1)}% of portfolio`}
                                                            </div>
                                                            <table style={{ width: '100%', fontSize: '12px' }}>
                                                                <thead>
                                                                    <tr style={{ color: 'var(--text-muted)' }}>
                                                                        <th style={{ textAlign: 'left', padding: '4px 8px' }}>Close At</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px' }}>Cost to Close</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px' }}>Net Profit</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px' }}>% of Max</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px' }}>Ann. Return</th>
                                                                        <th style={{ textAlign: 'right', padding: '4px 8px' }}>Est. Days</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {opt.quick_returns.map(qr => (
                                                                        <tr key={qr.target_pct} style={{ borderBottom: '1px solid var(--border)' }}>
                                                                            <td style={{ padding: '4px 8px' }}>{qr.target_pct === 100 ? 'Expiry' : qr.target_pct + '%'}</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right' }}>{formatCurrency(qr.cost_to_close)}</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right', color: '#10b981' }}>{formatCurrency(qr.net_profit)}</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right' }}>{qr.target_pct}%</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right', fontWeight: 600, color: qr.ann_return > 30 ? '#10b981' : '#f59e0b' }}>{qr.ann_return.toFixed(1)}%</td>
                                                                            <td style={{ padding: '4px 8px', textAlign: 'right' }}>{qr.est_days}d</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                            <button onClick={(e) => { e.stopPropagation(); setSimConfig({ticker: analysis.ticker, strike: opt.strike, type: mode}); }}
                                                                style={{ marginTop: '8px', background: 'none', border: '1px solid var(--accent)', borderRadius: '4px', color: 'var(--accent)', cursor: 'pointer', padding: '4px 12px', fontSize: '11px' }}>
                                                                Simulate Multi-Cycle
                                                            </button>
                                                        </td>
                                                    </tr>
                                                )}
                                                </React.Fragment>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Multi-Strike Summary Bar */}
                    {selectedStrikes.size > 0 && (
                        <div style={{ position: 'sticky', bottom: 0, background: 'var(--bg-primary)', borderTop: '2px solid var(--accent)', padding: '12px 16px', display: 'flex', gap: '24px', alignItems: 'center', flexWrap: 'wrap', zIndex: 10 }}>
                            <span style={{ fontWeight: 700, color: 'var(--accent)' }}>{selectedStrikes.size} selected</span>
                            <span>Total Premium: <strong style={{ color: '#10b981' }}>{formatCurrency(totalPremium)}</strong></span>
                            <span>Capital Required: <strong>{formatCurrency(totalCapital)}</strong></span>
                            <span>Cash Used: <strong style={{ color: pf && totalCapital > pf.cash_available ? '#ef4444' : 'var(--text-muted)' }}>{pf ? (totalCapital / pf.cash_available * 100).toFixed(1) : 0}%</strong></span>
                        </div>
                    )}

                    {!analysis && !loading && (
                        <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)' }}>
                            <div style={{ fontSize: '48px', marginBottom: '16px' }}>&#9881;</div>
                            <div style={{ fontSize: '16px', fontFamily: 'Oswald' }}>Wheeler's Paradise</div>
                            <div style={{ fontSize: '13px', marginTop: '8px' }}>Enter a ticker to analyze wheel strategy candidates</div>
                        </div>
                    )}

                    {/* ─── Active Wheels Tracker (Phase 2) ─── */}
                    <ActiveWheelsSection onAnalyzeTicker={(t) => { setTicker(t); }} onSimulate={(t, s, tp) => setSimConfig({ticker: t, strike: s, type: tp})} />

                    {/* ─── Scenario Simulator (Phase 3) ─── */}
                    <ScenarioSimulator config={simConfig} onClearConfig={() => setSimConfig(null)} />
                </div>
            );
        };

        // Active Wheels Section
        const ActiveWheelsSection = ({ onAnalyzeTicker, onSimulate }) => {
            const [wheelData, setWheelData] = useState(null);
            const [wLoading, setWLoading] = useState(true);
            const [expandedWheel, setExpandedWheel] = useState(null);
            const [expandedSection, setExpandedSection] = useState(null); // 'risk' | 'history'

            const loadWheels = async () => {
                setWLoading(true);
                try {
                    const r = await fetch(`${API_BASE}/wheel/active`);
                    const d = await r.json();
                    setWheelData(d);
                } catch { setWheelData(null); }
                setWLoading(false);
            };

            useEffect(() => { loadWheels(); }, []);

            const signalColor = (type) => ({ CLOSE: '#10b981', ROLL: '#f59e0b', HOLD: '#3b82f6', WARNING: '#ef4444' }[type] || 'var(--text-muted)');
            const signalBg = (type) => ({ CLOSE: 'rgba(16,185,129,0.12)', ROLL: 'rgba(245,158,11,0.12)', HOLD: 'rgba(59,130,246,0.12)', WARNING: 'rgba(239,68,68,0.12)' }[type] || 'transparent');

            const summary = wheelData?.summary;
            const wheels = wheelData?.active_wheels || [];

            return (
                <div style={{ marginTop: '32px' }}>
                    <div style={{ borderTop: '1px solid var(--border)', paddingTop: '24px', marginBottom: '16px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                            <h3 style={{ color: '#00d4ff', fontSize: '16px', fontWeight: 600, margin: 0 }}>Active Wheels</h3>
                            <button className="button button-primary" style={{ padding: '4px 12px', fontSize: '11px' }} onClick={loadWheels} disabled={wLoading}>{wLoading ? 'Loading...' : 'Refresh'}</button>
                        </div>

                        {/* Summary Cards */}
                        {summary && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginBottom: '16px' }}>
                                <div className="stat-card">
                                    <div className="stat-label">Active Wheels</div>
                                    <div className="stat-value" style={{ fontSize: '20px' }}>{summary.total_active_wheels}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Premium at Risk</div>
                                    <div className="stat-value" style={{ fontSize: '20px' }}>{formatCurrency(summary.total_premium_at_risk)}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Unrealized P/L</div>
                                    <div className="stat-value" style={{ fontSize: '20px', color: summary.total_unrealized_pl >= 0 ? '#10b981' : '#ef4444' }}>{summary.total_unrealized_pl >= 0 ? '+' : ''}{formatCurrency(summary.total_unrealized_pl)}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Signals</div>
                                    <div className="stat-value" style={{ fontSize: '14px' }}>
                                        <span style={{ color: '#10b981' }}>{summary.close_signals}C</span>{' / '}
                                        <span style={{ color: '#f59e0b' }}>{summary.roll_signals}R</span>{' / '}
                                        <span style={{ color: '#3b82f6' }}>{summary.hold_signals}H</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Position Cards */}
                        {wheels.length === 0 && !wLoading && (
                            <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--text-muted)' }}>
                                No active wheels. Use the analyzer above to find your next trade!
                            </div>
                        )}

                        {wheels.map(w => {
                            const sig = w.signals?.primary || {};
                            const alts = w.signals?.alternatives || [];
                            const isExpanded = expandedWheel === w.id;
                            return (
                                <div key={w.id} className="card" style={{ marginBottom: '12px', border: `1px solid ${signalColor(sig.type)}30` }}>
                                    {/* Earnings warning banner */}
                                    {w.signals?.earnings_warning && (
                                        <div style={{ padding: '8px 16px', background: 'rgba(239,68,68,0.1)', borderBottom: '1px solid rgba(239,68,68,0.2)', fontSize: '12px', color: '#ef4444', fontWeight: 600 }}>
                                            ⚠️ {w.signals.earnings_warning.reason}
                                        </div>
                                    )}

                                    <div style={{ padding: '16px' }}>
                                        {/* Header */}
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                                            <div>
                                                <span style={{ fontWeight: 700, fontSize: '15px', color: 'var(--accent)', fontFamily: 'Oswald' }}>{w.position_name}</span>
                                                {w.context?.rolls_count > 0 && <span style={{ fontSize: '9px', marginLeft: '8px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600, color: 'var(--accent)', background: 'rgba(241,90,34,0.1)' }}>Rolled ({w.context.rolls_count}x)</span>}
                                            </div>
                                            <span style={{ padding: '3px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 700, color: signalColor(sig.type), background: signalBg(sig.type) }}>
                                                {sig.type} {sig.priority}
                                            </span>
                                        </div>

                                        {/* Key metrics row */}
                                        <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', fontSize: '12px', color: 'var(--text-muted)', marginBottom: '12px' }}>
                                            <span>{w.contracts} contracts</span>
                                            <span>{w.dte} DTE</span>
                                            <span>${w.strike} strike</span>
                                            <span>{w.ticker} @ ${w.underlying_price?.toFixed(2)} ({w.risk_metrics?.pct_otm?.toFixed(1)}% {w.risk_metrics?.moneyness})</span>
                                        </div>

                                        {/* P/L row */}
                                        <div style={{ display: 'flex', gap: '20px', flexWrap: 'wrap', fontSize: '13px', marginBottom: '12px' }}>
                                            <span>Premium: <strong>{formatCurrency(w.premium_collected)}</strong></span>
                                            <span>Mark: <strong>${w.current_mark?.toFixed(2)}</strong></span>
                                            <span>Cost to Close: <strong>{formatCurrency(w.cost_to_close)}</strong></span>
                                            <span>P/L: <strong style={{ color: w.unrealized_pl >= 0 ? '#10b981' : '#ef4444' }}>{w.unrealized_pl >= 0 ? '+' : ''}{formatCurrency(w.unrealized_pl)} ({w.pl_pct_of_premium?.toFixed(1)}%)</strong></span>
                                            {w.current_leg_pl !== null && w.context?.rolls_count > 0 && (
                                                <span>Current Leg: <strong style={{ color: w.current_leg_pl >= 0 ? '#10b981' : '#ef4444' }}>{w.current_leg_pl >= 0 ? '+' : ''}{formatCurrency(w.current_leg_pl)}</strong></span>
                                            )}
                                        </div>

                                        {/* Signal box */}
                                        <div style={{ padding: '10px 14px', borderRadius: '6px', background: signalBg(sig.type), border: `1px solid ${signalColor(sig.type)}20`, marginBottom: '12px' }}>
                                            <div style={{ fontWeight: 600, fontSize: '13px', color: signalColor(sig.type), marginBottom: '4px' }}>{sig.reason}</div>
                                            <div style={{ fontSize: '12px', color: 'var(--text-primary)' }}>{w.signals?.action}</div>
                                            {alts.length > 0 && (
                                                <div style={{ marginTop: '8px', paddingTop: '8px', borderTop: `1px solid ${signalColor(sig.type)}15` }}>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '4px' }}>Alternatives:</div>
                                                    {alts.map((a, i) => (
                                                        <div key={i} style={{ fontSize: '11px', color: 'var(--text-muted)', marginBottom: '2px' }}>
                                                            <span style={{ color: signalColor(a.type), fontWeight: 600 }}>{a.type}</span> — {a.reason}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* Expandable sections */}
                                        <div style={{ display: 'flex', gap: '12px', fontSize: '12px' }}>
